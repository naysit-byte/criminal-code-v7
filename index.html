หายแก่ผู้หนึ่งผู้ใดหรือประชาชน ให้ถือว่าผู้นั้นปลอมเอกสาร ต้อง ระวางโทษเช่นเดียวกัน"},{"section":"มาตรา ๒๖๕","num":"265","text":"ผู้ใดปลอมเอกสารสิทธิหรือเอกสารราชการ ต้องระวางโทษ จําคุกตั้งแต่หกเดือนถึงห้าปี และปรับตั้งแต่หนึ่งหมื่นบาทถึงหนึ่งแสนบาท"},{"section":"มาตรา ๒๖๖","num":"266","text":"แก้ไขเพิ่มเติมโดยพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา (ฉบับที่ ๑๒) พ.ศ. ๒๕๓๕ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ หมวด ๔ ความผิดเกี่ยวกับบัตรอิเล็กทรอนิกส์ มาตรา ๒๖๙/๑ ถึงมาตรา ๒๖๙/๗ เพิ่ม โดยพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา (ฉบับที่ ๑๗) พ.ศ. ๒๕๔๗"},{"section":"มาตรา ๒๖๗","num":"267","text":"ผู้ใดแจ้งให้เจ้าพนักงาน ผู้กระทําการตามหน้าที่จดข้อความ อันเป็นเท็จลงในเอกสารมหาชนหรือเอกสารราชการ ซึ่งมีวัตถุประสงค์สําหรับใช้เป็นพยาน หลักฐานโดยประการที่น่าจะเกิดความเสียหายแก่ผู้อื่นหรือประชาชน ต้องระวางโทษจําคุกไม่ เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๖๘","num":"268","text":"ผู้ใดใช้หรืออ้างเอกสารอันเกิดจากการกระทําความผิดตาม"},{"section":"มาตรา ๒๖๙","num":"269","text":"ผู้ใดในการประกอบการงานในวิชาแพทย์ กฎหมาย บัญชี หรือวิชาชีพอื่นใด ทําคํารับรองเป็นเอกสารอันเป็นเท็จ โดยประการที่น่าจะเกิดความเสียหายแก่ ผู้อื่นหรือประชาชน ต้องระวางโทษจําคุกไม่เกินสองปี หรือปรับไม่เกินสี่หมื่นบาท หรือทั้งจําทั้ง ปรับ ผู้ใดโดยทุจริตใช้หรืออ้างคํารับรองอันเกิดจากการกระทําความผิดตามวรรค แรก ต้องระวางโทษเช่นเดียวกัน หมวด ๔ ความผิดเกี่ยวกับบัตรอิเล็กทรอนิกส์"},{"section":"มาตรา ๒๖๙/๑","num":"269/1","text":"ผู้ใดทําบัตรอิเล็กทรอนิกส์ปลอมขึ้นทั้งฉบับหรือแต่ส่วน หนึ่งส่วนใด เติมหรือตัดทอนข้อความ หรือแก้ไขด้วยประการใด ๆ ในบัตรอิเล็กทรอนิกส์ที่ แท้จริง โดยประการที่น่าจะเกิดความเสียหายแก่ผู้อื่นหรือประชาชน ถ้าได้กระทําเพื่อให้ผู้หนึ่งผู้ ใดหลงเชื่อว่าเป็นบัตรอิเล็กทรอนิกส์ที่แท้จริงหรือเพื่อใช้ประโยชน์อย่างหนึ่งอย่างใด ผู้นั้น กระทําความผิดฐานปลอมบัตรอิเล็กทรอนิกส์ ต้องระวางโทษจําคุกตั้งแต่หนึ่งปีถึงห้าปี และ ปรับตั้งแต่สองหมื่นบาทถึงหนึ่งแสนบาท"},{"section":"มาตรา ๒๖๙/๒","num":"269/2","text":"ผู้ใดทําเครื่องมือหรือวัตถุสําหรับปลอมหรือแปลง หรือ สําหรับให้ได้ข้อมูลในการปลอมหรือแปลงสิ่งใด ๆ ซึ่งระบุไว้ในมาตรา ๒๖๙/๑ หรือมีเครื่องมือ หรือวัตถุเช่นว่านั้น เพื่อใช้หรือให้ได้ข้อมูลในการปลอมหรือแปลง ต้องระวางโทษจําคุกตั้งแต่ หนึ่งปีถึงห้าปี และปรับตั้งแต่สองหมื่นบาทถึงหนึ่งแสนบาท"},{"section":"มาตรา ๒๖๙/๓","num":"269/3","text":"ผู้ใดนําเข้าในหรือส่งออกไปนอกราชอาณาจักรซึ่งสิ่งใด ๆ ตามมาตรา ๒๖๙/๑ หรือมาตรา ๒๖๙/๒ ต้องระวางโทษจําคุกตั้งแต่สามปีถึงสิบปี และ ปรับตั้งแต่หกหมื่นบาทถึงสองแสนบาท"},{"section":"มาตรา ๒๖๙/๔","num":"269/4","text":"ผู้ใดใช้หรือมีไว้เพื่อใช้ซึ่งสิ่งใด ๆ ตามมาตรา ๒๖๙/๑ อัน ได้มาโดยรู้ว่าเป็นของที่ทําปลอมหรือแปลงขึ้น ต้องระวางโทษจําคุกตั้งแต่หนึ่งปีถึงเจ็ดปี หรือ ปรับตั้งแต่สองหมื่นบาทถึงหนึ่งแสนสี่หมื่นบาท หรือทั้งจําทั้งปรับ ผู้ใดจําหน่ายหรือมีไว้เพื่อจําหน่ายซึ่งสิ่งใด ๆ ที่ทําปลอมหรือแปลงขึ้นตาม"},{"section":"มาตรา ๒๖๙/๕","num":"269/5","text":"ผู้ใดใช้บัตรอิเล็กทรอนิกส์ของผู้อื่นโดยมิชอบ ในประการ ที่น่าจะก่อให้เกิดความเสียหายแก่ผู้อื่นหรือประชาชน ต้องระวางโทษจําคุกไม่เกินห้าปี หรือปรับ ไม่เกินหนึ่งแสนบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๖๙/๖","num":"269/6","text":"ผู้ใดมีไว้เพื่อนําออกใช้ซึ่งบัตรอิเล็กทรอนิกส์ของผู้อื่น โดยมิชอบตามมาตรา ๒๖๙/๕ ในประการที่น่าจะก่อให้เกิดความเสียหายแก่ผู้อื่นหรือประชาชน ต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๖๙/๗","num":"269/7","text":"ถ้าการกระทําดังกล่าวในหมวดนี้ เป็นการกระทําเกี่ยว กับบัตรอิเล็กทรอนิกส์ที่ผู้ออกได้ออกให้แก่ผู้มีสิทธิใช้ เพื่อใช้ประโยชน์ในการชําระค่าสินค้า ค่า บริการหรือหนี้อื่นแทนการชําระด้วยเงินสด หรือใช้เบิกถอนเงินสด ผู้กระทําต้องระวางโทษหนัก กว่าที่บัญญัติไว้ในมาตรานั้น ๆ กึ่งหนึ่ง หมวด ๕ ความผิดเกี่ยวกับหนังสือเดินทาง"},{"section":"มาตรา ๒๖๙/๘","num":"269/8","text":"ต้องระวางโทษจําคุกตั้งแต่หนึ่งปีถึงสิบปี และปรับตั้งแต่สองหมื่นบาทถึงสอง แสนบาท ผู้ใดจําหน่ายหรือมีไว้เพื่อจําหน่ายซึ่งหนังสือเดินทางปลอมตามมาตรา ๒๖๙/๘ ต้องระวางโทษจําคุกตั้งแต่สามปีถึงยี่สิบปี และปรับตั้งแต่หกหมื่นบาทถึงสี่แสนบาท การมีหนังสือเดินทางปลอมตามมาตรา ๒๖๙/๘ จํานวนตั้งแต่สองฉบับขึ้นไป ให้สันนิษฐานไว้ก่อนว่ามีไว้เพื่อจําหน่าย ถ้าผู้กระทําความผิดตามวรรคหนึ่งหรือวรรคสองเป็นผู้ปลอมซึ่งหนังสือ เดินทาง ตามมาตรา ๒๖๙/๘ ให้ลงโทษตามมาตรานี้แต่กระทงเดียว"},{"section":"มาตรา ๒๖๙/๙","num":"269/9","text":"เพิ่มโดยพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา (ฉบับที่ ๑๘) พ.ศ. ๒๕๕๐"},{"section":"มาตรา ๒๖๙/๑๐","num":"269/10","text":"ผู้ใดนําเข้าในหรือส่งออกไปนอกราชอาณาจักรซึ่ง หนังสือเดินทางปลอมตามมาตรา ๒๖๙/๘ ต้องระวางโทษจําคุกตั้งแต่หนึ่งปีถึงสิบปี และปรับ ตั้งแต่สองหมื่นบาทถึงสองแสนบาท ถ้าการกระทําความผิดตามวรรคหนึ่งได้กระทําไปเพื่อจําหน่าย ต้องระวาง โทษจําคุกตั้งแต่สามปีถึงยี่สิบปี และปรับตั้งแต่หกหมื่นบาทถึงสี่แสนบาท"},{"section":"มาตรา ๒๖๙/๑๑","num":"269/11","text":"ผู้ใดใช้หนังสือเดินทางของผู้อื่นโดยมิชอบ ในประการที่ น่าจะก่อให้เกิดความเสียหายแก่ผู้อื่นหรือประชาชน ต้องระวางโทษจําคุกไม่เกินสิบปี และปรับ ไม่เกินสองแสนบาท ผู้ใดจัดหาหนังสือเดินทางให้ผู้กระทําความผิดตามวรรคหนึ่ง ต้องระวางโทษ เช่นเดียวกัน"},{"section":"มาตรา ๒๖๙/๑๒","num":"269/12","text":"ผู้ใดทําปลอมขึ้นซึ่งดวงตรา รอยตรา หรือแผ่นปะตรวจ ลงตราอันใช้ในการตรวจลงตราสําหรับการเดินทางระหว่างประเทศ ต้องระวางโทษจําคุกตั้งแต่ หนึ่งปีถึงสิบปี และปรับตั้งแต่สองหมื่นบาทถึงสองแสนบาท"},{"section":"มาตรา ๒๖๙/๑๓","num":"269/13","text":"ผู้ใดใช้ดวงตรา รอยตรา หรือแผ่นปะตรวจลงตราที่ทํา ปลอมขึ้นตามมาตรา ๒๖๙/๑๒ ต้องระวางโทษจําคุกตั้งแต่หนึ่งปีถึงสิบปี และปรับตั้งแต่สอง หมื่นบาทถึงสองแสนบาท ถ้าผู้กระทําความผิดตามวรรคหนึ่งเป็นผู้ปลอมซึ่งดวงตรา รอยตรา หรือ แผ่นปะตรวจลงตราตามมาตรา ๒๖๙/๑๒ ให้ลงโทษตามมาตรานี้แต่กระทงเดียว"},{"section":"มาตรา ๒๖๙/๑๔","num":"269/14","text":"ผู้ใดนําเข้าในหรือส่งออกไปนอกราชอาณาจักรซึ่ง ดวงตรา รอยตรา หรือแผ่นปะตรวจลงตราซึ่งระบุไว้ในมาตรา ๒๖๙/๑๒ อันเป็นของปลอม ต้องระวางโทษจําคุกตั้งแต่หนึ่งปีถึงสิบปี และปรับตั้งแต่สองหมื่นบาทถึงสองแสนบาท"},{"section":"มาตรา ๒๖๙/๑๕","num":"269/15","text":"ผู้ใดใช้ดวงตรา รอยตรา หรือแผ่นปะตรวจลงตราอัน แท้จริงที่ใช้ในการตรวจลงตราสําหรับการเดินทางระหว่างประเทศโดยมิชอบ ในประการที่น่าจะ ก่อให้เกิดความเสียหายแก่ผู้อื่นหรือประชาชน ต้องระวางโทษสองในสามส่วนของโทษที่บัญญัติ ไว้ในมาตรา ๒๖๙/๑๓ ลักษณะ ๘ ความผิดเกี่ยวกับการค้า"},{"section":"มาตรา ๒๗๐","num":"270","text":"ผู้ใดใช้หรือมีไว้เพื่อใช้ซึ่งเครื่องชั่ง เครื่องตวง หรือเครื่องวัด ที่ผิดอัตราเพื่อเอาเปรียบในการค้า หรือมีเครื่องเช่นว่านั้นไว้เพื่อขาย ต้องระวางโทษจําคุกไม่ เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๗๑","num":"271","text":"แก้ไขเพิ่มเติมโดยพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา (ฉบับที่ ๔) พ.ศ. ๒๕๒๒ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๘ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐"},{"section":"มาตรา ๒๗๒","num":"272","text":"ผู้ใด (๑) เอาชื่อ รูป รอยประดิษฐ์หรือข้อความใด ๆ ในการประกอบการค้าของผู้อื่น มาใช้ หรือทําให้ปรากฏที่สินค้า หีบ ห่อ วัตถุที่ใช้หุ้มห่อ แจ้งความ รายการแสดงราคา จดหมาย เกี่ยวกับการค้าหรือสิ่งอื่นทํานองเดียวกัน เพื่อให้ประชาชนหลงเชื่อว่าเป็นสินค้าหรือการค้าของ ผู้อื่นนั้น (๒) เลียนป้าย หรือสิ่งอื่นทํานองเดียวกันจนประชาชนน่าจะหลงเชื่อว่าสถานที่ การค้าของตนเป็นสถานที่การค้าของผู้อื่นที่ตั้งอยู่ใกล้เคียง (๓) ไขข่าวแพร่หลายซึ่งข้อความเท็จเพื่อให้เสียความเชื่อถือในสถานที่การค้า สินค้าอุตสาหกรรมหรือพาณิชย์การของผู้หนึ่งผู้ใด โดยมุ่งประโยชน์แก่การค้าของตน ต้องระวางโทษจําคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่นบาท หรือทั้งจําทั้ง ปรับ ความผิดตามมาตรานี้เป็นความผิดอันยอมความได้"},{"section":"มาตรา ๒๗๓","num":"273","text":"ผู้ใดปลอมเครื่องหมายการค้าของผู้อื่นซึ่งได้จดทะเบียน แล้วไม่ว่าจะได้จดทะเบียนภายในหรือนอกราชอาณาจักร ต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๗๔","num":"274","text":"ผู้ใดเลียนเครื่องหมายการค้าของผู้อื่นซึ่งได้จดทะเบียนแล้ว ไม่ว่าจะได้จดทะเบียนภายในหรือนอกราชอาณาจักร เพื่อให้ประชาชนหลงเชื่อว่าเป็น เครื่องหมายการค้าของผู้อื่นนั้น ต้องระวางโทษจําคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่น บาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๗๕","num":"275","text":"ผู้ใดนําเข้าในราชอาณาจักร จําหน่ายหรือเสนอจําหน่ายซึ่ง สินค้าอันเป็นสินค้าที่มีชื่อ รูป รอยประดิษฐ์หรือข้อความใด ๆ ดังบัญญัติไว้ในมาตรา ๒๗๒ (๑) หรือสินค้าอันเป็นสินค้าที่มีเครื่องหมายการค้าปลอมหรือเลียนเครื่องหมายการค้าของผู้อื่น ตามความในมาตรา ๒๗๓ หรือมาตรา ๒๗๔ ต้องระวางโทษดังที่บัญญัติไว้ในมาตรานั้น ๆ ลักษณะ ๙ ความผิดเกี่ยวกับเพศ"},{"section":"มาตรา ๒๗๖","num":"276","text":"ผู้ใดข่มขืนกระทําชําเราผู้อื่นโดยขู่เข็ญด้วยประการใด ๆ โดยใช้กําลังประทุษร้าย โดยผู้อื่นนั้นอยู่ในภาวะที่ไม่สามารถขัดขืนได้ หรือโดยทําให้ผู้อื่นนั้น เข้าใจผิดว่าตนเป็นบุคคลอื่น ต้องระวางโทษจําคุกตั้งแต่สี่ปีถึงยี่สิบปี และปรับตั้งแต่แปดหมื่น บาทถึงสี่แสนบาท ถ้าการกระทําความผิดตามวรรคหนึ่ง ได้กระทําโดยทําให้ผู้ถูกกระทําเข้าใจว่า ผู้กระทํามีอาวุธปืนหรือวัตถุระเบิด ต้องระวางโทษจําคุกตั้งแต่เจ็ดปีถึงยี่สิบปี และปรับตั้งแต่ หนึ่งแสนสี่หมื่นบาทถึงสี่แสนบาท ถ้าการกระทําความผิดตามวรรคหนึ่ง ได้กระทําโดยมีอาวุธปืนหรือวัตถุระเบิด หรือโดยใช้อาวุธ หรือโดยร่วมกระทําความผิดด้วยกันอันมีลักษณะเป็นการโทรมหญิงหรือ กระทํากับชายในลักษณะเดียวกัน ต้องระวางโทษจําคุกตั้งแต่สิบห้าปีถึงยี่สิบปี และปรับตั้งแต่ สามแสนบาทถึงสี่แสนบาท หรือจําคุกตลอดชีวิต ถ้าการกระทําความผิดตามวรรคหนึ่ง เป็นการกระทําความผิดระหว่างคู่สมรส และคู่สมรสนั้นยังประสงค์จะอยู่กินด้วยกันฉันสามีภริยา ศาลจะลงโทษน้อยกว่าที่กฎหมาย กําหนดไว้เพียงใดก็ได้ หรือจะกําหนดเงื่อนไขเพื่อคุมความประพฤติแทนการลงโทษก็ได้ ในกรณี ที่ศาลมีคําพิพากษาให้ลงโทษจําคุกและคู่สมรสฝ่ายใดฝ่ายหนึ่งไม่ประสงค์จะอยู่กินด้วยกันฉัน สามีภริยาต่อไป และประสงค์จะหย่า ให้คู่สมรสฝ่ายนั้นแจ้งให้ศาลทราบ และให้ศาลแจ้ง พนักงานอัยการให้ดําเนินการฟ้องหย่าให้"},{"section":"มาตรา ๒๗๗","num":"277","text":"ผู้ใดกระทําชําเราเด็กอายุยังไม่เกินสิบห้าปีซึ่งมิใช่ภริยา หรือสามีของตน โดยเด็กนั้นจะยินยอมหรือไม่ก็ตาม ต้องระวางโทษจําคุกตั้งแต่ห้าปีถึงยี่สิบปี และปรับตั้งแต่หนึ่งแสนบาทถึงสี่แสนบาท ถ้าการกระทําความผิดตามวรรคหนึ่ง เป็นการกระทําแก่เด็กอายุยังไม่เกินสิบ สามปี ต้องระวางโทษจําคุกตั้งแต่เจ็ดปีถึงยี่สิบปี และปรับตั้งแต่หนึ่งแสนสี่หมื่นบาทถึงสี่แสน บาท หรือจําคุกตลอดชีวิต ถ้าการกระทําความผิดตามวรรคหนึ่งหรือวรรคสอง ได้กระทําโดยทําให้ผู้ถูก กระทําเข้าใจว่าผู้กระทํามีอาวุธปืนหรือวัตถุระเบิด ต้องระวางโทษจําคุกตั้งแต่สิบปีถึงยี่สิบปี และปรับตั้งแต่สองแสนบาทถึงสี่แสนบาท หรือจําคุกตลอดชีวิต ถ้าการกระทําความผิดตามวรรคหนึ่งหรือวรรคสอง ได้กระทําโดยมีอาวุธปืน หรือวัตถุระเบิด หรือโดยใช้อาวุธ หรือโดยร่วมกระทําความผิดด้วยกันอันมีลักษณะเป็นการ โทรมเด็กหญิงหรือกระทํากับเด็กชายในลักษณะเดียวกัน ต้องระวางโทษจําคุกตลอดชีวิต ความผิดตามที่บัญญัติไว้ในวรรคหนึ่ง ถ้าเป็นการกระทําโดยบุคคลอายุไม่เกิน สิบแปดปีกระทําต่อเด็กซึ่งมีอายุกว่าสิบสามปีแต่ยังไม่เกินสิบห้าปี โดยเด็กนั้นยินยอม ศาลที่มี อํานาจพิจารณาคดีเยาวชนและครอบครัวจะพิจารณาให้มีการคุ้มครองสวัสดิภาพของเด็กผู้ถูก กระทําหรือผู้กระทําความผิดตามกฎหมายว่าด้วยการคุ้มครองเด็กแทนการลงโทษก็ได้ ในการ พิจารณาของศาล ให้คํานึงถึงอายุ ประวัติ ความประพฤติ สติปัญญา การศึกษาอบรม สุขภาพ ภาวะแห่งจิต นิสัย อาชีพ สิ่งแวดล้อมของผู้กระทําความผิดและเด็กผู้ถูกกระทํา ความสัมพันธ์ ระหว่างผู้กระทําความผิดกับเด็กผู้ถูกกระทํา หรือเหตุอื่นอันควรเพื่อประโยชน์ของเด็กผู้ถูก กระทําด้วย ในกรณีที่ได้มีการดําเนินการคุ้มครองสวัสดิภาพของเด็กผู้ถูกกระทําหรือผู้ กระทําความผิดตามกฎหมายว่าด้วยการคุ้มครองเด็กแล้ว ผู้กระทําความผิดไม่ต้องรับโทษ แต่ ถ้าการคุ้มครองสวัสดิภาพดังกล่าวไม่สําเร็จ ศาลจะลงโทษผู้กระทําความผิดน้อยกว่าที่ กฎหมายกําหนดไว้สําหรับความผิดนั้นเพียงใดก็ได้ ในการพิจารณาของศาล ให้คํานึงถึงเหตุ ตามวรรคห้าด้วย"},{"section":"มาตรา ๒๗๗ ทวิ","num":"277 ทวิ","text":"มาตรา ๒๗๗ ตรี มาตรา ๒๗๘ มาตรา ๒๗๙ มาตรา ๒๘๐ มาตรา ๒๘๒ หรือมาตรา ๒๘๓ เป็นการกระทําแก่บุพการี ผู้สืบสันดาน พี่น้องร่วมบิดามารดาหรือร่วมแต่บิดา หรือมารดา ญาติสืบสายโลหิต ศิษย์ซึ่งอยู่ในความดูแล ผู้อยู่ในความควบคุมตามหน้าที่ราชการ ผู้อยู่ในความปกครอง ในความพิทักษ์หรือในความอนุบาล หรือผู้อยู่ภายใต้อํานาจด้วยประการ อื่นใด ผู้กระทําต้องระวางโทษหนักกว่าที่บัญญัติไว้ในมาตรานั้น ๆ หนึ่งในสาม"},{"section":"มาตรา ๒๗๗ ตรี","num":"277 ตรี","text":"ถ้าการกระทําความผิดตามมาตรา ๒๗๖ วรรคสาม หรือมาตรา ๒๗๗ วรรคสี่ เป็นเหตุให้ผู้ถูกกระทํา (๑) รับอันตรายสาหัส ผู้กระทําต้องระวางโทษประหารชีวิต หรือจําคุกตลอด ชีวิต (๒) ถึงแก่ความตาย ผู้กระทําต้องระวางโทษประหารชีวิต"},{"section":"มาตรา ๒๗๘","num":"278","text":"หรือมาตรา ๒๗๙ ได้บันทึกภาพหรือเสียงการกระทําชําเราหรือการกระทํา อนาจารนั้นไว้ เพื่อแสวงหาประโยชน์โดยมิชอบสําหรับตนเองหรือผู้อื่น ต้องระวางโทษหนักกว่า ที่บัญญัติไว้ในมาตรานั้น ๆ หนึ่งในสาม ถ้าผู้กระทําความผิดตามวรรคหนึ่ง เผยแพร่หรือส่งต่อซึ่งภาพหรือเสียงการ กระทําชําเราหรือการกระทําอนาจารที่บันทึกไว้ ต้องระวางโทษหนักกว่าที่บัญญัติไว้ในมาตรา นั้น ๆ กึ่งหนึ่ง"},{"section":"มาตรา ๒๗๙","num":"279","text":"ผู้ใดกระทําอนาจารแก่เด็กอายุยังไม่เกินสิบห้าปี โดยเด็ก นั้นจะยินยอมหรือไม่ก็ตาม ต้องระวางโทษจําคุกไม่เกินสิบปี หรือปรับไม่เกินสองแสนบาท หรือ ทั้งจําทั้งปรับ ถ้าการกระทําความผิดตามวรรคหนึ่ง เป็นการกระทําแก่เด็กอายุไม่เกินสิบ สามปี ต้องระวางโทษจําคุกตั้งแต่หนึ่งปีถึงสิบปี หรือปรับตั้งแต่สองหมื่นบาทถึงสองแสนบาท หรือทั้งจําทั้งปรับ ถ้าการกระทําความผิดตามวรรคหนึ่งหรือวรรคสอง ผู้กระทําได้กระทําโดยขู่ เข็ญด้วยประการใด ๆ โดยใช้กําลังประทุษร้าย โดยเด็กนั้นอยู่ในภาวะที่ไม่สามารถขัดขืนได้ หรือโดยทําให้เด็กนั้นเข้าใจผิดว่าตนเป็นบุคคลอื่น ต้องระวางโทษจําคุกตั้งแต่หนึ่งปีถึงสิบห้าปี หรือปรับตั้งแต่สองหมื่นบาทถึงสามแสนบาท หรือทั้งจําทั้งปรับ วรรคสี่ (ยกเลิก) วรรคห้า (ยกเลิก) วรรคหก (ยกเลิก) วรรคเจ็ด (ยกเลิก)"},{"section":"มาตรา ๒๘๐","num":"280","text":"ถ้าการกระทําความผิดตามมาตรา ๒๗๘ หรือมาตรา ๒๗๙ เป็นเหตุให้ผู้ถูกกระทํา (๑) รับอันตรายสาหัส ผู้กระทําต้องระวางโทษจําคุกตั้งแต่ห้าปีถึงยี่สิบปี และ ปรับตั้งแต่หนึ่งแสนบาทถึงสี่แสนบาท หรือจําคุกตลอดชีวิต ถึงแก่ความตาย ผู้กระทําต้องระวางโทษประหารชีวิต หรือจําคุกตลอด ชีวิต"},{"section":"มาตรา ๒๘๐/๑","num":"280/1","text":"เพิ่มโดยพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา (ฉบับที่ ๒๗) พ.ศ. ๒๕๖๒"},{"section":"มาตรา ๒๘๑","num":"281","text":"ความผิดตามมาตราดังต่อไปนี้ เป็นความผิดอันยอมความ ได้ (๑) มาตรา ๒๗๖ วรรคหนึ่ง ซึ่งเป็นการกระทําระหว่างคู่สมรส ถ้ามิได้เกิดต่อ หน้าธารกํานัล หรือไม่เป็นเหตุให้ผู้ถูกกระทํารับอันตรายสาหัสหรือถึงแก่ความตาย (๒) มาตรา ๒๗๘ ถ้ามิได้เกิดต่อหน้าธารกํานัล ไม่เป็นเหตุให้ผู้ถูกกระทํารับ อันตรายสาหัสหรือถึงแก่ความตาย หรือมิได้เป็นการกระทําแก่บุคคลดังระบุไว้ในมาตรา ๒๘๕ และมาตรา ๒๘๕/๒"},{"section":"มาตรา ๒๘๒","num":"282","text":"ผู้ใดเพื่อสนองความใคร่ของผู้อื่น เป็นธุระจัดหา ล่อไป หรือ พาไปเพื่อการอนาจารซึ่งชายหรือหญิง แม้ผู้นั้นจะยินยอมก็ตาม ต้องระวางโทษ จําคุก ตั้งแต่หนึ่งปีถึงสิบปี และปรับตั้งแต่สองหมื่นบาทถึงสองแสนบาท ถ้าการกระทําความผิดตามวรรคแรกเป็นการกระทําแก่บุคคลอายุเกินสิบห้าปี แต่ยังไม่เกินสิบแปดปี ผู้กระทําต้องระวางโทษจําคุกตั้งแต่สามปีถึงสิบห้าปี และปรับตั้งแต่หก หมื่นบาทถึงสามแสนบาท ถ้าการกระทําความผิดตามวรรคแรกเป็นการกระทําแก่เด็กอายุยังไม่เกินสิบ ห้าปี ผู้กระทําต้องระวางโทษจําคุกตั้งแต่ห้าปีถึงยี่สิบปี และปรับตั้งแต่หนึ่งแสนบาทถึงสี่แสน บาท ผู้ใดเพื่อสนองความใคร่ของผู้อื่น รับตัวบุคคลซึ่งมีผู้จัดหา ล่อไป หรือพาไป ตามวรรคแรก วรรคสอง หรือวรรคสาม หรือสนับสนุนในการกระทําความผิดดังกล่าว ต้อง ระวางโทษตามที่บัญญัติไว้ในวรรคแรก วรรคสอง หรือวรรคสาม แล้วแต่กรณี"},{"section":"มาตรา ๒๘๓","num":"283","text":"ผู้ใดเพื่อสนองความใคร่ของผู้อื่น เป็นธุระจัดหา ล่อไป หรือ พาไปเพื่อการอนาจารซึ่งชายหรือหญิง โดยใช้อุบายหลอกลวง ขู่เข็ญ ใช้กําลังประทุษร้าย ใช้ อํานาจครอบงําผิดคลองธรรม หรือใช้วิธีข่มขืนใจด้วยประการอื่นใด ต้องระวางโทษ จํา คุกตั้งแต่ห้าปีถึงยี่สิบปี และปรับตั้งแต่หนึ่งแสนบาทถึงสี่แสนบาท ถ้าการกระทําความผิดตามวรรคแรกเป็นการกระทําแก่บุคคลอายุเกินสิบห้าปี แต่ยังไม่เกินสิบแปดปี ผู้กระทําต้องระวางโทษจําคุกตั้งแต่เจ็ดปีถึงยี่สิบปี และปรับตั้งแต่หนึ่ง แสนสี่หมื่นบาทถึงสี่แสนบาท หรือจําคุกตลอดชีวิต ถ้าการกระทําความผิดตามวรรคแรกเป็นการกระทําแก่เด็กอายุยังไม่เกินสิบ ห้าปี ผู้กระทําต้องระวางโทษจําคุกตั้งแต่สิบปีถึงยี่สิบปี และปรับตั้งแต่สองแสนบาทถึงสี่แสน บาท หรือจําคุกตลอดชีวิต หรือประหารชีวิต ผู้ใดเพื่อสนองความใคร่ของผู้อื่น รับตัวบุคคลซึ่งมีผู้จัดหา ล่อไป หรือพาไป ตามวรรคแรก วรรคสอง หรือวรรคสาม หรือสนับสนุนในการกระทําความผิดดังกล่าว ต้อง ระวางโทษตามที่บัญญัติไว้ในวรรคแรก วรรคสอง หรือวรรคสาม แล้วแต่กรณี"},{"section":"มาตรา ๒๘๓ ทวิ","num":"283 ทวิ","text":"ผู้ใดพาบุคคลอายุเกินสิบห้าปีแต่ยังไม่เกินสิบแปดปีไป เพื่อการอนาจาร แม้ผู้นั้นจะยินยอมก็ตาม ต้องระวางโทษ จําคุกไม่เกินห้าปี หรือปรับไม่เกิน หนึ่งแสนบาท หรือทั้งจําทั้งปรับ ถ้าการกระทําความผิดตามวรรคแรกเป็นการกระทําแก่เด็กอายุยังไม่เกินสิบ ห้าปี ผู้กระทําต้องระวางโทษจําคุกไม่เกินเจ็ดปี หรือปรับไม่เกินหนึ่งแสนสี่หมื่นบาท หรือทั้งจํา ทั้งปรับ ผู้ใดซ่อนเร้นบุคคลซึ่งถูกพาไปตามวรรคแรกหรือวรรคสอง ต้องระวางโทษ ตามที่บัญญัติในวรรคแรกหรือวรรคสอง แล้วแต่กรณี ความผิดตามวรรคแรกและวรรคสามเฉพาะกรณีที่กระทําแก่บุคคลอายุเกิน สิบห้าปี เป็นความผิดอันยอมความได้"},{"section":"มาตรา ๒๘๔","num":"284","text":"ผู้ใดพาผู้อื่นไปเพื่อการอนาจาร โดยใช้อุบายหลอกลวงขู่ เข็ญ ใช้กําลังประทุษร้าย ใช้อํานาจครอบงําผิดคลองธรรม หรือใช้วิธีข่มขืนใจด้วยประการอื่นใด ต้องระวางโทษ จําคุกตั้งแต่หนึ่งปีถึงสิบปี และปรับตั้งแต่สองหมื่นบาทถึงสองแสนบาท ผู้ใดซ่อนเร้นบุคคลซึ่งถูกพาไปตามวรรคแรก ต้องระวางโทษเช่นเดียวกับผู้พา ไปนั้น ความผิดตามมาตรานี้ เป็นความผิดอันยอมความได้"},{"section":"มาตรา ๒๘๔/๑","num":"284/1","text":"ผู้ใดคุกคามทางเพศต่อผู้อื่น ถ้าการกระทํานั้นไม่เป็น ความผิดฐานอนาจาร ต้องระวางโทษจําคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่นบาท หรือ ทั้งจําทั้งปรับ ถ้าการกระทําความผิดตามวรรคหนึ่ง เป็นการกระทําอย่างต่อเนื่องหรือ กระทําซ้ำมากกว่าหนึ่งครั้งและเป็นเหตุให้ผู้อื่นไม่สามารถดําเนินชีวิตได้ตามปกติ ต้องระวาง โทษจําคุกไม่เกินสองปี หรือปรับไม่เกินสี่หมื่นบาท หรือทั้งจําทั้งปรับ ถ้าการกระทําความผิดตามวรรคหนึ่งหรือวรรคสอง เป็นการกระทําในที่ สาธารณสถาน ต่อหน้าธารกํานัล หรือในระบบคอมพิวเตอร์ที่ประชาชนทั่วไปเข้าถึงได้ ต้อง ระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ ถ้าการกระทําความผิดตามมาตรานี้ เป็นการกระทําแก่เด็กอายุไม่เกินสิบห้าปี โดยเด็กนั้นจะยินยอมหรือไม่ก็ตาม ต้องระวางโทษจําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสน บาท หรือทั้งจําทั้งปรับ ความผิดตามวรรคหนึ่ง วรรคสอง และวรรคสาม เป็นความผิดอันยอมความ ได้"},{"section":"มาตรา ๒๘๔/๒","num":"284/2","text":"ถ้าการกระทําความผิดตามมาตรา ๒๘๔/๑ เป็นการ กระทําโดยอาศัยเหตุที่ผู้กระทํามีอํานาจเหนือผู้ถูกกระทํา อันเนื่องจากความสัมพันธ์ในฐานะที่ เป็นผู้บังคับบัญชา นายจ้าง หรือผู้มีอํานาจเหนือประการอื่น ต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๘๔/๓","num":"284/3","text":"ในคดีคุกคามทางเพศ ถ้าความปรากฏแก่ศาลเองหรือ ตามข้อเสนอของพนักงานอัยการ โจทก์ ผู้เสียหาย หรือเจ้าพนักงาน ว่าจําเลยมีพฤติการณ์อัน ควรเชื่อได้ว่าจะคุกคามทางเพศหรือรบกวนการดําเนินชีวิตตามปกติของผู้เสียหายอย่างต่อ เนื่อง ไม่ว่าศาลจะลงโทษจําเลยหรือไม่ก็ตาม ศาลอาจสั่งห้ามจําเลยนั้นกระทําการอย่างหนึ่ง อย่างใดตามเงื่อนไขและภายในระยะเวลาที่ศาลกําหนดแต่ไม่เกินสองปี จําเลยซึ่งฝ่าฝืนคําสั่งห้ามของศาลตามวรรคหนึ่ง ต้องระวางโทษจําคุกไม่เกิน หกเดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๘๔/๔","num":"284/4","text":"ในการกระทําความผิดฐานคุกคามทางเพศตามมาตรา ๒๘๔/๑ วรรคสาม ที่เป็นการนําข้อมูลอันมีลักษณะลามกเข้าสู่ระบบคอมพิวเตอร์ที่ประชาชน ทั่วไปเข้าถึงได้ หากได้ความตามทางไต่สวนของศาลตามคําร้องของผู้เสียหายหรือเจ้าพนักงาน แล้ว เพื่อรักษาความสงบเรียบร้อยหรือศีลธรรมอันดีของประชาชน ศาลอาจมีคําสั่งให้ผู้นําเข้า ข้อมูลนั้นระงับการทําให้แพร่หลายและนําข้อมูลนั้นออกจากระบบคอมพิวเตอร์ภายในระยะ เวลาที่ศาลกําหนด และหากจําเป็นอาจสั่งให้ผู้ควบคุมหรือผู้ให้บริการระบบคอมพิวเตอร์ระงับ การทําให้แพร่หลายและนําข้อมูลนั้นออกจากระบบคอมพิวเตอร์ภายในระยะเวลาที่ศาลกําหนด หรืออาจสั่งให้เจ้าพนักงานที่มีอํานาจตามกฎหมายว่าด้วยการนั้นดําเนินการให้เป็นไปตามคําสั่ง ของศาลก็ได้ แล้วรายงานให้ศาลทราบภายในสิบห้าวัน ผู้นําเข้าข้อมูล ผู้ควบคุมหรือผู้ให้บริการระบบคอมพิวเตอร์ผู้ใดฝ่าฝืนคําสั่ง ของศาลตามวรรคหนึ่ง ต้องระวางโทษจําคุกไม่เกินหกเดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือ ทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๘๕","num":"285","text":"ทั้งนี้เฉพาะที่เกี่ยวกับมาตรา ๒๗๖ ความผิดต่อชีวิต ตามที่บัญญัติไว้ในมาตรา ๒๘๘ ถึงมาตรา ๒๙๐ ความผิดต่อร่างกาย ตามที่บัญญัติไว้ในมาตรา ๒๙๕ ถึงมาตรา ๒๙๘ ความผิดฐานทอดทิ้งเด็ก คนป่วยเจ็บหรือคนชรา ตามที่บัญญัติไว้ใน"},{"section":"มาตรา ๒๘๕/๑","num":"285/1","text":"เพิ่มโดยพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา (ฉบับที่ ๒๓) พ.ศ. ๒๕๕๘"},{"section":"มาตรา ๒๘๕/๒","num":"285/2","text":"เพิ่มโดยพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา (ฉบับที่ ๒๗) พ.ศ. ๒๕๖๒"},{"section":"มาตรา ๒๘๖","num":"286","text":"ผู้ใดกระทําด้วยประการใด ๆ ดังต่อไปนี้ ต้องระวางโทษจํา คุกไม่เกินยี่สิบปี และปรับไม่เกินสี่แสนบาท หรือจําคุกตลอดชีวิต (๑) ช่วยเหลือ ให้ความสะดวก หรือคุ้มครองการค้าประเวณีของผู้อื่น (๒) รับประโยชน์ไม่ว่ารูปแบบใดจากการค้าประเวณีของผู้อื่นหรือจากผู้ซึ่งค้า ประเวณี (๓) บังคับ ขู่เข็ญ หลอกลวง หรือใช้อํานาจครอบงําผู้อื่น หรือรับผู้อื่นเข้าทํา งานเพื่อการค้าประเวณี (๔) จัดให้มีการค้าประเวณีระหว่างผู้ซึ่งค้าประเวณีกับผู้ใช้บริการ (๕) ปกปิดหรืออําพรางแหล่งที่มาของรายได้หรือทรัพย์สินซึ่งได้มาจากการค้า ประเวณี (๖) อยู่ร่วมกับผู้ซึ่งค้าประเวณีหรือสมาคมกับผู้ซึ่งค้าประเวณีคนเดียวหรือ หลายคนเป็นอาจิณ และไม่สามารถแสดงที่มาของรายได้ในการดํารงชีพของตน (๗) ขัดขวางการดําเนินการของหน่วยงานที่ดูแลในการป้องกัน ควบคุม ช่วย เหลือ หรือให้การศึกษาแก่ผู้ซึ่งค้าประเวณี ผู้ซึ่งจะเข้าร่วมในการค้าประเวณี หรือผู้ซึ่งอาจได้รับ อันตรายจากการค้าประเวณี ความในวรรคหนึ่ง และ (๖) มิให้ใช้บังคับแก่ผู้รับประโยชน์ไม่ว่ารูปแบบใด ซึ่งพึงได้รับตามกฎหมายหรือตามธรรมจรรยา"},{"section":"มาตรา ๒๘๗","num":"287","text":"ผู้ใด (๑) เพื่อความประสงค์แห่งการค้า หรือโดยการค้า เพื่อการแจกจ่ายหรือเพื่อ การแสดงอวดแก่ประชาชน ทํา ผลิต มีไว้ นําเข้าหรือยังให้นําเข้าในราชอาณาจักร ส่งออกหรือ ยังให้ส่งออกไปนอกราชอาณาจักร พาไปหรือยังให้พาไปหรือทําให้แพร่หลายโดยประการใด ๆ ซึ่งเอกสาร ภาพเขียน ภาพพิมพ์ ภาพระบายสี สิ่งพิมพ์ รูปภาพ ภาพโฆษณา เครื่องหมาย รูป ถ่าย ภาพยนตร์ แถบบันทึกเสียง แถบบันทึกภาพหรือสิ่งอื่นใดอันลามก (๒) ประกอบการค้า หรือมีส่วนหรือเข้าเกี่ยวข้องในการค้าเกี่ยวกับวัตถุหรือสิ่ง ของลามกดังกล่าวแล้ว จ่ายแจกหรือแสดงอวดแก่ประชาชน หรือให้เช่าวัตถุหรือสิ่งของเช่นว่า นั้น (๓) เพื่อจะช่วยการทําให้แพร่หลาย หรือการค้าวัตถุหรือสิ่งของลามกดังกล่าว แล้ว โฆษณาหรือไขข่าวโดยประการใด ๆ ว่ามีบุคคลกระทําการอันเป็นความผิดตามมาตรานี้ หรือโฆษณาหรือไขข่าวว่าวัตถุ หรือสิ่งของลามกดังกล่าวแล้วจะหาได้จากบุคคลใด หรือโดยวิธี ใด ต้องระวางโทษ จําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจํา ทั้งปรับ"},{"section":"มาตรา ๒๘๗/๑","num":"287/1","text":"ผู้ใดครอบครองสื่อลามกอนาจารเด็กเพื่อแสวงหา ประโยชน์ในทางเพศสําหรับตนเองหรือผู้อื่น ต้องระวางโทษจําคุกไม่เกินห้าปี หรือปรับไม่เกิน หนึ่งแสนบาท หรือทั้งจําทั้งปรับ ถ้าผู้กระทําความผิดตามวรรคหนึ่งส่งต่อซึ่งสื่อลามกอนาจารเด็กแก่ผู้อื่น ต้อง ระวางโทษจําคุกไม่เกินเจ็ดปี หรือปรับไม่เกินหนึ่งแสนสี่หมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๘๗/๒","num":"287/2","text":"เพิ่มโดยพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา (ฉบับที่ ๒๔) พ.ศ. ๒๕๕๘ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐"},{"section":"มาตรา ๒๘๘","num":"288","text":"ผู้ใดฆ่าผู้อื่น ต้องระวางโทษประหารชีวิต จําคุกตลอดชีวิตหรือ จําคุกตั้งแต่สิบห้าปีถึงยี่สิบปี"},{"section":"มาตรา ๒๘๙","num":"289","text":"ผู้ใด (๑) ฆ่าบุพการี (๒) ฆ่าเจ้าพนักงาน ซึ่งกระทําการตามหน้าที่ หรือเพราะเหตุที่จะกระทํา หรือ ได้กระทําการตามหน้าที่ ฆ่าผู้ช่วยเหลือเจ้าพนักงาน ในการที่เจ้าพนักงานนั้นกระทําตามหน้าที่ หรือ เพราะเหตุที่บุคคลนั้นจะช่วยหรือได้ช่วยเจ้าพนักงานดังกล่าวแล้ว (๔) ฆ่าผู้อื่นโดยไตร่ตรองไว้ก่อน (๕) ฆ่าผู้อื่นโดยทรมานหรือโดยกระทําทารุณโหดร้าย (๖) ฆ่าผู้อื่นเพื่อตระเตรียมการ หรือเพื่อความสะดวกในการที่จะกระทําความ ผิดอย่างอื่น หรือ (๗) ฆ่าผู้อื่นเพื่อจะเอาหรือเอาไว้ซึ่งผลประโยชน์อันเกิดแต่การที่ตนได้กระทํา ความผิดอื่น เพื่อปกปิดความผิดอื่นของตนหรือเพื่อหลีกเลี่ยงให้พ้นอาญา ในความผิดอื่นที่ตน ได้กระทําไว้ ต้องระวางโทษประหารชีวิต"},{"section":"มาตรา ๒๙๐","num":"290","text":"ผู้ใดมิได้มีเจตนาฆ่า แต่ทําร้ายผู้อื่นจนเป็นเหตุให้ผู้นั้นถึงแก่ ความตาย ต้องระวางโทษจําคุกตั้งแต่สามปีถึงสิบห้าปี ถ้าความผิดนั้นมีลักษณะประการหนึ่งประการใดดังที่บัญญัติไว้ในมาตรา ๒๘๙ ผู้กระทําต้องระวางโทษจําคุกตั้งแต่สามปีถึงยี่สิบปี"},{"section":"มาตรา ๒๙๑","num":"291","text":"ผู้ใดกระทําโดยประมาท และการกระทํานั้นเป็นเหตุให้ผู้อื่น ถึงแก่ความตาย ต้องระวางโทษจําคุกไม่เกินสิบปี และปรับไม่เกินสองแสนบาท"},{"section":"มาตรา ๒๙๒","num":"292","text":"ผู้ใดกระทําด้วยการปฏิบัติอันทารุณ หรือด้วยปัจจัยคล้าย คลึงกันแก่บุคคลซึ่งต้องพึ่งตน ในการดํารงชีพหรือในการอื่นใด เพื่อให้บุคคลนั้นฆ่าตนเอง ถ้า การฆ่าตนเองนั้นได้เกิดขึ้นหรือได้มีการพยายามฆ่าตนเอง ต้องระวางโทษจําคุกไม่เกินเจ็ดปี และปรับไม่เกินหนึ่งแสนสี่หมื่นบาท"},{"section":"มาตรา ๒๙๓","num":"293","text":"ผู้ใดช่วยหรือยุยงเด็กอายุยังไม่เกินสิบหกปี หรือผู้ซึ่งไม่ สามารถเข้าใจว่าการกระทําของตนมีสภาพหรือสาระสําคัญอย่างไรหรือไม่สามารถบังคับการ กระทําของตนได้ ให้ฆ่าตนเอง ถ้าการฆ่าตนเองนั้นได้เกิดขึ้นหรือได้มีการพยายามฆ่าตนเอง ต้องระวางโทษจําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๙๔","num":"294","text":"ผู้ใดเข้าร่วมในการชุลมุนต่อสู้ระหว่างบุคคลตั้งแต่สามคน ขึ้นไป และบุคคลหนึ่งบุคคลใดไม่ว่าจะเป็นผู้ที่เข้าร่วมในการนั้นหรือไม่ ถึงแก่ความตายโดยการ กระทําในการชุลมุนต่อสู้นั้น ต้องระวางโทษจําคุกไม่เกินสองปี หรือปรับไม่เกินสี่หมื่นบาท หรือ ทั้งจําทั้งปรับ ถ้าผู้ที่เข้าร่วมในการชุลมุนต่อสู้นั้นแสดงได้ว่า ได้กระทําไป เพื่อห้ามการชุลมุน ต่อสู้นั้น หรือเพื่อป้องกันโดยชอบด้วยกฎหมาย ผู้นั้นไม่ต้องรับโทษ หมวด ๒ ความผิดต่อร่างกาย"},{"section":"มาตรา ๒๙๕","num":"295","text":"ผู้ใดทําร้ายผู้อื่นจนเป็นเหตุให้เกิดอันตรายแก่กาย หรือ จิตใจของผู้อื่นนั้น ผู้นั้นกระทําความผิดฐานทําร้ายร่างกาย ต้องระวางโทษจําคุกไม่เกินสองปี หรือปรับไม่เกินสี่หมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๙๖","num":"296","text":"ผู้ใดกระทําความผิดฐานทําร้ายร่างกาย ถ้าความผิดนั้นมี ลักษณะประการหนึ่งประการใดดังที่บัญญัติไว้ในมาตรา ๒๘๙ ต้องระวางโทษจําคุกไม่เกินสาม ปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๙๗","num":"297","text":"ผู้ใดกระทําความผิดฐานทําร้ายร่างกายจนเป็นเหตุให้ผู้ถูก กระทําร้ายรับอันตรายสาหัส ต้องระวางโทษจําคุกตั้งแต่หกเดือนถึงสิบปี และปรับตั้งแต่หนึ่ง หมื่นบาทถึงสองแสนบาท อันตรายสาหัสนั้น คือ (๑) ตาบอด หูหนวก ลิ้นขาด หรือเสียฆานประสาท (๒) เสียอวัยวะสืบพันธุ์หรือความสามารถสืบพันธุ์ (๓) เสียแขน ขา มือ เท้า นิ้วหรืออวัยวะอื่นใด (๔) หน้าเสียโฉมอย่างติดตัว (๕) แท้งลูก จิตพิการอย่างติดตัว (๗) ทุพพลภาพ หรือป่วยเจ็บเรื้อรังซึ่งอาจถึงตลอดชีวิต (๘) ทุพพลภาพหรือป่วยเจ็บด้วยอาการทุกขเวทนาเกินกว่ายี่สิบวัน หรือจน ประกอบกรณียกิจตามปกติไม่ได้เกินกว่ายี่สิบวัน"},{"section":"มาตรา ๒๙๘","num":"298","text":"ผู้ใดกระทําความผิดตามมาตรา ๒๙๗ ถ้าความผิดนั้นมี ลักษณะประการหนึ่งประการใดดังที่บัญญัติไว้ในมาตรา ๒๘๙ ต้องระวางโทษจําคุกตั้งแต่สอง ปีถึงสิบปี และปรับตั้งแต่สี่หมื่นบาทถึงสองแสนบาท"},{"section":"มาตรา ๒๙๙","num":"299","text":"ผู้ใดเข้าร่วมในการชุลมุนต่อสู้ระหว่างบุคคลแต่สามคนขึ้น ไป และบุคคลหนึ่งบุคคลใดไม่ว่าจะเป็นผู้ที่เข้าร่วมในการนั้นหรือไม่รับอันตรายสาหัส โดยการ กระทําในการชุลมุนต่อสู้นั้น ต้องระวางโทษจําคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่นบาท หรือทั้งจําทั้งปรับ ถ้าผู้ที่เข้าร่วมในการชุลมุนต่อสู้นั้นแสดงได้ว่า ได้กระทําไปเพื่อห้ามการชุลมุน ต่อสู้นั้น หรือเพื่อป้องกันโดยชอบด้วยกฎหมาย ผู้นั้นไม่ต้องรับโทษ"},{"section":"มาตรา ๓๐๐","num":"300","text":"ผู้ใดกระทําโดยประมาท และการกระทํานั้นเป็นเหตุให้ผู้อื่น รับอันตรายสาหัส ต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้ง ปรับ หมวด ๓ ความผิดฐานทําให้แท้งลูก"},{"section":"มาตรา ๓๐๑","num":"301","text":"แก้ไขเพิ่มเติมโดยมาตรา ๓ พระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๘) พ.ศ. ๒๕๖๔ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐"},{"section":"มาตรา ๓๐๒","num":"302","text":"ผู้ใดทําให้หญิงแท้งลูกโดยหญิงนั้นยินยอม ต้องระวางโทษ จําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจําทั้งปรับ ถ้าการกระทํานั้นเป็นเหตุให้หญิงรับอันตรายสาหัสอย่างอื่นด้วย ผู้กระทําต้อง ระวางโทษจําคุกไม่เกินเจ็ดปี หรือปรับไม่เกินหนึ่งแสนสี่หมื่นบาท หรือทั้งจําทั้งปรับ ถ้าการกระทํานั้นเป็นเหตุให้หญิงถึงแก่ความตาย ผู้กระทําต้องระวางโทษจํา คุกไม่เกินสิบปี และปรับไม่เกินสองแสนบาท"},{"section":"มาตรา ๓๐๓","num":"303","text":"ผู้ใดทําให้หญิงแท้งลูกโดยหญิงนั้นไม่ยินยอม ต้องระวาง โทษจําคุกไม่เกินเจ็ดปี หรือปรับไม่เกินหนึ่งแสนสี่หมื่นบาท หรือทั้งจําทั้งปรับ ถ้าการกระทํานั้นเป็นเหตุให้หญิงรับอันตรายสาหัสอย่างอื่นด้วยผู้กระทําต้อง ระวางโทษจําคุกตั้งแต่หนึ่งปีถึงสิบปี และปรับตั้งแต่สองหมื่นบาทถึงสองแสนบาท ถ้าการกระทํานั้นเป็นเหตุให้หญิงถึงแก่ความตาย ผู้กระทําต้องระวางโทษ จําคุกตั้งแต่ห้าปีถึงยี่สิบปี และปรับตั้งแต่หนึ่งแสนบาทถึงสี่แสนบาท"},{"section":"มาตรา ๓๐๔","num":"304","text":"ผู้ใดเพียงแต่พยายามกระทําความผิดตามมาตรา ๓๐๑ หรือ"},{"section":"มาตรา ๓๐๕","num":"305","text":"ถ้าการกระทําความผิดตามมาตรา ๓๐๑ หรือมาตรา ๓๐๒ เป็นการกระทําของผู้ประกอบวิชาชีพเวชกรรมและตามหลักเกณฑ์ของแพทยสภาในกรณีดังต่อ ไปนี้ ผู้กระทําไม่มีความผิด (๑) จําเป็นต้องกระทําเนื่องจากหากหญิงตั้งครรภ์ต่อไปจะเสี่ยงต่อการได้รับ อันตรายต่อสุขภาพทางกายหรือจิตใจของหญิงนั้น (๒) จําเป็นต้องกระทําเนื่องจากมีความเสี่ยงอย่างมากหรือมีเหตุผลทางการ แพทย์อันควรเชื่อได้ว่าหากทารกคลอดออกมาจะมีความผิดปกติถึงขนาดทุพพลภาพอย่างร้าย แรง (๓) หญิงยืนยันต่อผู้ประกอบวิชาชีพเวชกรรมว่าตนมีครรภ์เนื่องจากมีการ กระทําความผิดเกี่ยวกับเพศ (๔) หญิงซึ่งมีอายุครรภ์ไม่เกินสิบสองสัปดาห์ยืนยันที่จะยุติการตั้งครรภ์ (๕) หญิงซึ่งมีอายุครรภ์เกินสิบสองสัปดาห์ แต่ไม่เกินยี่สิบสัปดาห์ ยืนยันที่จะ ยุติการตั้งครรภ์ภายหลังการตรวจและรับคําปรึกษาทางเลือกจากผู้ประกอบวิชาชีพเวชกรรม และผู้ประกอบวิชาชีพอื่นตามหลักเกณฑ์และวิธีการที่รัฐมนตรีว่าการกระทรวงสาธารณสุข ประกาศกําหนดโดยคําแนะนําของแพทยสภาและหน่วยงานที่เกี่ยวข้องตามกฎหมายว่าด้วย การป้องกันและแก้ไขปัญหาการตั้งครรภ์ในวัยรุ่น หมวด ๔ ความผิดฐานทอดทิ้งเด็ก คนป่วยเจ็บหรือคนชรา"},{"section":"มาตรา ๓๐๖","num":"306","text":"ถึงมาตรา ๓๐๘ (๗) ความผิดต่อเสรีภาพ ตามที่บัญญัติไว้ในมาตรา ๓๐๙ มาตรา ๓๑๐มาตรา ๓๑๒ ถึงมาตรา ๓๑๕ และมาตรา ๓๑๗ ถึงมาตรา ๓๒๐ (๘) ความผิดฐานลักทรัพย์และวิ่งราวทรัพย์ ตามที่บัญญัติไว้ในมาตรา ๓๓๔ ถึงมาตรา ๓๓๖ (๙) ความผิดฐานกรรโชก รีดเอาทรัพย์ ชิงทรัพย์ และปล้นทรัพย์ ตามที่ บัญญัติไว้ในมาตรา ๓๓๗ ถึงมาตรา ๓๔๐ ความผิดฐานฉ้อโกง ตามที่บัญญัติไว้ในมาตรา ๓๔๑ ถึงมาตรา ๓๔๔"},{"section":"มาตรา ๓๐๗","num":"307","text":"ผู้ใดมีหน้าที่ตามกฎหมายหรือตามสัญญาต้องดูแลผู้ซึ่งพึ่ง ตนเองมิได้ เพราะอายุ ความป่วยเจ็บ กายพิการหรือจิตพิการ ทอดทิ้งผู้ซึ่งพึ่งตนเองมิได้นั้นเสีย โดยประการที่น่าจะเป็นเหตุให้เกิดอันตรายแก่ชีวิต ต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับ ไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๐๘","num":"308","text":"ถ้าการกระทําความผิดตามมาตรา ๓๐๖ หรือมาตรา ๓๐๗ เป็น เหตุให้ผู้ถูกทอดทิ้งถึงแก่ความตายหรือรับอันตรายสาหัส ผู้กระทําต้องระวางโทษดังที่บัญญัติ ไว้ในมาตรา ๒๙๐ มาตรา ๒๙๗ หรือมาตรา ๒๙๘ นั้น ลักษณะ ๑๑ ความผิดเกี่ยวกับเสรีภาพและชื่อเสียง หมวด ๑ ความผิดต่อเสรีภาพ"},{"section":"มาตรา ๓๐๙","num":"309","text":"ผู้ใดข่มขืนใจผู้อื่นให้กระทําการใด ไม่กระทําการใดหรือ จํายอมต่อสิ่งใด โดยทําให้กลัวว่าจะเกิดอันตรายต่อชีวิต ร่างกาย เสรีภาพ ชื่อเสียงหรือ ทรัพย์สินของผู้ถูกข่มขืนใจนั้นเองหรือของผู้อื่น หรือโดยใช้กําลังประทุษร้ายจนผู้ถูกข่มขืนใจ ต้องกระทําการนั้น ไม่กระทําการนั้นหรือจํายอมต่อสิ่งนั้น ต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาทหรือทั้งจําทั้งปรับ ถ้าความผิดตามวรรคแรกได้กระทําโดยมีอาวุธ หรือโดยร่วมกระทําความผิด ด้วยกันตั้งแต่ห้าคนขึ้นไป หรือได้กระทําเพื่อให้ผู้ถูกข่มขืนใจทํา ถอน ทําให้เสียหาย หรือทําลาย เอกสารสิทธิอย่างใด ผู้กระทําต้องระวางโทษจําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจําทั้งปรับ ถ้ากระทําโดยอ้างอํานาจอั้งยี่หรือซ่องโจร ไม่ว่าอั้งยี่หรือซ่องโจรนั้นจะมีอยู่ หรือไม่ ผู้กระทําต้องระวางโทษจําคุกตั้งแต่หนึ่งปีถึงเจ็ดปี และปรับตั้งแต่สองหมื่นบาทถึงหนึ่ง แสนสี่หมื่นบาท"},{"section":"มาตรา ๓๑๐","num":"310","text":"ผู้ใดหน่วงเหนี่ยวหรือกักขังผู้อื่น หรือกระทําด้วยประการใด ให้ผู้อื่นปราศจากเสรีภาพในร่างกาย ต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหก หมื่นบาทหรือทั้งจําทั้งปรับ ถ้าการกระทําความผิดตามวรรคแรก เป็นเหตุให้ผู้ถูกหน่วงเหนี่ยวถูกกักขัง หรือต้องปราศจากเสรีภาพในร่างกายนั้นถึงแก่ความตาย หรือรับอันตรายสาหัส ผู้กระทําต้อง ระวางโทษดังที่บัญญัติไว้ในมาตรา ๒๙๐ มาตรา ๒๙๗ หรือมาตรา ๒๙๘ นั้น"},{"section":"มาตรา ๓๑๐ ทวิ","num":"310 ทวิ","text":"เพิ่มโดยพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา (ฉบับที่ ๑๓) พ.ศ. ๒๕๓๗ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๑๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวล กฎหมายอาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐"},{"section":"มาตรา ๓๑๑","num":"311","text":"ผู้ใดกระทําโดยประมาท และการกระทํานั้นเป็นเหตุให้ผู้อื่น ถูกหน่วงเหนี่ยว ถูกกักขังหรือต้องปราศจากเสรีภาพในร่างกาย ต้องระวางโทษจําคุกไม่เกิน หนึ่งปี หรือปรับไม่เกินสองหมื่นบาท หรือทั้งจําทั้งปรับ ถ้าการกระทําความผิดตามวรรคแรก เป็นเหตุให้ผู้ถูกหน่วงเหนี่ยวถูกกักขัง หรือต้องปราศจากเสรีภาพในร่างกายนั้นถึงแก่ความตายหรือรับอันตรายสาหัส ผู้กระทําต้อง ระวางโทษดังที่บัญญัติไว้ในมาตรา ๒๙๑ หรือมาตรา ๓๐๐"},{"section":"มาตรา ๓๑๒","num":"312","text":"ผู้ใดเพื่อจะเอาคนลงเป็นทาส หรือให้มีฐานะคล้ายทาสนํา เข้าในหรือส่งออกไปนอกราชอาณาจักร พามาจากที่ใด ซื้อ ขาย จําหน่าย รับหรือหน่วงเหนี่ยว ซึ่งบุคคลหนึ่งบุคคลใด ต้องระวางโทษจําคุกไม่เกินเจ็ดปี และปรับไม่เกินหนึ่งแสนสี่หมื่นบาท"},{"section":"มาตรา ๓๑๒ ทวิ","num":"312 ทวิ","text":"ถ้าการกระทําความผิดตามมาตรา ๓๑๐ ทวิ หรือมาตรา ๓๑๒ เป็นการกระทําต่อเด็กอายุไม่เกินสิบห้าปี ผู้กระทําต้องระวางโทษ จําคุกตั้งแต่สามปี ถึงสิบปี และปรับไม่เกินสองแสนบาท ถ้าการกระทําความผิดตามวรรคแรก หรือมาตรา ๓๑๐ ทวิ หรือมาตรา ๓๑๒ เป็นเหตุให้ผู้ถูกกระทํา (๑) รับอันตรายแก่กายหรือจิตใจ ผู้กระทําต้องระวางโทษจําคุกตั้งแต่ห้าปีถึง สิบห้าปี และปรับไม่เกินสามแสนบาท (๒) รับอันตรายสาหัส ผู้กระทําต้องระวางโทษจําคุกตลอดชีวิต หรือจําคุก ตั้งแต่เจ็ดปีถึงยี่สิบปี ถึงแก่ความตาย ผู้กระทําต้องระวางโทษประหารชีวิต จําคุกตลอดชีวิต หรือจําคุกตั้งแต่สิบห้าปีถึงยี่สิบปี"},{"section":"มาตรา ๓๑๒ ตรี","num":"312 ตรี","text":"ผู้ใดโดยทุจริตรับไว้ จําหน่าย เป็นธุระจัดหา ล่อไป หรือ พาไปซึ่งบุคคลอายุเกินสิบห้าปีแต่ยังไม่เกินสิบแปดปี แม้ผู้นั้นจะยินยอมก็ตาม ต้องระวางโทษ จําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจําทั้งปรับ ถ้าการกระทําความผิดตามวรรคแรกเป็นการกระทําแก่เด็กอายุยังไม่เกินสิบ ห้าปี ผู้กระทําต้องระวางโทษจําคุกไม่เกินเจ็ดปี หรือปรับไม่เกินหนึ่งแสนสี่หมื่นบาท หรือทั้งจํา ทั้งปรับ"},{"section":"มาตรา ๓๑๓","num":"313","text":"ผู้ใดเพื่อให้ได้มาซึ่งค่าไถ่ (๑) เอาตัวเด็กอายุไม่เกินสิบห้าปีไป (๒) เอาตัวบุคคลอายุกว่าสิบห้าปีไป โดยใช้อุบายหลอกลวง ขู่เข็ญ ใช้กําลัง ประทุษร้าย ใช้อํานาจครอบงําผิดคลองธรรม หรือใช้วิธีข่มขืนใจด้วยประการอื่นใด หรือ (๓) หน่วงเหนี่ยวหรือกักขังบุคคลใด ต้องระวางโทษ จําคุกตั้งแต่สิบห้าปีถึงยี่สิบปี และปรับตั้งแต่สามแสนบาท ถึงสี่แสนบาท หรือจําคุกตลอดชีวิต หรือประหารชีวิต ถ้าการกระทําความผิดตามวรรคแรกเป็นเหตุให้ผู้ถูกเอาตัวไป ผู้ถูกหน่วง เหนี่ยว หรือผู้ถูกกักขังนั้นรับอันตรายสาหัส หรือเป็นการกระทําโดยทรมาน หรือโดยทารุณ โหดร้าย จนเป็นเหตุให้ผู้ถูกกระทํานั้นรับอันตรายแก่กาย หรือจิตใจ ผู้กระทําต้องระวาง โทษประหารชีวิตหรือจําคุกตลอดชีวิต ถ้าการกระทําความผิดนั้นเป็นเหตุให้ผู้ถูกเอาตัวไป ผู้ถูกหน่วงเหนี่ยว หรือผู้ถูก กักขังนั้นถึงแก่ความตาย ผู้กระทําต้องระวางโทษประหารชีวิต"},{"section":"มาตรา ๓๑๔","num":"314","text":"ผู้ใดเป็นผู้สนับสนุนในการกระทําความผิดตามมาตรา ๓๑๓ต้อง ระวางโทษเช่นเดียวกับตัวการในความผิดนั้น"},{"section":"มาตรา ๓๑๕","num":"315","text":"ผู้ใดกระทําการเป็นคนกลาง โดยเรียก รับหรือยอมจะรับ ทรัพย์สินหรือประโยชน์อย่างใดที่มิควรได้จากผู้กระทําความผิดตามมาตรา ๓๑๓ หรือจากผู้ที่ จะให้ค่าไถ่ ต้องระวางโทษ จําคุกตั้งแต่สิบห้าปีถึงยี่สิบปี และปรับตั้งแต่สามแสนบาทถึงสี่ แสนบาท หรือจําคุกตลอดชีวิต"},{"section":"มาตรา ๓๑๖","num":"316","text":"ถ้าผู้กระทําความผิดตามมาตรา ๓๑๓ มาตรา ๓๑๔ หรือมาตรา ๓๑๕ จัดให้ผู้ถูกเอาตัวไป ผู้ถูกหน่วงเหนี่ยวหรือผู้ถูกกักขังได้รับเสรีภาพก่อนศาลชั้นต้น พิพากษา โดยผู้นั้นมิได้รับอันตรายสาหัสหรือตกอยู่ในภาวะอันใกล้จะเป็นอันตรายต่อชีวิต ให้ ลงโทษน้อยกว่าที่กฎหมายกําหนดไว้ แต่ไม่น้อยกว่ากึ่งหนึ่ง"},{"section":"มาตรา ๓๑๗","num":"317","text":"ผู้ใดโดยปราศจากเหตุอันสมควร พรากเด็กอายุยังไม่เกิน สิบห้าปีไปเสียจากบิดามารดา ผู้ปกครอง หรือผู้ดูแล ต้องระวางโทษ จําคุกตั้งแต่สามปีถึง สิบห้าปี และปรับตั้งแต่หกหมื่นบาทถึงสามแสนบาท ผู้ใดโดยทุจริต ซื้อ จําหน่าย หรือรับตัวเด็กซึ่งถูกพรากตามวรรคแรก ต้อง ระวางโทษเช่นเดียวกับผู้พรากนั้น ถ้าความผิดตามมาตรานี้ได้กระทําเพื่อหากําไร หรือเพื่อการอนาจาร ผู้กระทํา ต้องระวางโทษจําคุกตั้งแต่ห้าปีถึงยี่สิบปี และปรับตั้งแต่หนึ่งแสนบาทถึงสี่แสนบาท"},{"section":"มาตรา ๓๑๘","num":"318","text":"ผู้ใดพรากผู้เยาว์อายุกว่าสิบห้าปี แต่ยังไม่เกินสิบแปดปีไป เสียจากบิดามารดา ผู้ปกครอง หรือผู้ดูแล โดยผู้เยาว์นั้นไม่เต็มใจไปด้วย ต้องระวางโทษ จําคุกตั้งแต่สองปีถึงสิบปี และปรับตั้งแต่สี่หมื่นบาทถึงสองแสนบาท ผู้ใดโดยทุจริต ซื้อ จําหน่าย หรือรับตัวผู้เยาว์ซึ่งถูกพรากตามวรรคแรก ต้อง ระวางโทษเช่นเดียวกับผู้พรากนั้น ถ้าความผิดตามมาตรานี้ได้กระทําเพื่อหากําไร หรือเพื่อการอนาจาร ผู้กระทํา ต้องระวางโทษ จําคุกตั้งแต่สามปีถึงสิบห้าปี และปรับตั้งแต่หกหมื่นบาทถึงสามแสนบาท"},{"section":"มาตรา ๓๑๙","num":"319","text":"ผู้ใดพรากผู้เยาว์อายุกว่าสิบห้าปี แต่ยังไม่เกินสิบแปดปีไป เสียจากบิดามารดา ผู้ปกครอง หรือผู้ดูแล เพื่อหากําไรหรือเพื่อการอนาจาร โดยผู้เยาว์นั้น เต็มใจไปด้วย ต้องระวางโทษ จําคุกตั้งแต่สองปีถึงสิบปี และปรับตั้งแต่สี่หมื่นบาทถึงสอง แสนบาท ผู้ใดโดยทุจริต ซื้อ จําหน่าย หรือรับตัวผู้เยาว์ซึ่งถูกพรากตามวรรคแรก ต้อง ระวางโทษเช่นเดียวกับผู้พรากนั้น"},{"section":"มาตรา ๓๒๐","num":"320","text":"ผู้ใดใช้อุบายหลอกลวง ขู่เข็ญ ใช้กําลังประทุษร้าย ใช้ อํานาจครอบงําผิดคลองธรรม หรือใช้วิธีข่มขืนใจด้วยประการอื่นใด พาหรือส่งคนออกไปนอก ราชอาณาจักร ต้องระวางโทษ จําคุกตั้งแต่สองปีถึงสิบปี หรือปรับตั้งแต่สี่หมื่นบาทถึงสอง แสนบาท หรือทั้งจําทั้งปรับ ถ้าการกระทําความผิดตามวรรคแรกได้กระทําเพื่อให้ผู้ถูกพาหรือส่งไปนั้นตก อยู่ในอํานาจของผู้อื่นโดยมิชอบด้วยกฎหมาย หรือเพื่อละทิ้งให้เป็นคนอนาถา ผู้กระทําต้อง ระวางโทษจําคุกตั้งแต่สามปีถึงสิบห้าปี และปรับตั้งแต่หกหมื่นบาทถึงสามแสนบาท"},{"section":"มาตรา ๓๒๑","num":"321","text":"ความผิดตามมาตรา ๓๐๙ วรรคแรก มาตรา ๓๑๐ วรรคแรก และมาตรา ๓๑๑ วรรคแรก เป็นความผิดอันยอมความได้"},{"section":"มาตรา ๓๒๑/๑","num":"321/1","text":"เพิ่มโดยพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา (ฉบับที่ ๒๓) พ.ศ. ๒๕๕๘ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐"},{"section":"มาตรา ๓๒๒","num":"322","text":"ผู้ใดเปิดผนึกหรือเอาจดหมาย โทรเลขหรือเอกสารใด ๆ ซึ่ง ปิดผนึกของผู้อื่นไป เพื่อล่วงรู้ข้อความก็ดี เพื่อนําข้อความในจดหมายโทรเลขหรือเอกสารเช่นว่า นั้นออกเปิดเผยก็ดี ถ้าการกระทํานั้นน่าจะเกิดความเสียหายแก่ผู้หนึ่งผู้ใด ต้องระวางโทษจําคุก ไม่เกินหกเดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๒๓","num":"323","text":"ผู้ใดล่วงรู้หรือได้มาซึ่งความลับของผู้อื่นโดยเหตุที่เป็น เจ้าพนักงานผู้มีหน้าที่ โดยเหตุที่ประกอบอาชีพเป็นแพทย์ เภสัชกร คนจําหน่ายยา นางผดุง ครรภ์ ผู้พยาบาล นักบวช หมอความ ทนายความหรือผู้สอบบัญชี หรือโดยเหตุที่เป็นผู้ช่วยใน การประกอบอาชีพนั้น แล้วเปิดเผยความลับนั้นในประการที่น่าจะเกิดความเสียหายแก่ผู้หนึ่งผู้ ใด ต้องระวางโทษจําคุกไม่เกินหกเดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือทั้งจําทั้งปรับ ผู้รับการศึกษาอบรมในอาชีพดังกล่าวในวรรคแรก เปิดเผยความลับของผู้อื่น อันตนได้ล่วงรู้หรือได้มาในการศึกษาอบรมนั้น ในประการที่น่าจะเกิดความเสียหายแก่ผู้หนึ่งผู้ ใด ต้องระวางโทษเช่นเดียวกัน"},{"section":"มาตรา ๓๒๔","num":"324","text":"ผู้ใดโดยเหตุที่ตนมีตําแหน่งหน้าที่ วิชาชีพหรืออาชีพอันเป็น ที่ไว้วางใจ ล่วงรู้หรือได้มาซึ่งความลับของผู้อื่นเกี่ยวกับอุตสาหกรรม การค้นพบ หรือการนิมิต ในวิทยาศาสตร์ เปิดเผยหรือใช้ความลับนั้นเพื่อประโยชน์ตนเองหรือผู้อื่น ต้องระวางโทษจําคุก ไม่เกินหกเดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๒๕","num":"325","text":"ความผิดในหมวดนี้เป็นความผิดอันยอมความได้ หมวด ๓ ความผิดฐานหมิ่นประมาท"},{"section":"มาตรา ๓๒๖","num":"326","text":"ผู้ใดใส่ความผู้อื่นต่อบุคคลที่สาม โดยประการที่น่าจะทําให้ ผู้อื่นนั้นเสียชื่อเสียง ถูกดูหมิ่น หรือถูกเกลียดชัง ผู้นั้นกระทําความผิดฐานหมิ่นประมาท ต้อง ระวางโทษจําคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๒๗","num":"327","text":"ผู้ใดใส่ความผู้ตายต่อบุคคลที่สามและการใส่ความนั้นน่าจะ เป็นเหตุให้ บิดา มารดา คู่สมรสหรือบุตรของผู้ตายเสียชื่อเสียง ถูกดูหมิ่นหรือถูกเกลียดชัง ผู้นั้น กระทําความผิดฐานหมิ่นประมาท ต้องระวางโทษดังบัญญัติไว้ในมาตรา ๓๒๖ นั้น"},{"section":"มาตรา ๓๒๘","num":"328","text":"ถ้าความผิดฐานหมิ่นประมาทได้กระทําโดยการโฆษณา ด้วยเอกสาร ภาพวาด ภาพระบายสี ภาพยนตร์ ภาพหรือตัวอักษรที่ทําให้ปรากฏไม่ว่าด้วยวิธีใด ๆ แผ่นเสียง หรือสิ่งบันทึกเสียง บันทึกภาพ หรือบันทึกอักษร กระทําโดยการกระจายเสียง หรือ การกระจายภาพ หรือโดยกระทําการป่าวประกาศด้วยวิธีอื่น ผู้กระทําต้องระวางโทษจําคุกไม่ เกินสองปี และปรับไม่เกินสองแสนบาท"},{"section":"มาตรา ๓๒๙","num":"329","text":"ผู้ใดแสดงความคิดเห็นหรือข้อความใดโดยสุจริต (๑) เพื่อความชอบธรรม ป้องกันตนหรือป้องกันส่วนได้เสียเกี่ยวกับตนตาม คลองธรรม (๒) ในฐานะเป็นเจ้าพนักงานปฏิบัติการตามหน้าที่ (๓) ติชมด้วยความเป็นธรรม ซึ่งบุคคลหรือสิ่งใดอันเป็นวิสัยของประชาชนย่อม กระทํา หรือ ในการแจ้งข่าวด้วยความเป็นธรรมเรื่องการดําเนินการอันเปิดเผยในศาล หรือในการประชุม ผู้นั้นไม่มีความผิดฐานหมิ่นประมาท"},{"section":"มาตรา ๓๓๐","num":"330","text":"ในกรณีหมิ่นประมาท ถ้าผู้ถูกหาว่ากระทําความผิด พิสูจน์ได้ว่า ข้อที่หาว่าเป็นหมิ่นประมาทนั้นเป็นความจริง ผู้นั้นไม่ต้องรับโทษ แต่ห้ามไม่ให้พิสูจน์ ถ้าข้อที่หาว่าเป็นหมิ่นประมาทนั้นเป็นการใส่ความในเรื่อง ส่วนตัว และการพิสูจน์จะไม่เป็นประโยชน์แก่ประชาชน"},{"section":"มาตรา ๓๓๑","num":"331","text":"คู่ความ หรือทนายความของคู่ความ ซึ่งแสดงความคิดเห็นหรือ ข้อความในกระบวนพิจารณาคดีในศาล เพื่อประโยชน์แก่คดีของตน ไม่มีความผิดฐานหมิ่น ประมาท"},{"section":"มาตรา ๓๓๒","num":"332","text":"ในคดีหมิ่นประมาทซึ่งมีคําพิพากษาว่าจําเลยมีความผิดศาล อาจสั่ง ให้ยึด และทําลายวัตถุหรือส่วนของวัตถุที่มีข้อความหมิ่นประมาท ให้โฆษณาคําพิพากษาทั้งหมด หรือแต่บางส่วนในหนังสือพิมพ์หนึ่งฉบับ หรือหลายฉบับ ครั้งเดียวหรือหลายครั้ง โดยให้จําเลยเป็นผู้ชําระค่าโฆษณา"},{"section":"มาตรา ๓๓๓","num":"333","text":"ความผิดในหมวดนี้เป็นความผิดอันยอมความได้ ถ้าผู้เสียหายในความผิดฐานหมิ่นประมาทตายเสียก่อนร้องทุกข์ ให้บิดา มารดา คู่สมรสหรือบุตรของผู้เสียหายร้องทุกข์ได้ และให้ถือว่าเป็นผู้เสียหาย ลักษณะ ๑๒ ความผิดเกี่ยวกับทรัพย์ หมวด ๑ ความผิดฐานลักทรัพย์และวิ่งราวทรัพย์"},{"section":"มาตรา ๓๓๔","num":"334","text":"ผู้ใดเอาทรัพย์ของผู้อื่น หรือที่ผู้อื่นเป็นเจ้าของรวมอยู่ด้วย ไปโดยทุจริต ผู้นั้นกระทําความผิดฐานลักทรัพย์ ต้องระวางโทษจําคุกไม่เกินสามปี และปรับไม่ เกินหกหมื่นบาท"},{"section":"มาตรา ๓๓๕","num":"335","text":"ผู้ใดลักทรัพย์ ในเวลากลางคืน ในที่หรือบริเวณที่มีเหตุเพลิงไหม้ การระเบิด อุทกภัย หรือในที่หรือบริเวณ ที่มีอุบัติเหตุ เหตุทุกขภัยแก่รถไฟ หรือยานพาหนะอื่นที่ประชาชนโดยสาร หรือภัยพิบัติอื่น ทํานองเดียวกันหรืออาศัยโอกาสที่มีเหตุเช่นว่านั้น หรืออาศัยโอกาสที่ประชาชนกําลังตื่นกลัว ภยันอันตรายใด ๆ โดยทําอันตรายสิ่งกีดกั้นสําหรับคุ้มครองบุคคลหรือทรัพย์ หรือโดยผ่าน สิ่งเช่นว่านั้นเข้าไปด้วยประการใด ๆ โดยเข้าทางช่องทางซึ่งได้ทําขึ้นโดยไม่ได้จํานงให้เป็นทางคนเข้า หรือเข้า ทางช่องทางซึ่งผู้เป็นใจเปิดไว้ให้ โดยแปลงตัวหรือปลอมตัวเป็นผู้อื่น มอมหน้าหรือทําด้วยประการอื่นเพื่อ ไม่ให้เห็นหรือจําหน้าได้ โดยลวงว่าเป็นเจ้าพนักงาน โดยมีอาวุธ หรือโดยร่วมกระทําความผิดด้วยกันตั้งแต่สองคนขึ้นไป (๘) ในเคหสถาน สถานที่ราชการหรือสถานที่ที่จัดไว้เพื่อให้บริการสาธารณที่ ตนได้เข้าไปโดยไม่ได้รับอนุญาต หรือซ่อนตัวอยู่ในสถานที่นั้น ๆ (๙) ในสถานที่บูชาสาธารณ สถานีรถไฟ ท่าอากาศยานที่จอดรถหรือเรือ สาธารณะ สาธารณสถานสําหรับขนถ่ายสินค้า หรือในยวดยานสาธารณะ (๑๐) ที่ใช้หรือมีไว้เพื่อสาธารณประโยชน์ ที่เป็นของนายจ้างหรือที่อยู่ในความครอบครองของนายจ้าง (๑๒) ที่เป็นของผู้มีอาชีพกสิกรรม บรรดาที่เป็นผลิตภัณฑ์ พืชพันธุ์ สัตว์หรือ เครื่องมืออันมีไว้สําหรับประกอบกสิกรรมหรือได้มาจากการกสิกรรมนั้น ต้องระวางโทษ จําคุกตั้งแต่หนึ่งปีถึงห้าปี และปรับตั้งแต่สองหมื่นบาทถึง หนึ่งแสนบาท ถ้าความผิดตามวรรคแรกเป็นการกระทําที่ประกอบด้วยลักษณะดังที่บัญญัติ ไว้ในอนุมาตราดังกล่าวแล้วตั้งแต่สองอนุมาตราขึ้นไป ผู้กระทําต้องระวางโทษจําคุกตั้งแต่หนึ่ง ปีถึงเจ็ดปี และปรับตั้งแต่สองหมื่นบาทถึงหนึ่งแสนสี่หมื่นบาท ถ้าความผิดตามวรรคแรกเป็นการกระทําต่อทรัพย์ที่เป็นโค กระบือ เครื่องกล หรือเครื่องจักรที่ผู้มีอาชีพกสิกรรมมีไว้สําหรับประกอบกสิกรรม ผู้กระทําต้องระวางโทษ จําคุกตั้งแต่สามปีถึงสิบปี และปรับตั้งแต่หกหมื่นบาทถึงสองแสนบาท ถ้าการกระทําความผิดดังกล่าวในมาตรานี้ เป็นการกระทําโดยความจําใจหรือ ความยากจนเหลือทนทาน และทรัพย์นั้นมีราคาเล็กน้อย ศาลจะลงโทษผู้กระทําความผิดดังที่ บัญญัติไว้ในมาตรา ๓๓๔ ก็ได้"},{"section":"มาตรา ๓๓๕ ทวิ","num":"335 ทวิ","text":"ผู้ใดลักทรัพย์ที่เป็นพระพุทธรูปหรือวัตถุในทางศาสนา ถ้าทรัพย์นั้นเป็นที่สักการะบูชาของประชาชน หรือเก็บรักษาไว้เป็นสมบัติของชาติ หรือส่วนหนึ่ง ส่วนใดของพระพุทธรูป หรือวัตถุดังกล่าว ต้องระวางโทษ จําคุกตั้งแต่สามปีถึงสิบปี และ ปรับตั้งแต่หกหมื่นบาทถึงสองแสนบาท ถ้าการกระทําความผิดตามวรรคแรก ได้กระทําในวัด สํานักสงฆ์ สถานอันเป็น ที่เคารพในทางศาสนา โบราณสถานอันเป็นทรัพย์สินของแผ่นดิน สถานที่ราชการหรือ พิพิธภัณฑสถานแห่งชาติ ผู้กระทําต้องระวางโทษจําคุกตั้งแต่ห้าปีถึงสิบห้าปี และปรับตั้งแต่ หนึ่งแสนบาทถึงสามแสนบาท"},{"section":"มาตรา ๓๓๖","num":"336","text":"ผู้ใดลักทรัพย์โดยฉกฉวยเอาซึ่งหน้า ผู้นั้นกระทําความ ผิดฐานวิ่งราวทรัพย์ ต้องระวางโทษจําคุกไม่เกินห้าปี และปรับไม่เกินหนึ่งแสนบาท ถ้าการวิ่งราวทรัพย์เป็นเหตุให้ผู้อื่นรับอันตรายแก่กายหรือจิตใจ ผู้กระทําต้อง ระวางโทษจําคุกตั้งแต่สองปีถึงเจ็ดปี และปรับตั้งแต่สี่หมื่นบาทถึงหนึ่งแสนสี่หมื่นบาท ถ้าการวิ่งราวทรัพย์เป็นเหตุให้ผู้อื่นรับอันตรายสาหัส ผู้กระทําต้องระวางโทษ จําคุกตั้งแต่สามปีถึงสิบปี และปรับตั้งแต่หกหมื่นบาทถึงสองแสนบาท ถ้าการวิ่งราวทรัพย์เป็นเหตุให้ผู้อื่นถึงแก่ความตาย ผู้กระทําต้องระวางโทษ จําคุกตั้งแต่ห้าปีถึงสิบห้าปี และปรับตั้งแต่หนึ่งแสนบาทถึงสามแสนบาท"},{"section":"มาตรา ๓๓๖ ทวิ","num":"336 ทวิ","text":"เพิ่มโดยประกาศของคณะปฏิวัติ ฉบับที่ ๑๑ ลงวันที่ ๒๑ พฤศจิกายน พ.ศ. ๒๕๑๔ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐"},{"section":"มาตรา ๓๓๗","num":"337","text":"ผู้ใดข่มขืนใจผู้อื่นให้ยอมให้หรือยอมจะให้ตนหรือผู้อื่นได้ ประโยชน์ในลักษณะที่เป็นทรัพย์สินโดยใช้กําลังประทุษร้ายหรือโดยขู่เข็ญว่าจะทําอันตรายต่อ ชีวิต ร่างกาย เสรีภาพ ชื่อเสียงหรือทรัพย์สินของผู้ถูกขู่เข็ญหรือของบุคคลที่สาม จนผู้ถูกข่ม ขืนใจยอมเช่นว่านั้น ผู้นั้นกระทําความผิดฐานกรรโชก ต้องระวางโทษจําคุกไม่เกินห้าปี และ ปรับไม่เกินหนึ่งแสนบาท ถ้าความผิดฐานกรรโชกได้กระทําโดย (๑) ขู่ว่าจะฆ่า ขู่ว่าจะทําร้ายร่างกายให้ผู้ถูกข่มขืนใจหรือผู้อื่นให้ได้รับอันตราย สาหัส หรือขู่ว่าจะทําให้เกิดเพลิงไหม้แก่ทรัพย์ของผู้ถูกข่มขืนใจหรือผู้อื่น หรือ (๒) มีอาวุธติดตัวมาขู่เข็ญ ผู้กระทําต้องระวางโทษจําคุกตั้งแต่หกเดือนถึงเจ็ดปี และปรับตั้งแต่หนึ่งหมื่น บาทถึงหนึ่งแสนสี่หมื่นบาท"},{"section":"มาตรา ๓๓๘","num":"338","text":"ผู้ใดข่มขืนใจผู้อื่นให้ยอมให้หรือยอมจะให้ตนหรือผู้อื่นได้ ประโยชน์ในลักษณะที่เป็นทรัพย์สินโดยขู่เข็ญว่าจะเปิดเผยความลับ ซึ่งการเปิดเผยนั้นจะทําให้ ผู้ถูกขู่เข็ญหรือบุคคลที่สามเสียหาย จนผู้ถูกข่มขืนใจยอมเช่นว่านั้น ผู้นั้นกระทําความผิดฐานรีด เอาทรัพย์ ต้องระวางโทษจําคุกตั้งแต่หนึ่งปีถึงสิบปี และปรับตั้งแต่สองหมื่นบาทถึงสองแสน บาท"},{"section":"มาตรา ๓๓๙","num":"339","text":"ผู้ใดลักทรัพย์โดยใช้กําลังประทุษร้าย หรือขู่เข็ญว่าในทันใด นั้นจะใช้กําลังประทุษร้าย เพื่อ (๑) ให้ความสะดวกแก่การลักทรัพย์หรือการพาทรัพย์นั้นไป (๒) ให้ยื่นให้ซึ่งทรัพย์นั้น (๓) ยึดถือเอาทรัพย์นั้นไว้ (๔) ปกปิดการกระทําความผิดนั้น หรือ (๕) ให้พ้นจากการจับกุม ผู้นั้นกระทําความผิดฐานชิงทรัพย์ ต้องระวางโทษ จําคุกตั้งแต่ห้าปีถึงสิบปี และปรับตั้งแต่หนึ่งแสนบาทถึงสองแสนบาท ถ้าความผิดนั้นเป็นการกระทําที่ประกอบด้วยลักษณะดังที่บัญญัติไว้ในอนุ มาตราหนึ่งอนุมาตราใดแห่งมาตรา ๓๓๕ หรือเป็นการกระทําต่อทรัพย์ที่เป็นโค กระบือ เครื่องกลหรือเครื่องจักรที่ผู้มีอาชีพกสิกรรมมีไว้สําหรับประกอบกสิกรรม ผู้กระทําต้องระวาง โทษจําคุกตั้งแต่สิบปีถึงสิบห้าปี และปรับตั้งแต่สองแสนบาทถึงสามแสนบาท ถ้าการชิงทรัพย์เป็นเหตุให้ผู้อื่นรับอันตรายแก่กายหรือจิตใจ ผู้กระทําต้อง ระวางโทษจําคุกตั้งแต่สิบปีถึงยี่สิบปี และปรับตั้งแต่สองแสนบาทถึงสี่แสนบาท ถ้าการชิงทรัพย์เป็นเหตุให้ผู้อื่นรับอันตรายสาหัส ผู้กระทําต้องระวางโทษ จําคุกตั้งแต่สิบห้าปีถึงยี่สิบปี และปรับตั้งแต่สามแสนบาทถึงสี่แสนบาท ถ้าการชิงทรัพย์เป็นเหตุให้ผู้อื่นถึงแก่ความตาย ผู้กระทําต้องระวาง โทษประหารชีวิตหรือจําคุกตลอดชีวิต"},{"section":"มาตรา ๓๓๙ ทวิ","num":"339 ทวิ","text":"ถ้าการชิงทรัพย์ได้กระทําต่อทรัพย์ตามมาตรา ๓๓๕ ทวิ วรรคแรก ผู้กระทําต้องระวางโทษ จําคุกตั้งแต่สิบปีถึงสิบห้าปี และปรับตั้งแต่สองแสนบาท ถึงสามแสนบาท ถ้าการชิงทรัพย์นั้นเป็นการกระทําในสถานที่ดังที่บัญญัติไว้ในมาตรา ๓๓๕ ทวิ วรรคสองด้วย ผู้กระทําต้องระวางโทษจําคุกตั้งแต่สิบปีถึงยี่สิบปี และปรับตั้งแต่สองแสนบาท ถึงสี่แสนบาท ถ้าการชิงทรัพย์ตามวรรคแรกหรือวรรคสองเป็นเหตุให้ผู้อื่นรับอันตรายแก่ กายหรือจิตใจ ผู้กระทําต้องระวางโทษจําคุกตั้งแต่สิบห้าปีถึงยี่สิบปี และปรับตั้งแต่สามแสน บาทถึงสี่แสนบาท ถ้าการชิงทรัพย์ตามวรรคแรกหรือวรรคสองเป็นเหตุให้ผู้อื่นรับอันตรายสาหัส ผู้กระทําต้องระวางโทษจําคุกตลอดชีวิต หรือจําคุกตั้งแต่สิบห้าปีถึงยี่สิบปี ถ้าการชิงทรัพย์ตามวรรคแรกหรือวรรคสองเป็นเหตุให้ผู้อื่นถึงแก่ความตาย ผู้ กระทําต้องระวางโทษประหารชีวิต"},{"section":"มาตรา ๓๔๐","num":"340","text":"ผู้ใดชิงทรัพย์โดยร่วมกันกระทําความผิดด้วยกันตั้งแต่สาม คนขึ้นไป ผู้นั้นกระทําความผิดฐานปล้นทรัพย์ ต้องระวางโทษ จําคุกตั้งแต่สิบปีถึงสิบห้าปี และปรับตั้งแต่สองแสนบาทถึงสามแสนบาท ถ้าในการปล้นทรัพย์ ผู้กระทําแม้แต่คนหนึ่งคนใดมีอาวุธติดตัวไปด้วย ผู้ กระทําต้องระวางโทษจําคุกตั้งแต่สิบสองปีถึงยี่สิบปี และปรับตั้งแต่สองแสนสี่หมื่นบาทถึงสี่ แสนบาท ถ้าการปล้นทรัพย์เป็นเหตุให้ผู้อื่นรับอันตรายสาหัส ผู้กระทําต้องระวางโทษ จําคุกตลอดชีวิต หรือจําคุกตั้งแต่สิบห้าปีถึงยี่สิบปี ถ้าการปล้นทรัพย์ได้กระทําโดยแสดงความทารุณจนเป็นเหตุให้ผู้อื่นรับ อันตรายแก่กายหรือจิตใจ ใช้ปืนยิง ใช้วัตถุระเบิด หรือกระทําทรมาน ผู้กระทําต้องระวางโทษ จําคุกตลอด อปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๔๕","num":"345","text":"ผู้ใดสั่งซื้อและบริโภคอาหารหรือเครื่องดื่ม หรือเข้าอยู่ใน โรงแรม โดยรู้ว่าตนไม่สามารถชําระเงินค่าอาหาร ค่าเครื่องดื่ม หรือค่าอยู่ในโรงแรมนั้น ต้อง ระวางโทษจําคุกไม่เกินสามเดือน หรือปรับไม่เกินห้าพันบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๔๖","num":"346","text":"ผู้ใดเพื่อเอาทรัพย์สินของผู้อื่นเป็นของตนหรือของบุคคลที่ สาม ชักจูงผู้หนึ่งผู้ใดให้จําหน่ายโดยเสียเปรียบซึ่งทรัพย์สิน โดยอาศัยเหตุที่ผู้ถูกชักจูงมี จิตอ่อนแอหรือเป็นเด็กเบาปัญญา และไม่สามารถเข้าใจตามควรซึ่งสาระสําคัญแห่งการกระทํา ของตน จนผู้ถูกชักจูงจําหน่ายซึ่งทรัพย์สินนั้น ต้องระวางโทษจําคุกไม่เกินสองปี หรือปรับไม่ เกินสี่หมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๔๗","num":"347","text":"ผู้ใดเพื่อให้ตนเองหรือผู้อื่นได้รับประโยชน์จากการประกัน วินาศภัย แกล้งทําให้เกิดเสียหายแก่ทรัพย์สินอันเป็นวัตถุที่เอาประกันภัย ต้องระวางโทษจําคุก ไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๔๘","num":"348","text":"ความผิดในหมวดนี้ นอกจากความผิดตามมาตรา ๓๔๓ เป็น ความผิดอันยอมความได้ หมวด ๔ ความผิดฐานโกงเจ้าหนี้"},{"section":"มาตรา ๓๔๙","num":"349","text":"ผู้ใดเอาไปเสีย ทําให้เสียหาย ทําลาย ทําให้เสื่อมค่า หรือทํา ให้ไร้ประโยชน์ซึ่งทรัพย์อันตนจํานําไว้แก่ผู้อื่น ถ้าได้กระทําเพื่อให้เกิดความเสียหายแก่ผู้รับ จํานํา ต้องระวางโทษจําคุกไม่เกินสองปี หรือปรับไม่เกินสี่หมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๕๐","num":"350","text":"ผู้ใดเพื่อมิให้เจ้าหนี้ของตนหรือของผู้อื่นได้รับชําระหนี้ ทั้งหมดหรือแต่บางส่วน ซึ่งได้ใช้หรือจะใช้สิทธิเรียกร้องทางศาลให้ชําระหนี้ ย้ายไปเสีย ซ่อนเร้น หรือโอนไปให้แก่ผู้อื่นซึ่งทรัพย์ใดก็ดี แกล้งให้ตนเองเป็นหนี้จํานวนใดอันไม่เป็นความจริงก็ดี ต้องระวางโทษจําคุกไม่เกินสองปี หรือปรับไม่เกินสี่หมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๕๑","num":"351","text":"ความผิดในหมวดนี้เป็นความผิดอันยอมความได้ หมวด ๕ ความผิดฐานยักยอก"},{"section":"มาตรา ๓๕๒","num":"352","text":"ผู้ใดครอบครองทรัพย์ซึ่งเป็นของผู้อื่นหรือซึ่งผู้อื่นเป็น เจ้าของรวมอยู่ด้วย เบียดบังเอาทรัพย์นั้นเป็นของตนหรือบุคคลที่สามโดยทุจริต ผู้นั้นกระทํา ความผิดฐานยักยอก ต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจํา ทั้งปรับ ถ้าทรัพย์นั้นได้ตกมาอยู่ในความครอบครองของผู้กระทําความผิด เพราะผู้อื่น ส่งมอบให้โดยสําคัญผิดไปด้วยประการใด หรือเป็นทรัพย์สินหายซึ่งผู้กระทําความผิดเก็บได้ ผู้ กระทําต้องระวางโทษแต่เพียงกึ่งหนึ่ง"},{"section":"มาตรา ๓๕๓","num":"353","text":"ผู้ใดได้รับมอบหมายให้จัดการทรัพย์สินของผู้อื่น หรือ ทรัพย์สินซึ่งผู้อื่นเป็นเจ้าของรวมอยู่ด้วย กระทําผิดหน้าที่ของตนด้วยประการใด ๆ โดยทุจริต จนเป็นเหตุให้เกิดความเสียหายแก่ประโยชน์ในลักษณะที่เป็นทรัพย์สินของผู้นั้น ต้องระวางโทษ จําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๕๔","num":"354","text":"และมาตรา ๓๕๗ และภายในเวลาสิบปี นับแต่วันที่ผู้นั้นได้พ้นจากการกักกัน หรือพ้นโทษแล้วแต่ กรณี ผู้นั้นได้กระทําความผิดอย่างหนึ่งอย่างใดในบรรดาที่ระบุไว้นั้นอีกจนศาลพิพากษาลง โทษจําคุกไม่ต่ำกว่าหกเดือนสําหรับการกระทําความผิดนั้น ศาลอาจถือว่า ผู้นั้นเป็นผู้กระทํา ความผิดติดนิสัย และจะพิพากษาให้กักกันมีกําหนดเวลาไม่น้อยกว่าสามปีและไม่เกินสิบปีก็ได้ ความผิดซึ่งผู้กระทําได้กระทําในขณะที่มีอายุต่ำกว่าสิบแปดปีนั้น มิให้ถือเป็น ความผิดที่จะนํามาพิจารณากักกันตามมาตรานี้"},{"section":"มาตรา ๓๕๕","num":"355","text":"ผู้ใดเก็บได้ซึ่งสังหาริมทรัพย์อันมีค่า อันซ่อนหรือฝังไว้โดย พฤติการณ์ซึ่งไม่มีผู้ใดอ้างว่าเป็นเจ้าของได้แล้วเบียดบังเอาทรัพย์นั้นเป็นของตนหรือของผู้อื่น ต้องระวางโทษจําคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๕๖","num":"356","text":"ความผิดในหมวดนี้เป็นความผิดอันยอมความได้ หมวด ๖ ความผิดฐานรับของโจร"},{"section":"มาตรา ๓๕๗","num":"357","text":"ผู้ใดช่วยซ่อนเร้น ช่วยจําหน่าย ช่วยพาเอาไปเสีย ซื้อ รับ จํานําหรือรับไว้โดยประการใดซึ่งทรัพย์อันได้มาโดยการกระทําความผิด ถ้าความผิดนั้นเข้า ลักษณะลักทรัพย์ วิ่งราวทรัพย์ กรรโชก รีดเอาทรัพย์ ชิงทรัพย์ ปล้นทรัพย์ ฉ้อโกง ยักยอกหรือ เจ้าพนักงานยักยอกทรัพย์ ผู้นั้นกระทําความผิดฐานรับของโจร ต้องระวางโทษจําคุกไม่เกินห้า ปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจําทั้งปรับ ถ้าการกระทําความผิดฐานรับของโจรนั้น ได้กระทําเพื่อค้ากําไรหรือได้กระทํา ต่อทรัพย์อันได้มาโดยการลักทรัพย์ตามมาตรา ๓๓๕ (๑๐) ชิงทรัพย์ หรือปล้นทรัพย์ ผู้กระทํา ต้องระวางโทษจําคุกตั้งแต่หกเดือนถึงสิบปี และปรับตั้งแต่หนึ่งหมื่นบาทถึงสองแสนบาท ถ้าการกระทําความผิดฐานรับของโจรนั้น ได้กระทําต่อทรัพย์อันได้มาโดยการ ลักทรัพย์ตามมาตรา ๓๓๕ ทวิ การชิงทรัพย์ตามมาตรา ๓๓๙ ทวิ หรือการปล้นทรัพย์ตาม"},{"section":"มาตรา ๓๕๘","num":"358","text":"ผู้ใดทําให้เสียหาย ทําลาย ทําให้เสื่อมค่าหรือทําให้ไร้ ประโยชน์ซึ่งทรัพย์ของผู้อื่นหรือผู้อื่นเป็นเจ้าของรวมอยู่ด้วย ผู้นั้นกระทําความผิดฐานทําให้ เสียทรัพย์ ต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๕๙","num":"359","text":"ถ้าการกระทําความผิดตามมาตรา ๓๕๘ ได้กระทําต่อ (๑) เครื่องกลหรือเครื่องจักรที่ใช้ในการประกอบกสิกรรมหรืออุตสาหกรรม (๒) ปศุสัตว์ (๓) ยวดยานหรือสัตว์พาหนะที่ใช้ในการขนส่งสาธารณะหรือในการประกอบ กสิกรรมหรืออุตสาหกรรม หรือ (๔) พืชหรือพืชผลของกสิกร ผู้กระทําต้องระวางโทษจําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือ ทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๖๐","num":"360","text":"ผู้ใดทําให้เสียหาย ทําลาย ทําให้เสื่อมค่าหรือทําให้ไร้ ประโยชน์ซึ่งทรัพย์ที่ใช้หรือมีไว้เพื่อสาธารณประโยชน์ ต้องระวางโทษจําคุกไม่เกินห้าปี หรือ ปรับไม่เกินหนึ่งแสนบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๖๐ ทวิ","num":"360 ทวิ","text":"เพิ่มโดยพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา (ฉบับที่ ๒) พ.ศ. ๒๕๑๒ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๑๖ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวล กฎหมายอาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ ลักษณะ ๑๓ ความผิดเกี่ยวกับศพ มาตรา ๓๖๖/๑ ถึงมาตรา มาตรา ๓๖๖/๔ เพิ่มโดย พระราชบัญญัต สัตว์ หรือฆ่าสัตว์โดยให้ได้รับทุก ขเวทนาอันไม่จําเป็น ต้องระวางโทษจําคุกไม่เกินหนึ่งเดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือ ทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๘๒","num":"382","text":"ผู้ใดใช้ให้สัตว์ทํางานจนเกินสมควรหรือใช้ให้ทํางานอันไม่ สมควร เพราะเหตุที่สัตว์นั้นป่วยเจ็บ ชราหรืออ่อนอายุ ต้องระวางโทษจําคุกไม่เกินหนึ่งเดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๘๓","num":"383","text":"ผู้ใดเมื่อเกิดเพลิงไหม้หรือสาธารณภัยอื่น และเจ้าพนักงาน เรียกให้ช่วยระงับ ถ้าผู้นั้นสามารถช่วยได้แต่ไม่ช่วย ต้องระวางโทษจําคุกไม่เกินหนึ่งเดือน หรือ ปรับไม่เกินหนึ่งหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๘๔","num":"384","text":"ผู้ใดแกล้งบอกเล่าความเท็จให้เลื่องลือจนเป็นเหตุให้ ประชาชนตื่นตกใจ ต้องระวางโทษจําคุกไม่เกินหนึ่งเดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือ ทั้งจําทั้งปรับ"},{"section":"มาตรา ๓๘๕","num":"385","text":"ผู้ใดโดยไม่ได้รับอนุญาตอันชอบด้วยกฎหมาย กีดขวางทาง สาธารณะ จนอาจเป็นอุปสรรคต่อความปลอดภัยหรือความสะดวกในการจราจร โดยวาง หรือ ทอดทิ้งสิ่งของ หรือโดยกระทําด้วยประการอื่นใด ถ้าการกระทํานั้นเป็นการกระทําโดยไม่ จําเป็น ต้องระวางโทษปรับไม่เกินห้าพันบาท"},{"section":"มาตรา ๓๘๖","num":"386","text":"ผู้ใดขุดหลุมหรือราง หรือปลูกปักหรือวางสิ่งของเกะกะไว้ใน ทางสาธารณะ โดยไม่ได้รับอนุญาตอันชอบด้วยกฎหมาย หรือทําได้โดยชอบด้วยกฎหมาย แต่ละเลยไม่แสดงสัญญาณตามสมควร เพื่อป้องกันอุปัทวเหตุ ต้องระวางโทษปรับไม่เกิน ห้าพันบาท"},{"section":"มาตรา ๓๘๗","num":"387","text":"ผู้ใดแขวน ติดตั้งหรือวางสิ่งใดไว้โดยประการที่น่าจะตก หรือพังลง ซึ่งจะเป็นเหตุอันตราย เปรอะเปื้อนหรือเดือดร้อนแก่ผู้สัญจรในทางสาธารณะ ต้อง ระวางโทษปรับไม่เกินห้าพันบาท"},{"section":"มาตรา ๓๘๘","num":"388","text":"ผู้ใดกระทําการอันควรขายหน้าต่อหน้าธารกํานัล โดย เปลือยหรือเปิดเผยร่างกาย หรือกระทําการลามกอย่างอื่น ต้องระวางโทษปรับไม่เกิน ห้าพันบาท"},{"section":"มาตรา ๓๘๙","num":"389","text":"ผู้ใดกระทําด้วยประการใด ๆ ให้ของแข็งตกลง ณ ที่ใด ๆ โดยประการที่น่าจะเป็นอันตรายหรือเดือดร้อนรําคาญแก่บุคคล หรือเป็นอันตรายแก่ทรัพย์ หรือกระทําด้วยประการใด ๆ ให้ของโสโครกเปรอะเปื้อนหรือน่าจะเปรอะเป       ac.classList.add("fu");addH(s,ans);
    }else ac.innerHTML=`<div class="aerr">ไม่สามารถดึงข้อมูลได้</div>`;
  }catch(e){const ac=document.getElementById("ac");if(ac)ac.innerHTML=`<div class="aerr">Error: ${esc(e.message)}</div>`;}
}
function addH(s,ans){
  hist=hist.filter(x=>x.num!==s.num);
  hist.unshift({...s,ans,t:new Date()});hist=hist.slice(0,20);
  document.getElementById("hc").textContent=hist.length;rh();
}
function rh(){
  const he=document.getElementById("he"),hl2=document.getElementById("hl");
  if(!hist.length){he.style.display="";hl2.innerHTML="";return;}
  he.style.display="none";
  hl2.innerHTML=hist.map(h=>`<div class="hcard" onclick="opn('${esc(h.num)}')">
    <span class="badge">${esc(h.section)}</span>
    <div style="font-size:12px;color:#64748b;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(h.text)}</div>
    <div class="ht">${h.t.toLocaleTimeString("th-TH")}</div></div>`).join("");
}
function stab(t){
  document.getElementById("rp").style.display=t==="s"?"":"none";
  document.getElementById("hp").style.display=t==="h"?"":"none";
  document.getElementById("ts").classList.toggle("on",t==="s");
  document.getElementById("th").classList.toggle("on",t==="h");
}
function showGuide(){
  if(isIOS)document.getElementById("ig").style.display="block";
  else if(dp)doInstall();
}
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();dp=e;
  document.getElementById("ib").style.display="block";
  document.getElementById("inst-btn").style.display="block";
});
window.addEventListener("appinstalled",()=>{
  document.getElementById("ib").style.display="none";
  document.getElementById("inst-btn").style.display="none";dp=null;
});
async function doInstall(){
  if(dp){dp.prompt();const{outcome}=await dp.userChoice;
    if(outcome==="accepted")document.getElementById("ib").style.display="none";dp=null;}
  else if(isIOS)document.getElementById("ig").style.display="block";
}
if(isIOS&&!isStandalone)document.getElementById("inst-btn").style.display="block";
if("serviceWorker"in navigator){
  navigator.serviceWorker.register("./sw.js").then(r=>console.log("SW ok")).catch(e=>console.warn("SW fail",e));
}
rp();rr();
</script>
</body>
</html>
