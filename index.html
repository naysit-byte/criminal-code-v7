<!DOCTYPE html>

<head>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{\n  --bg:#09090f;--bg1:#0f1117;--bg2:#151b27;--bg3:#1a2235;\n  --border:#1e2d3d;--border2:#2d3f52;\n  --text:#e8edf5;--text2:#94a3b8;--accent:#f59e0b;--primary:#3b82f6;\n}\nbody{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;padding:max(16px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) max(80px,env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left))}\n.hd{display:flex;justify-content:between;align-items:center;margin-bottom:16px;background:var(--bg1);padding:14px;border-radius:14px;border:1px solid var(--border)}\n.hd h1{font-size:18px;font-weight:700}.hd p{font-size:12px;color:var(--text2);margin-top:2px}\n.btns{display:flex;gap:6px}.btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}\n.sb{position:relative;margin-bottom:16px}.sb input{width:100%;background:var(--bg1);border:1px solid var(--border);color:var(--text);padding:12px 14px 12px 38px;border-radius:12px;font-size:15px;outline:none;transition:all .2s}\n.sb input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,130,246,0.15)}.sb svg{position:absolute;left:12px;top:14px;width:16px;height:16px;fill:var(--text2)}\n.st{display:flex;justify-content:between;align-items:center;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:14px}\n.tabs{display:flex;gap:12px}.tab{background:none;border:none;color:var(--text2);font-size:12px;font-weight:600;padding-bottom:4px;cursor:pointer}\n.tab.on{color:var(--accent);border-bottom:2px solid var(--accent)}\n.cards{display:flex;flex-direction:column;gap:12px}\n.card{background:var(--bg1);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:transform .15s}\n.card:active{transform:scale(0.99)}\n.ch{background:var(--bg2);padding:10px 14px;display:flex;justify-content:between;align-items:center;border-bottom:1px solid var(--border)}\n.ch .m{font-size:13px;color:var(--text2);font-weight:700}.ch .m span{font-size:20px;color:var(--accent);margin-left:4px;font-weight:900}\n.ch .t{font-size:14px;font-weight:700;text-align:right;max-width:70%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}\n.cb{padding:14px}.cb .lbl{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}\n.cb .txt{background:var(--bg);border:1px solid rgba(30,45,61,0.5);border-radius:10px;padding:12px;font-size:14px;line-height:1.6;color:var(--text);white-space:pre-wrap}\n.hl{background:rgba(245,158,11,0.2);color:var(--accent);padding:0 2px;border-radius:2px;font-weight:600}\n.empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}\n.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(15,17,23,0.9);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;justify-content:around;padding:10px 0 max(10px,env(safe-area-inset-bottom))}\n.ni{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text2);background:none;border:none;font-size:10px;font-weight:500;width:25%;cursor:pointer}\n.ni.on{color:var(--primary)}.ni svg{width:20px;height:20px;fill:currentColor}\n.h-item{display:flex;justify-content:between;align-items:center;padding:12px;border-bottom:1px solid var(--border);background:var(--bg1);border-radius:10px;margin-bottom:8px}\n.h-info{max-width:75%}.ht{font-size:11px;color:var(--text2)}\n#ig{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:999;padding:24px;text-align:center}\n.g-box{background:var(--bg1);border:1px solid var(--border);padding:24px;border-radius:20px;margin-top:20vh}\n.g-box h2{margin-bottom:12px}.g-box p{font-size:14px;color:var(--text2);line-height:1.5;margin-bottom:20px}\n.g-btn{background:var(--primary);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600}\n</style>
</head>
<body>

<div class="hd">
  <div>
    <h1>ประมวลกฎหมายอาญา</h1>
    <p>ฉบับประมวลตัวบทสำคัญ (ตรวจชำระล่าสุด ๒๕๖๙)</p>
  </div>
  <div class="btns">
    <button class="btn" onclick="alert('ฟังก์ชันคำนวณอัตราโทษกำลังพัฒนารองรับมาตราใหม่')">🧮 คำนวณ</button>
    <button class="btn" onclick="alert('ฟังก์ชันเปรียบเทียบมาตราฉบับแก้ไขเพิ่มเติม')">⇄ เปรียบเทียบ</button>
  </div>
</div>

<div class="sb">
  <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
  <input type="text" id="q" placeholder="ค้นเลขมาตรา ฐานความผิด หรือข้อความในตัวบท..." oninput="search()">
</div>

<div class="st">
  <div class="tabs">
    <button class="tab on" id="ts" onclick="stab('s')">🔍 ผลการสืบค้น</button>
    <button class="tab" id="th" onclick="stab('h')">📜 ประวัติเข้าชม</button>
  </div>
  <span id="cnt">ทั้งหมด 0 มาตรา</span>
</div>

<div id="rp" class="cards"></div>
<div id="hp" class="cards" style="display:none"></div>

<nav class="nav">
  <button class="ni on" onclick="stab('s')"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>หน้าแรก</button>
  <button class="ni" id="inst-btn" style="display:none" onclick="doInstall()"><svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>ติดตั้งแอป</button>
  <button class="ni" onclick="stab('h')"><svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>ประวัติ</button>
  <button class="ni" onclick="alert('ประมวลกฎหมายอาญา ตัวบทเต็มระบบออฟไลน์เวอร์ชัน 2.5')"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>เกี่ยวกับ</button>
</nav>

<div id="ig" onclick="this.style.display='none'">
  <div class="g-box" onclick="event.stopPropagation()">
    <h2>ติดตั้งบนเครื่องฟรี</h2>
    <p>กดปุ่มส่งออก (Share) ด้านล่างเบราว์เซอร์ แล้วเลือก 'เพิ่มไปยังหน้าจอโฮม' (Add to Home Screen) เพื่อใช้งานแบบแอปพลิเคชันออฟไลน์เต็มรูปแบบ</p>
    <button class="g-btn" onclick="document.getElementById('ig').style.display='none'">รับทราบ</button>
  </div>
</div>

<script>
// ข้อมูลบูรณาการรวมจากชุดเอกสารสำคัญทุกลักษณะ พ.ศ. 2568 - 2569 ของคุณ
const items = [
  // --- ลกษณะ ๑๒ ความผิดเกี่ยวกับทรัพย์ ---
  {m:"334",c:"ความผิดเกี่ยวกับทรัพย์ หมวด 1",t:"ลักทรัพย์",l:"ผู้ใดเอาทรัพย์ของผู้อื่น หรือที่ผู้อื่นเป็นเจ้าของรวมอยู่ด้วยไปโดยทุจริต ผู้นั้นกระทำความผิดฐานลักทรัพย์ ต้องระวางโทษจำคุกไม่เกินสามปี และปรับไม่เกินหกหมื่นบาท"},
  {m:"335",c:"ความผิดเกี่ยวกับทรัพย์ หมวด 1",t:"ลักทรัพย์ฉกรรจ์ (มีเหตุเพิ่มโทษ)",l:"ผู้ใดลักทรัพย์\n(๑) ในเวลากลางคืน\n(๒) ในที่อุทยันสถาน สาธารณสถาน ที่จำนำทรัพย์ หรือในอาคารสถานที่ราชการ\n(๓) โดยเจาะ โทรม ทำลายหรือผ่านสิ่งกีดกั้นสำหรับคุ้มครองบุคคลหรือทรัพย์\n(๔) โดยฉกฉวยเอาในที่ศาลาอพยพ ที่เพลิงไหม้ ที่น้ำท่วม หรือในระหว่างภยันตรายสาธารณะ\n(๕) โดยแต่งเครื่องแบบทหารหรือตำรวจ หรือแต่งกายให้เข้าใจว่าเป็นทหารหรือตำรวจ หรือโดยมีหรือใช้อาวุธปืนหรือวัตถุระเบิด\n(๖) โดยร่วมกระทำความผิดด้วยกันตั้งแต่สองคนขึ้นไป\n(๗) ที่เป็นข้าว เปลือก โค กระบือ เครื่องกลหรือเครื่องมือที่ผู้มีอาชีพกสิกรรมมีไว้สำหรับประกอบกสิกรรม\n(๘) เป็นทรัพย์สินของแผ่นดินหรือทรัพย์สินที่ใช้เพื่อประโยชน์สาธารณะ\n\nต้องระวางโทษจำคุกตั้งแต่หนึ่งปีถึงห้าปี และปรับตั้งแต่สองหมื่นบาทถึงหนึ่งแสนบาท\n\nถ้าความผิดตามวรรคแรกเป็นการกระทำที่ประกอบด้วยลักษณะดังที่บัญญัติไว้ในอนุมาตราดังกล่าวตั้งแต่สองอนุมาตราขึ้นไป ผู้กระทำต้องระวางโทษจำคุกตั้งแต่หนึ่งปีถึงเจ็ดปี และปรับตั้งแต่สองหมื่นบาทถึงหนึ่งแสนสี่หมื่นบาท"},
  {m:"336",c:"ความผิดเกี่ยวกับทรัพย์ หมวด 1",t:"วิ่งราวทรัพย์",l:"ผู้ใดลักทรัพย์โดยฉกฉวยเอาซึ่งหน้า ผู้นั้นกระทำความผิดฐานวิ่งราวทรัพย์ ต้องระวางโทษจำคุกไม่เกินห้าปี และปรับไม่เกินหนึ่งแสนบาท\n\nถ้าการวิ่งราวทรัพย์เป็นเหตุให้ผู้อื่นรับอันตรายแก่กายหรือจิตใจ ผู้กระทำต้องระวางโทษจำคุกตั้งแต่สองปีถึงเจ็ดปี และปรับตั้งแต่สี่หมื่นบาทถึงหนึ่งแสนสี่หมื่นบาท\n\nถ้าการวิ่งราวทรัพย์เป็นเหตุให้ผู้อื่นรับอันตรายสาหัส ผู้กระทำต้องระวางโทษจำคุกตั้งแต่สามปีถึงสิบปี และปรับตั้งแต่หกหมื่นบาทถึงสองแสนบาท\n\nถ้าการวิ่งราวทรัพย์เป็นเหตุให้ผู้อื่นถึงแก่ความตาย ผู้กระทำต้องระวางโทษจำคุกตั้งแต่ห้าปีถึงสิบห้าปี และปรับตั้งแต่หนึ่งแสนบาทถึงสามแสนบาท"},
  {m:"337",c:"ความผิดเกี่ยวกับทรัพย์ หมวด 2",t:"กรรโชกทรัพย์",l:"ผู้ใดข่มขืนใจผู้อื่นให้ยอมให้หรือยอมจะให้ตนหรือผู้อื่นได้ประโยชน์ในลักษณะที่เป็นทรัพย์สิน โดยใช้กำลังประทุษร้าย หรือโดยขู่เข็ญว่าจะทำอันตรายต่อชีวิต ร่างกาย เสรีภาพ ชื่อเสียงหรือทรัพย์สินของผู้ถูกขู่เข็ญหรือของบุคคลที่สาม จนผู้ถูกข่มขืนใจยอมเช่นนั้น ผู้นั้นกระทำความผิดฐานกรรโชก ต้องระวางโทษจำคุกไม่เกินห้าปี และปรับไม่เกินหนึ่งแสนบาท\n\nถ้าการกระทำความผิดฐานกรรโชกได้กระทำโดย\n(๑) ขู่ว่าจะฆ่า ขู่ว่าจะทำร้ายร่างกายให้รับอันตรายสาหัส หรือขู่ว่าจะจุดไฟเผาทรัพย์ของผู้ถูกขู่เข็ญหรือบุคคลที่สาม หรือ\n(๒) มีอาวุธติดตัวมาขู่เข็ญ\n\nผู้กระทำต้องระวางโทษจำคุกตั้งแต่หกเดือนถึงเจ็ดปี และปรับตั้งแต่หนึ่งหมื่นบาทถึงหนึ่งแสนสี่หมื่นบาท"},
  {m:"338",c:"ความผิดเกี่ยวกับทรัพย์ หมวด 2",t:"รีดเอาทรัพย์",l:"ผู้ใดข่มขืนใจผู้อื่นให้ยอมให้ หรือยอมจะให้ตนหรือผู้อื่นได้ประโยชน์ในลักษณะที่เป็นทรัพย์สิน โดยขู่เข็ญว่าจะเปิดเผยความลับ ซึ่งการเปิดเผยนั้นจะทำให้ผู้ถูกขู่เข็ญหรือบุคคลที่สามเสียหาย จนผู้ถูกข่มขืนใจยอมเช่นนั้น ผู้นั้นกระทำความผิดฐานรีดเอาทรัพย์ ต้องระวางโทษจำคุกตั้งแต่หนึ่งปีถึงสิบปี และปรับตั้งแต่สองหมื่นบาทถึงสองแสนบาท"},
  {m:"339",c:"ความผิดเกี่ยวกับทรัพย์ หมวด 2",t:"ชิงทรัพย์",l:"ผู้ใดลักทรัพย์โดยใช้กำลังประทุษร้าย หรือขู่เข็ญว่าในทันใดนั้นจะใช้กำลังประทุษร้าย เพื่อ\n(๑) ให้ความสะดวกแก่การลักทรัพย์หรือการพาเอาทรัพย์นั้นไป\n(๒) ให้ยื่นให้ซึ่งทรัพย์นั้น\n(๓) ยึดถือเอาทรัพย์นั้นไว้\n(๔) ปกปิดการกระทำความผิดนั้น หรือ\n(๕) ให้พ้นจากการจับกุม\n\nผู้นั้นกระทำความผิดฐานชิงทรัพย์ ต้องระวางโทษจำคุกตั้งแต่ห้าปีถึงสิบปี และปรับตั้งแต่หนึ่งแสนบาทถึงสองแสนบาท\n\nถ้าความผิดนั้นกระทำในสถานที่ตามที่บัญญัติไว้ในมาตรา ๓๓๕ หรือกระทำต่อทรัพย์ตามที่บัญญัติไว้ในมาตรา ๓๓๕ (๗) หรือ (๘) ด้วย ผู้กระทำต้องระวางโทษจำคุกตั้งแต่สิบปีถึงสิบห้าปี และปรับตั้งแต่สองแสนบาทถึงสามแสนบาท\n\nถ้าการชิงทรัพย์เป็นเหตุให้ผู้อื่นรับอันตรายแก่กายหรือจิตใจ ต้องระวางโทษจำคุกตั้งแต่สิบปีถึงยี่สิบปี และปรับตั้งแต่สองแสนบาทถึงสี่แสนบาท\n\nถ้าการชิงทรัพย์เป็นเหตุให้ผู้อื่นรับอันตรายสาหัส ต้องระวางโทษจำคุกตั้งแต่สิบห้าปีถึงยี่สิบปี และปรับตั้งแต่สามแสนบาทถึงสี่แสนบาท\n\nถ้าการชิงทรัพย์เป็นเหตุให้ผู้อื่นถึงแก่ความตาย ต้องระวางโทษประหารชีวิต หรือจำคุกตลอดชีวิต"},
  {m:"340",c:"ความผิดเกี่ยวกับทรัพย์ หมวด 2",t:"ปล้นทรัพย์",l:"ผู้ใดชิงทรัพย์โดยร่วมกันกระทำความผิดด้วยกันตั้งแต่สามคนขึ้นไป ผู้นั้นกระทำความผิดฐานปล้นทรัพย์ ต้องระวางโทษจำคุกตั้งแต่สิบปีถึงสิบห้าปี และปรับตั้งแต่สองแสนบาทถึงสามแสนบาท\n\nถ้าในการปล้นทรัพย์ ผู้สมคบแม้แต่คนหนึ่งคนใดมีอาวุธติดตัวไปด้วย ผู้กระทำต้องระวางโทษจำคุกตั้งแต่สิบสองปีถึงยี่สิบปี และปรับตั้งแต่สองแสนสี่หมื่นบาทถึงสี่แสนบาท\n\nถ้าการปล้นทรัพย์เป็นเหตุให้ผู้อื่นรับอันตรายแก่กายหรือจิตใจ ต้องระวางโทษจำคุกตั้งแต่สิบห้าปีถึงยี่สิบปี และปรับตั้งแต่สามแสนบาทถึงสี่แสนบาท\n\nถ้าการปล้นทรัพย์เป็นเหตุให้ผู้อื่นรับอันตรายสาหัส ต้องระวางโทษจำคุกตลอดชีวิต หรือจำคุกตั้งแต่สิบห้าปีถึงยี่สิบปี\n\nถ้าการปล้นทรัพย์เป็นเหตุให้ผู้อื่นถึงแก่ความตาย ต้องระวางโทษประหารชีวิต"},
  {m:"341",c:"ความผิดเกี่ยวกับทรัพย์ หมวด 3",t:"ฉ้อโกง",l:"ผู้ใดโดยทุจริต หลอกลวงผู้อื่นด้วยการแสดงข้อความอันเป็นเท็จ หรือปกปิดข้อความจริงซึ่งควรบอกให้แจ้ง และโดยการหลอกลวงดังว่านั้นได้ไปซึ่งทรัพย์สินจากผู้ถูกหลอกลวงหรือบุคคลที่สาม หรือทำให้ผู้ถูกหลอกลวงหรือบุคคลที่สามทำ ถอน หรือทำลายเอกสารสิทธิ ผู้นั้นกระทำความผิดฐานฉ้อโกง ต้องระวางโทษจำคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจำทั้งปรับ"},
  {m:"343",c:"ความผิดเกี่ยวกับทรัพย์ หมวด 3",t:"ฉ้อโกงประชาชน",l:"ถ้าการกระทำความผิดตามมาตรา ๓๔๑ ได้กระทำด้วยการแสดงข้อความอันเป็นเท็จต่อประชาชน หรือด้วยการปกปิดข้อความจริงซึ่งควรบอกให้แจ้งแก่ประชาชน ผู้กระทำความผิดฐานฉ้อโกงประชาชน ต้องระวางโทษจำคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจำทั้งปรับ"},
  {m:"352",c:"ความผิดเกี่ยวกับทรัพย์ หมวด 5",t:"ยักยอกทรัพย์",l:"ผู้ใดครอบครองทรัพย์ซึ่งเป็นของผู้อื่น หรือซึ่งผู้อื่นเป็นเจ้าของรวมอยู่ด้วย เบียดบังเอาทรัพย์นั้นเป็นของตนหรือบุคคลที่สามโดยทุจริต ผู้นั้นกระทำความผิดฐานยักยอก ต้องระวางโทษจำคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจำทั้งปรับ\n\nถ้าทรัพย์นั้นตกมาอยู่ในความครอบครองของผู้กระทำความผิด เพราะความส่งมอบโดยสำคัญผิดไปด้วยประการใด หรือเป็นทรัพย์สินหายซึ่งผู้กระทำความผิดเก็บได้ ผู้กระทำต้องระวางโทษกึ่งหนึ่ง"},
  {m:"354",c:"ความผิดเกี่ยวกับทรัพย์ หมวด 5",t:"ยักยอกทรัพย์ฉกรรจ์ (โดยผู้จัดการ/ผู้มีอาชีพไว้วางใจ)",l:"ถ้าการกระทำความผิดตามมาตรา ๓๕๒ ได้กระทำในฐานะที่ผู้กระทำความผิดเป็นผู้จัดการทรัพย์สินของผู้อื่นตามคำสั่งศาล หรือตามพินัยกรรม หรือในฐานะเป็นผู้มีอาชีพหรือธุรกิจอันย่อมเป็นที่ไว้วางใจของประชาชน ผู้กระทำต้องระวางโทษจำคุกตั้งแต่หนึ่งปีถึงสิบปี และปรับตั้งแต่สองหมื่นบาทถึงสองแสนบาท"},
  {m:"357",c:"ความผิดเกี่ยวกับทรัพย์ หมวด 6",t:"รับของโจร",l:"ผู้ใดช่วยซ่อนเร้น ช่วยจำหน่าย ช่วยพาเอาไปเสีย ซื้อ รับจำนำหรือรับไว้โดยประการใดซึ่งทรัพย์อันได้มาโดยการกระทำความผิด ถ้าความผิดนั้นเข้าลักษณะลักทรัพย์ วิ่งราวทรัพย์ กรรโชก รีดเอาทรัพย์ ชิงทรัพย์ ปล้นทรัพย์ ฉ้อโกง ยักยอก หรือเจ้าพนักงานเบียดบังทรัพย์ ผู้นั้นกระทำความผิดฐานรับของโจร ต้องระวางโทษจำคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจำทั้งปรับ\n\nถ้าการกระทำความผิดฐานรับของโจรนั้น ได้กระทำเพื่อหากำไรหรือได้กระทำต่อทรัพย์อันได้มาโดยการลักทรัพย์ตามมาตรา ๓๓๕ (๑๐) ลักโค กระบือ หรือทรัพย์สินสาธารณะ ผู้กระทำต้องระวางโทษจำคุกตั้งแต่หกเดือนถึงสิบปี และปรับตั้งแต่หนึ่งหมื่นบาทถึงสองแสนบาท"},
  {m:"358",c:"ความผิดเกี่ยวกับทรัพย์ หมวด 7",t:"ทำให้เสียทรัพย์",l:"ผู้ใดทำให้เสียหาย ทำลาย ทำให้เสื่อมค่าหรือทำให้ไร้ประโยชน์ ซึ่งทรัพย์ของผู้อื่นหรือผู้อื่นเป็นเจ้าของรวมอยู่ด้วย ผู้นั้นกระทำความผิดฐานทำให้เสียทรัพย์ ต้องระวางโทษจำคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจำทั้งปรับ"},
  {m:"360",c:"ความผิดเกี่ยวกับทรัพย์ หมวด 7",t:"ทำให้เสียทรัพย์สินสาธารณะ",l:"ผู้ใดทำให้เสียหาย ทำลาย ทำให้เสื่อมค่าหรือทำให้ไร้ประโยชน์ ซึ่งทรัพย์สินที่มีไว้เพื่อสาธารณประโยชน์หรือทรัพย์สินของแผ่นดิน ต้องระวางโทษจำคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจำทั้งปรับ"},
  {m:"362",c:"ความผิดเกี่ยวกับทรัพย์ หมวด 8",t:"บุกรุก",l:"ผู้ใดเข้าไปในอสังหาริมทรัพย์ของผู้อื่น เพื่อถือการครอบครองอสังหาริมทรัพย์นั้นทั้งหมดหรือแต่บางส่วน หรือเข้าไปกระทำการใด ๆ อันเป็นการรบกวนการครอบครองอสังหาริมทรัพย์ของเขาโดยปกติสุข ต้องระวางโทษจำคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่นบาท หรือทั้งจำทั้งปรับ"},
  {m:"364",c:"ความผิดเกี่ยวกับทรัพย์ หมวด 8",t:"บุกรุกเคหสถาน",l:"ผู้ใดโดยไม่มีเหตุอันสมควร เข้าไปหรือซ่อนตัวอยู่ในเคหสถาน อาคารเก็บรักษาทรัพย์หรือสำนักงานในความครอบครองของผู้อื่น หรือไม่ยอมออกไปจากสถานที่เช่นว่านั้นเมื่อผู้มีสิทธิที่จะห้ามมิให้เข้าไปได้ไล่ให้ออก ต้องระวางโทษจำคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่นบาท หรือทั้งจำทั้งปรับ"},
  {m:"365",c:"ความผิดเกี่ยวกับทรัพย์ หมวด 8",t:"บุกรุกฉกรรจ์ (มีเหตุเพิ่มโทษ)",l:"ถ้าการกระทำความผิดตามมาตรา ๓๖๒ มาตรา ๓๖๓ หรือมาตรา ๓๖๔ ได้กระทำ\n(๑) โดยใช้กำลังประทุษร้ายหรือขู่เข็ญว่าจะใช้กำลังประทุษร้าย\n(๒) โดยมีอาวุธหรือโดยร่วมกระทำความผิดด้วยกันตั้งแต่สองคนขึ้นไป หรือ\n(๓) ในเวลากลางคืน\n\nผู้กระทำต้องระวางโทษจำคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจำทั้งปรับ"},

  // --- หมวด ๓ ความผิดเกี่ยวกับเอกสาร ---
  {m:"264",c:"ความผิดเกี่ยวกับเอกสาร",t:"ปลอมเอกสาร",l:"ผู้ใดทำเอกสารปลอมขึ้นทั้งฉบับหรือแต่ส่วนหนึ่งส่วนใด เติมหรือตัดทอนข้อความ หรือแก้ไขด้วยประการใด ๆ ในเอกสารที่แท้จริง โดยประการที่น่าจะเกิดความเสียหายแก่ผู้อื่นหรือประชาชน ถ้าได้กระทำเพื่อให้ผู้หนึ่งผู้ใดหลงเชื่อว่าเป็นเอกสารที่แท้จริง ผู้นั้นกระทำความผิดฐานปลอมเอกสาร ต้องระวางโทษจำคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจำทั้งปรับ\n\nผู้ใดกรอกข้อความลงในแผ่นกระดาษหรือวัตถุอื่นใด ซึ่งมีลายมือชื่อของผู้อื่นโดยมิได้รับความยินยอม หรือฝ่าฝืนคำสั่งของผู้นั้น ถ้าได้กระทำเพื่อนำเอาเอกสารนั้นไปใช้ในกิจการที่อาจเกิดความเสียหายแก่ผู้หนึ่งผู้ใดหรือประชาชน ให้ถือว่าผู้นั้นปลอมเอกสาร ต้องระวางโทษเช่นเดียวกัน"},
  {m:"265",c:"ความผิดเกี่ยวกับเอกสาร",t:"ปลอมเอกสารสิทธิ หรือเอกสารราชการ",l:"ผู้ใดปลอมเอกสารสิทธิ หรือเอกสารราชการ ต้องระวางโทษจำคุกตั้งแต่หกเดือนถึงห้าปี และปรับตั้งแต่หนึ่งหมื่นบาทถึงหนึ่งแสนบาท"},
  {m:"266",c:"ความผิดเกี่ยวกับเอกสาร",t:"ปลอมเอกสารสิทธิอันเป็นเอกสารราชการ/พินัยกรรม",l:"ผู้ใดปลอมเอกสารดังต่อไปนี้\n(๑) เอกสารสิทธิอันเป็นเอกสารราชการ\n(๒) พินัยกรรม\n(๓) ใบหุ้น ใบหุ้นกู้ หรือใบสำคัญของใบหุ้นหรือใบหุ้นกู้\n(๔) ตั๋วเงิน หรือ\n(๕) บัตรเงินฝาก\nต้องระวางโทษจำคุกตั้งแต่หนึ่งปีถึงสิบปี และปรับตั้งแต่สองหมื่นบาทถึงสองแสนบาท"},
  {m:"267",c:"ความผิดเกี่ยวกับเอกสาร",t:"แจ้งให้เจ้าพนักงานจดข้อความอันเป็นเท็จ",l:"ผู้ใดแจ้งให้เจ้าพนักงานผู้กระทำการตามหน้าที่จดข้อความอันเป็นเท็จลงในเอกสารมหาชนหรือเอกสารราชการ ซึ่งมีวัตถุประสงค์สำหรับใช้เป็นพยานหลักฐาน โดยประการที่น่าจะเกิดความเสียหายแก่ผู้อื่นหรือประชาชน ต้องระวางโทษจำคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจำทั้งปรับ"},
  {m:"268",c:"ความผิดเกี่ยวกับเอกสาร",t:"ใช้หรืออ้างเอกสารปลอม",l:"ผู้ใดใช้หรืออ้างเอกสารอันเกิดจากการกระทำความผิดตามมาตรา ๒๖๔ มาตรา ๒๖๕ มาตรา ๒๖๖ หรือมาตรา ๒๖๗ ในประการที่น่าจะเกิดความเสียหายแก่ผู้อื่นหรือประชาชน ต้องระวางโทษดังที่บัญญัติไว้ในมาตรานั้น ๆ"},

  // --- ความผิดเกี่ยวกับบัตรอิเล็กทรอนิกส์ ---
  {m:"269/1",c:"ความผิดเกี่ยวกับบัตรอิเล็กทรอนิกส์",t:"ทำบัตรอิเล็กทรอนิกส์ปลอม",l:"ผู้ใดทำบัตรอิเล็กทรอนิกส์ปลอมขึ้นทั้งฉบับหรือแต่ส่วนหนึ่งส่วนใด เติมหรือตัดทอนข้อความ หรือแก้ไขด้วยประการใด ๆ ในบัตรอิเล็กทรอนิกส์ที่แท้จริง โดยประการที่น่าจะเกิดความเสียหายแก่ผู้อื่นหรือประชาชน ถ้าได้กระทำเพื่อให้ผู้หนึ่งผู้ใดหลงเชื่อว่าเป็นบัตรอิเล็กทรอนิกส์ที่แท้จริงหรือเพื่อใช้ประโยชน์ในการชำระค่าสินค้า ค่าบริการหรือหนี้อื่นแทนการชำระด้วยเงินสด หรือใช้เบิกถอนเงินสด ต้องระวางโทษจำคุกตั้งแต่หนึ่งปีถึงห้าปี และปรับตั้งแต่สองหมื่นบาทถึงแสนบาท"},
  {m:"269/4",c:"ความผิดเกี่ยวกับบัตรอิเล็กทรอนิกส์",t:"ใช้บัตรอิเล็กทรอนิกส์ปลอมหรือของผู้อื่นโดยมิชอบ",l:"ผู้ใดใช้บัตรอิเล็กทรอนิกส์ที่ผู้ออกได้ออกให้แก่ผู้มีสิทธิใช้ เพื่อประโยชน์ในการชำระค่าสินค้า ค่าบริการหรือหนี้อื่นแทนการชำระด้วยเงินสด หรือใช้เบิกถอนเงินสด โดยมิชอบในประการที่น่าจะเกิดความเสียหายแก่ผู้อื่นหรือประชาชน ต้องระวางโทษจำคุกตั้งแต่หนึ่งปีถึงเจ็ดปี หรือปรับตั้งแต่สองหมื่นบาทถึงหนึ่งแสนสี่หมื่นบาท หรือทั้งจำทั้งปรับ"},

  // --- หมวดความผิดเกี่ยวกับเสรีภาพและชื่อเสียง (หมิ่นประมาท) ---
  {m:"309",c:"ความผิดต่อเสรีภาพ",t:"ข่มขืนใจผู้อื่น",l:"ผู้ใดข่มขืนใจผู้อื่นให้กระทำการใด ไม่กระทำการใด หรือจำยอมต่อสิ่งใด โดยทำให้กลัวว่าจะเกิดอันตรายต่อชีวิต ร่างกาย เสรีภาพ ชื่อเสียงหรือทรัพย์สินของผู้ถูกข่มขืนใจนั้นเองหรือของผู้อื่น หรือโดยใช้กำลังประทุษร้าย จนผู้ถูกข่มขืนใจต้องกระทำการนั้น ไม่กระทำการนั้นหรือจำยอมต่อสิ่งนั้น ต้องระวางโทษจำคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจำทั้งปรับ"},
  {m:"310",c:"ความผิดต่อเสรีภาพ",t:"หน่วงเหนี่ยวกักขังผู้อื่น",l:"ผู้ใดหน่วงเหนี่ยวหรือกักขังผู้อื่น หรือกระทำด้วยประการใดให้ผู้อื่นปราศจากเสรีภาพในร่างกาย ต้องระวางโทษจำคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจำทั้งปรับ"},
  {m:"322",c:"ความผิดฐานเปิดเผยความลับ",t:"เปิดผนึกจดหมายหรือเอกสารผู้อื่น",l:"ผู้ใดเปิดผนึกหรือเอาจดหมาย โทรเลข หรือเอกสารใด ๆ ซึ่งปิดผนึกของผู้อื่นไป เพื่อล่วงรู้ข้อความแล้วเปิดเผยข้อความในจดหมาย โทรเลข หรือเอกสารนั้น ในประการที่น่าจะเกิดความเสียหายแก่ผู้หนึ่งผู้ใด ต้องระวางโทษจำคุกไม่เกินหกเดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือทั้งจำทั้งปรับ"},
  {m:"326",c:"ความผิดฐานหมิ่นประมาท",t:"หมิ่นประมาททั่วไป",l:"ผู้ใดใส่ความผู้อื่นต่อบุคคลที่สาม โดยประการที่น่าจะทำให้ผู้อื่นนั้นเสียชื่อเสียง ถูกดูหมิ่น หรือถูกเกลียดชัง ผู้นั้นกระทำความผิดฐานหมิ่นประมาท ต้องระวางโทษจำคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่นบาท หรือทั้งจำทั้งปรับ"},
  {m:"328",c:"ความผิดฐานหมิ่นประมาท",t:"หมิ่นประมาทด้วยการโฆษณา",l:"ถ้าความผิดฐานหมิ่นประมาทได้กระทำโดยการโฆษณาด้วยเอกสาร ภาพวาด ภาพระบายสี ภาพยนตร์ แถบบันทึกเสียง แถบบันทึกภาพ หรือสิ่งบันทึกเสียงหรือภาพอย่างอื่น กิจการกระจายเสียง หรือกิจการโทรทัศน์ หรือโดยการป่าวประกาศด้วยวิธีอื่น ผู้กระทำต้องระวางโทษจำคุกไม่เกินสองปี และปรับไม่เกินสองแสนบาท"},
  {m:"329",c:"ความผิดฐานหมิ่นประมาท",t:"ข้อยกเว้นความผิดฐานหมิ่นประมาท (แสดงความเห็นสุจริต)",l:"ผู้ใดแสดงความคิดเห็นหรือข้อความใดโดยสุจริต\n(๑) เพื่อความชอบธรรม ป้องกันตนหรือป้องกันส่วนได้เสียเกี่ยวกับตนตามคลองธรรม\n(๒) ในฐานะเป็นเจ้าพนักงานปฏิบัติการตามหน้าที่\n(๓) ติชม ด้วยความชอบธรรม ซึ่งสินค้าหรือการกระทำของบุคคลใดอันเป็นธรรมดาประชาชนย่อมติชมได้ หรือ\n(๔) ในการแจ้งข่าวด้วยความสุจริตเรื่องการดำเนินการอันเปิดเผยในศาลหรือในการประชุม\nผู้นั้นไม่มีความผิดฐานหมิ่นประมาท"},

  // --- ภาค ๓ ลหุโทษ ---
  {m:"367",c:"ภาค ๓ ลหุโทษ",t:"ไม่บอกชื่อหรือที่อยู่แก่เจ้าพนักงาน",l:"ผู้ใดเมื่อเจ้าพนักงานถามชื่อหรือที่อยู่เพื่อปฏิบัติการตามกฎหมาย ไม่ยอมบอก หรือบอกชื่อหรือที่อยู่ประชดหรือบอกอันเป็นเท็จ ต้องระวางโทษปรับไม่เกินหนึ่งพันบาท"},
  {m:"368",c:"ภาค ๓ ลหุโทษ",t:"ไม่ปฏิบัติตามคำสั่งเจ้าพนักงาน",l:"ผู้ใดทราบคำสั่งของเจ้าพนักงานซึ่งสั่งการตามอำนาจที่มีกฎหมายให้ไว้ ไม่ปฏิบัติตามคำสั่งนั้นโดยไม่มีเหตุหรือข้อแก้ตัวอันสมควร ต้องระวางโทษจำคุกไม่เกินสิบวัน หรือปรับไม่เกิน๕,๐๐0บาท หรือทั้งจำทั้งปรับ\n\nถ้าคำสั่งนั้นเป็นคำสั่งให้ช่วยพิทักษ์รักษาความสงบเรียบร้อย หรือป้องกันภยันตรายสาธารณะ ต้องระวางโทษจำคุกไม่เกินหนึ่งเดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือทั้งจำทั้งปรับ"},
  {m:"369",c:"ภาค ๓ ลหุโทษ",t:"ทำลายประกาศแผ่นปลิวของเจ้าพนักงาน",l:"ผู้ใดกระทำด้วยประการใด ๆ ให้ประกาศ แผ่นปลิว หรือเอกสารใด ๆ ที่เจ้าพนักงานร้อยติด ยึด หรือปิดไว้ในหน้าที่ หรือสั่งให้ติด ยึด หรือปิดไว้ หลุด ฉีก หรือไร้ประโยชน์ ต้องระวางโทษปรับไม่เกิน๕,๐๐๐บาท"},
  {m:"370",c:"ภาค ๓ ลหุโทษ",t:"ส่งเสียงอื้ออึงโดยไม่มีเหตุอันควร",l:"ผู้ใดส่งเสียง ทำให้เกิดเสียงหรือกระทำความอื้ออึงโดยไม่มีเหตุอันสมควร จนทำให้ประชาชนตกใจหรือเดือดร้อน ต้องระวางโทษปรับไม่เกินหนึ่งพันบาท"},
  {m:"391",c:"ภาค ๓ ลหุโทษ",t:"ใช้กำลังทำร้ายผู้อื่นไม่ถึงกับเป็นอันตรายแก่กาย",l:"ผู้ใดใช้กำลังทำร้ายผู้อื่น โดยไม่ถึงกับเป็นเหตุให้เกิดอันตรายแก่กายหรือจิตใจ ต้องระวางโทษจำคุกไม่เกินหนึ่งเดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือทั้งจำทั้งปรับ"},
  {m:"392",c:"ภาค ๓ ลหุโทษ",t:"ขู่เข็ญผู้อื่นให้กลัวหรือตกใจ",l:"ผู้ใดขู่เข็ญผู้อื่นให้กลัวหรือตกใจ โดยการขู่เข็ญ ต้องระวางโทษจำคุกไม่เกินหนึ่งเดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือทั้งจำทั้งปรับ"},
  {m:"393",c:"ภาค ๓ ลหุโทษ",t:"ดูหมิ่นผู้อื่นซึ่งหน้าหรือด้วยการโฆษณา",l:"ผู้ใดดูหมิ่นผู้อื่นซึ่งหน้าหรือด้วยการโฆษณา ต้องระวางโทษจำคุกไม่เกินหนึ่งเดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือทั้งจำทั้งปรับ"},

let history = [];
try { history = JSON.parse(localStorage.getItem("l_hist") || "[]"); } catch(e){}

function esc(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function highlight(txt, q) {
  if (!q) return esc(txt);
  const words = q.split(/\s+/).filter(w => w.length > 0);
  let res = esc(txt);
  words.forEach(w => {
    const regex = new RegExp(`(${esc(w)})`, "gi");
    res = res.replace(regex, "<span class='hl'>$1</span>");
  });
  return res;
}

function search() {
  const q = document.getElementById("q").value.trim().toLowerCase();
  const rp = document.getElementById("rp");
  
  let filtered = items;
  if (q) {
    const words = q.split(/\s+/);
    filtered = items.filter(h => {
      const target = `${h.m} ${h.t} ${h.l} ${h.c}`.toLowerCase();
      return words.every(w => target.includes(w));
    });
  }

  document.getElementById("cnt").innerText = `ทั้งหมด ${filtered.length} มาตรา`;

  if (filtered.length === 0) {
    rp.innerHTML = "<div class='empty'>🔒 ไม่พบข้อมูลมาตราหรือฐานความผิดที่สืบค้น</div>";
    return;
  }

  rp.innerHTML = filtered.map(h => `
    <div class="card" onclick="addHist('${h.m}')">
      <div class="ch">
        <div class="m">มาตรา<span>${highlight(h.m, q)}</span></div>
        <div class="t">${highlight(h.t, q)}</div>
      </div>
      <div class="cb">
        <div class="lbl">${esc(h.c)}</div>
        <div class="txt">${highlight(h.l, q)}</div>
      </div>
    </div>
  `).join("");
}

function addHist(m) {
  const found = items.find(h => h.m === m);
  if (!found) return;
  history = history.filter(h => h.m !== m);
  history.unshift({ m: found.m, t: found.t, text: found.l, t: new Date() });
  if (history.length > 30) history.pop();
  localStorage.setItem("l_hist", JSON.stringify(history));
  renderHist();
}

function renderHist() {
  const hp = document.getElementById("hp");
  if (history.length === 0) {
    hp.innerHTML = "<div class='empty'>ไม่มีประวัติการเข้าชมมาตรากฎหมาย</div>";
    return;
  }
  hp.innerHTML = history.map(h => `
    <div class="h-item" onclick="document.getElementById('q').value='${h.m}';stab('s');search();">
      <div class="h-info">
        <div style="font-weight:700;font-size:14px">มาตรา ${esc(h.m)} : ${esc(h.t)}</div>
        <div style="font-size:12px;color:#64748b;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(h.text)}</div>
      </div>
      <div class="ht">${new Date(h.t).toLocaleTimeString("th-TH")}</div>
    </div>
  `).join("");
}

function stab(t) {
  document.getElementById("rp").style.display = t === "s" ? "" : "none";
  document.getElementById("hp").style.display = t === "h" ? "" : "none";
  document.getElementById("ts").classList.toggle("on", t === "s");
  document.getElementById("th").classList.toggle("on", t === "h");
}

let dp = null;
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;

window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault(); dp = e;
  document.getElementById("inst-btn").style.display = "block";
});

window.addEventListener("appinstalled", () => {
  document.getElementById("inst-btn").style.display = "none"; dp = null;
});

async function doInstall() {
  if (dp) {
    dp.prompt();
    const { outcome } = await dp.userChoice;
    if (outcome === "accepted") dp = null;
  } else if (isIOS) {
    document.getElementById("ig").style.display = "block";
  }
}

// เริ่มต้นเปิดหน้าระบบ
search();
renderHist();
</script>
