ยามฆ่าบุคคลหนึ่งบุคคลใดดังระบุไว้ในมาตรา ๑๓๐ หรือมาตรา ๑๓๑ ต้องระวางโทษประหารชีวิตหรือจําคุกตลอดชีวิต"},{"section":"มาตรา ๑๓๓","num":"133","text":"ผู้ใดหมิ่นประมาท ดูหมิ่นหรือแสดงความอาฆาตมาด ร้ายราชาธิบดี ราชินี ราชสามี รัชทายาท หรือประมุขแห่งรัฐต่างประเทศ ต้องระวางโทษ จํา คุกตั้งแต่หนึ่งปีถึงเจ็ดปี หรือปรับตั้งแต่สองหมื่นบาทถึงหนึ่งแสนสี่หมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๓๔","num":"134","text":"ผู้ใดหมิ่นประมาท ดูหมิ่นหรือแสดงความอาฆาตมาดร้ายผู้ แทนรัฐต่างประเทศซึ่งได้รับแต่งตั้งให้มาสู่พระราชสํานัก ต้องระวางโทษ จําคุกตั้งแต่หก เดือนถึงห้าปี หรือปรับตั้งแต่หนึ่งหมื่นบาทถึงหนึ่งแสนบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๓๕/๒","num":"135/2","text":"ผู้ใด (๑) ขู่เข็ญว่าจะกระทําการก่อการร้าย โดยมีพฤติการณ์อันควรเชื่อได้ว่าบุคคล นั้นจะกระทําการตามที่ขู่เข็ญจริง หรือ (๒) สะสมกําลังพลหรืออาวุธ จัดหาหรือรวบรวมทรัพย์สิน ให้หรือรับการ ฝึกการก่อการร้าย ตระเตรียมการอื่นใด หรือสมคบกัน เพื่อก่อการร้าย หรือกระทําความผิดใด ๆ อันเป็นส่วนของแผนการเพื่อก่อการร้าย หรือยุยงประชาชนให้เข้ามีส่วนในการก่อการร้าย หรือรู้ว่ามีผู้จะก่อการร้ายแล้วกระทําการใดอันเป็นการช่วยปกปิดไว้ ผู้นั้นต้องระวางโทษจําคุกตั้งแต่สองปีถึงสิบปี และปรับตั้งแต่สี่หมื่นบาทถึง สองแสนบาท"},{"section":"มาตรา ๑๓๕","num":"135","text":"แก้ไขเพิ่มเติมโดยคําสั่งของคณะปฏิรูปการปกครองแผ่นดิน ฉบับที่ ๔๑ ลงวัน ที่ ๒๑ ตุลาคม พ.ศ. ๒๕๑๙ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๕ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ ลักษณะ ๑/๑ ความผิดเกี่ยวกับการก่อการร้าย มาตรา ๑๓๕/๑ ถึงมาตรา ๑๓๕/๔ เพิ่มโดย พระราชกําหนดแก้ไขเพิ่มเติมประมวลกฎหมายอาญา พ.ศ. ๒๕๔๖"},{"section":"มาตรา ๑๓๕/๑","num":"135/1","text":"ผู้ใดกระทําการอันเป็นความผิดอาญาดังต่อไปนี้ (๑) ใช้กําลังประทุษร้าย หรือกระทําการใดอันก่อให้เกิดอันตรายต่อชีวิต หรือ อันตรายอย่างร้ายแรงต่อร่างกาย หรือเสรีภาพของบุคคลใด ๆ (๒) กระทําการใดอันก่อให้เกิดความเสียหายอย่างร้ายแรงแก่ระบบการขนส่ง สาธารณะ ระบบโทรคมนาคม หรือโครงสร้างพื้นฐานอันเป็นประโยชน์สาธารณะ กระทําการใดอันก่อให้เกิดความเสียหายแก่ทรัพย์สินของรัฐหนึ่งรัฐใด หรือของบุคคลใดหรือต่อสิ่งแวดล้อม อันก่อให้เกิดหรือน่าจะก่อให้เกิดความเสียหายทาง เศรษฐกิจอย่างสําคัญ ถ้าการกระทํานั้นได้กระทําโดยมีความมุ่งหมายเพื่อขู่เข็ญหรือบังคับรัฐบาล ไทย รัฐบาลต่างประเทศ หรือองค์การระหว่างประเทศ ให้กระทําหรือไม่กระทําการใดอันจะก่อ ให้เกิดความเสียหายอย่างร้ายแรง หรือเพื่อสร้างความปั่ นป่วนโดยให้เกิดความหวาดกลัวในหมู่ ประชาชน ผู้นั้นกระทําความผิดฐานก่อการร้าย ต้องระวางโทษประหารชีวิต จําคุกตลอดชีวิต หรือจําคุกตั้งแต่สามปีถึงยี่สิบปี และปรับตั้งแต่หกหมื่นบาทถึงหนึ่งล้านบาท การกระทําในการเดินขบวน ชุมนุม ประท้วง โต้แย้ง หรือเคลื่อนไหวเพื่อ เรียกร้องให้รัฐช่วยเหลือหรือให้ได้รับความเป็นธรรมอันเป็นการใช้เสรีภาพตามรัฐธรรมนูญ ไม่ เป็นการกระทําความผิดฐานก่อการร้าย"},{"section":"มาตรา ๑๓๕/๓","num":"135/3","text":"ผู้ใดเป็นผู้สนับสนุนในการกระทําความผิดตามมาตรา ๑๓๕/๑ หรือมาตรา ๑๓๕/๒ ต้องระวางโทษเช่นเดียวกับตัวการในความผิดนั้น ๆ"},{"section":"มาตรา ๑๓๕/๔","num":"135/4","text":"ผู้ใดเป็นสมาชิกของคณะบุคคลซึ่งมีมติของหรือประกาศ ภายใต้คณะมนตรีความมั่นคงแห่งสหประชาชาติกําหนดให้เป็นคณะบุคคลที่มีการกระทําอัน เป็นการก่อการร้ายและรัฐบาลไทยได้ประกาศให้ความรับรองมติหรือประกาศดังกล่าวด้วยแล้ว ้ ผู้นั้นต้องระวางโทษจําคุกไม่เกินเจ็ดปีและปรับไม่เกินหนึ่งแสนสี่หมื่นบาท ลักษณะ ๒ ความผิดเกี่ยวกับการปกครอง หมวด ๑ ความผิดต่อเจ้าพนักงาน"},{"section":"มาตรา ๑๓๖","num":"136","text":"แก้ไขเพิ่มเติมโดยคําสั่งของคณะปฏิรูปการปกครองแผ่นดิน ฉบับที่ ๔๑ ลงวัน ที่ ๒๑ ตุลาคม พ.ศ. ๒๕๑๙ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๕ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐"},{"section":"มาตรา ๑๓๗","num":"137","text":"ผู้ใดแจ้งข้อความอันเป็นเท็จแก่เจ้าพนักงาน ซึ่งอาจทําให้ผู้ อื่นหรือประชาชนเสียหาย ต้องระวางโทษจําคุกไม่เกินหกเดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๓๘","num":"138","text":"ผู้ใดต่อสู้ หรือขัดขวางเจ้าพนักงานหรือผู้ซึ่งต้องช่วย เจ้าพนักงานตามกฎหมายในการปฏิบัติการตามหน้าที่ ต้องระวางโทษ จําคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่นบาท หรือทั้งจําทั้งปรับ ถ้ากา ม ต้องระวาง โทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๔๓","num":"143","text":"ผู้ใดเรียก รับหรือยอมจะรับทรัพย์สินหรือประโยชน์อื่นใด สําหรับตนเองหรือผู้อื่น เป็นการตอบแทนในการที่จะจูงใจหรือได้จูงใจเจ้าพนักงาน สมาชิก สภานิติบัญญัติแห่งรัฐ สมาชิกสภาจังหวัดหรือสมาชิกสภาเทศบาลโดยวิธีอันทุจริตหรือผิด กฎหมายหรือโดยอิทธิพลของตนให้กระทําการ หรือไม่กระทําการในหน้าที่อันเป็นคุณหรือเป็น โทษแก่บุคคลใด ต้องระวางโทษจําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจําทั้ง ปรับ"},{"section":"มาตรา ๑๔๔","num":"144","text":"ผู้ใดให้ ขอให้หรือรับว่าจะให้ทรัพย์สินหรือประโยชน์อื่นใดแก่ เจ้าพนักงาน สมาชิกสภานิติบัญญัติแห่งรัฐ สมาชิกสภาจังหวัดหรือสมาชิกสภาเทศบาล เพื่อ จูงใจให้กระทําการ ไม่กระทําการหรือประวิงการกระทําอันมิชอบด้วยหน้าที่ ต้องระวางโทษจํา คุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๔๕","num":"145","text":"ผู้ใดแสดงตนเป็นเจ้าพนักงาน และกระทําการเป็น เจ้าพนักงาน โดยตนเองมิได้เป็นเจ้าพนักงานที่มีอํานาจกระทําการนั้น ต้องระวางโทษจําคุกไม่ เกินหนึ่งปี หรือปรับไม่เกินสองหมื่นบาท หรือทั้งจําทั้งปรับ เจ้าพนักงานผู้ใดได้รับคําสั่งมิให้ปฏิบัติการตามตําแหน่งหน้าที่ต่อไปแล้ว ยัง ฝ่าฝืนกระทําการใด ๆ ในตําแหน่งหน้าที่นั้น ต้องระวางโทษตามที่กําหนดไว้ในวรรคแรกดุจกัน"},{"section":"มาตรา ๑๔๖","num":"146","text":"ผู้ใดไม่มีสิทธิที่จะสวมเครื่องแบบหรือประดับเครื่องหมาย ของเจ้าพนักงาน สมาชิกสภานิติบัญญัติแห่งรัฐ สมาชิกสภาจังหวัดหรือสมาชิกสภาเทศบาล หรือไม่มีสิทธิใช้ยศ ตําแหน่ง เครื่องราชอิสริยาภรณ์หรือสิ่งที่หมายถึงเครื่องราชอิสริยาภรณ์ กระทําการเช่นนั้นเพื่อให้บุคคลอื่นเชื่อว่าตนมีสิทธิ ต้องระวางโทษจําคุกไม่เกินหนึ่งปี หรือปรับ ไม่เกินสองหมื่นบาท หรือทั้งจําทั้งปรับ หมวด ๒ ความผิดต่อตําแหน่งหน้าที่ราชการ"},{"section":"มาตรา ๑๔๗","num":"147","text":"ผู้ใดเป็นเจ้าพนักงาน มีหน้าที่ซื้อ ทํา จัดการหรือรักษาทรัพย์ ใด เบียดบังทรัพย์นั้นเป็นของตน หรือเป็นของผู้อื่นโดยทุจริต หรือโดยทุจริตยอมให้ผู้อื่น เอาทรัพย์นั้นเสีย ต้องระวางโทษ จําคุกตั้งแต่ห้าปีถึงยี่สิบปี หรือจําคุกตลอดชีวิต และปรับ ตั้งแต่หนึ่งแสนบาทถึงสี่แสนบาท"},{"section":"มาตรา ๑๔๘","num":"148","text":"ผู้ใดเป็นเจ้าพนักงาน ใช้อํานาจในตําแหน่งโดยมิชอบ ข่มขืนใจหรือจูงใจเพื่อให้บุคคลใดมอบให้หรือหามาให้ซึ่งทรัพย์สินหรือประโยชน์อื่นใดแก่ตนเอง หรือผู้อื่น ต้องระวางโทษ จําคุกตั้งแต่ห้าปีถึงยี่สิบปี หรือจําคุกตลอดชีวิต และปรับตั้งแต่หนึ่ง แสนบาทถึงสี่แสนบาท หรือประหารชีวิต ้"},{"section":"มาตรา ๑๔๙","num":"149","text":"ผู้ใดเป็นเจ้าพนักงานสมาชิกสภานิติบัญญัติแห่งรัฐ สมาชิก สภาจังหวัด หรือสมาชิกสภาเทศบาล เรียก รับ หรือยอมจะรับทรัพย์สิน หรือประโยชน์อื่นใด สําหรับตนเองหรือผู้อื่นโดยมิชอบ เพื่อกระทําการหรือไม่กระทําการอย่างใดในตําแหน่งไม่ว่า การนั้นจะชอบหรือมิชอบด้วยหน้าที่ ต้องระวางโทษ จําคุกตั้งแต่ห้าปีถึงยี่สิบปี หรือจําคุก ตลอดชีวิต และปรับตั้งแต่หนึ่งแสนบาทถึงสี่แสนบาท หรือประหารชีวิต"},{"section":"มาตรา ๑๕๐","num":"150","text":"ผู้ใดเป็นเจ้าพนักงาน กระทําการหรือไม่กระทําการอย่างใด ในตําแหน่งโดยเห็นแก่ทรัพย์สินหรือประโยชน์อื่นใด ซึ่งตนได้เรียก รับ หรือยอมจะรับไว้ก่อนที่ ตนได้รับแต่งตั้งเป็นเจ้าพนักงานในตําแหน่งนั้น ต้องระวางโทษ จําคุกตั้งแต่ห้าปีถึงยี่สิบปี หรือจําคุกตลอดชีวิต และปรับตั้งแต่หนึ่งแสนบาทถึงสี่แสนบาท"},{"section":"มาตรา ๑๕๑","num":"151","text":"ผู้ใดเป็นเจ้าพนักงาน มีหน้าที่ซื้อ ทํา จัดการหรือรักษาทรัพย์ ใด ๆ ใช้อํานาจในตําแหน่งโดยทุจริต อันเป็นการเสียหายแก่รัฐ เทศบาล สุขาภิบาลหรือเจ้าของ ทรัพย์นั้น ต้องระวางโทษ จําคุกตั้งแต่ห้าปีถึงยี่สิบปี หรือจําคุกตลอดชีวิต และปรับตั้งแต่ หนึ่งแสนบาทถึงสี่แสนบาท"},{"section":"มาตรา ๑๕๒","num":"152","text":"ผู้ใดเป็นเจ้าพนักงาน มีหน้าที่จัดการหรือดูแลกิจการใด เข้า มีส่วนได้เสียเพื่อประโยชน์สําหรับตนเองหรือผู้อื่นเนื่องด้วยกิจการนั้น ต้องระวางโทษ จําคุก ตั้งแต่หนึ่งปีถึงสิบปี และปรับตั้งแต่สองหมื่นบาทถึงสองแสนบาท"},{"section":"มาตรา ๑๕๓","num":"153","text":"แก้ไขเพิ่มเติมโดยพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา พ.ศ. ๒๕๐๒ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๗ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐"},{"section":"มาตรา ๑๕๔","num":"154","text":"ผู้ใดเป็นเจ้าพนักงาน มีหน้าที่หรือแสดงว่าตนมีหน้าที่เรียก เก็บหรือตรวจสอบภาษีอากร ค่าธรรมเนียมหรือเงินอื่นใด โดยทุจริตเรียกเก็บหรือละเว้นไม่เรียก เก็บภาษีอากร ค่าธรรมเนียมหรือเงินนั้น หรือกระทําการหรือไม่กระทําการอย่างใด เพื่อให้ผู้มี หน้าที่เสียภาษีอากรหรือค่าธรรมเนียมนั้นมิต้องเสีย หรือเสียน้อยไปกว่าที่จะต้องเสีย ต้อง ระวางโทษ จําคุกตั้งแต่ห้าปีถึงยี่สิบปี หรือจําคุกตลอดชีวิต และปรับตั้งแต่หนึ่งแสนบาทถึงสี่ แสนบาท"},{"section":"มาตรา ๑๕๕","num":"155","text":"ผู้ใดเป็นเจ้าพนักงาน มีหน้าที่กําหนดราคาทรัพย์สินหรือ สินค้าใด ๆ เพื่อเรียกเก็บภาษีอากรหรือค่าธรรมเนียมตามกฎหมาย โดยทุจริตกําหนดราคา ทรัพย์สินหรือสินค้านั้น เพื่อให้ผู้มีหน้าที่เสียภาษีอากรหรือค่าธรรมเนียมนั้นมิต้องเสียหรือเสีย น้อยไปกว่าที่จะต้องเสีย ต้องระวางโทษ จําคุกตั้งแต่ห้าปีถึงยี่สิบปี หรือจําคุกตลอดชีวิต และ ปรับตั้งแต่หนึ่งแสนบาทถึงสี่แสนบาท"},{"section":"มาตรา ๑๕๖","num":"156","text":"ผู้ใดเป็นเจ้าพนักงาน มีหน้าที่ตรวจสอบบัญชีตามกฎหมาย โดยทุจริต แนะนํา หรือกระทําการหรือไม่กระทําการอย่างใด เพื่อให้มีการละเว้นการลงรายการ ในบัญชีลงรายการเท็จในบัญชี แก้ไขบัญชี หรือซ่อนเร้น หรือทําหลักฐานในการลงบัญชีอันจะ เป็นผลให้การเสียภาษีอากรหรือค่าธรรมเนียมนั้นมิต้องเสีย หรือเสียน้อยกว่าที่จะต้องเสีย ต้อง ระวางโทษ จําคุกตั้งแต่ห้าปีถึงยี่สิบปี หรือจําคุกตลอดชีวิต และปรับตั้งแต่หนึ่งแสนบาทถึงสี่ แสนบาท"},{"section":"มาตรา ๑๕๗","num":"157","text":"แก้ไขเพิ่มเติมโดยพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา พ.ศ. ๒๕๐๒ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๗ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย กระทําการอย่างใดขึ้น หรือว่าการอย่างใดได้ กระทําต่อหน้าตนอันเป็นความเท็จ (๒) รับรองเป็นหลักฐานว่า ได้มีการแจ้งซึ่งข้อความอันมิได้มีการแจ้ง (๓) ละเว้นไม่จดข้อความซึ่งตนมีหน้าที่ต้องรับจดหรือจดเปลี่ยนแปลงข้อความ เช่นว่านั้น หรือ (๔) รับรองเป็นหลักฐานซึ่งข้อเท็จจริงอันเอกสารนั้นมุ่งพิสูจน์ความจริงอันเป็น ความเท็จ ต้องระวางโทษจําคุกไม่เกินเจ็ดปี และปรับไม่เกินหนึ่งแสนสี่หมื่นบาท"},{"section":"มาตรา ๑๖๓","num":"163","text":"ผู้ใดเป็นเจ้าพนักงาน มีหน้าที่ในการไปรษณีย์ โทรเลขหรือ โทรศัพท์ กระทําการอันมิชอบด้วยหน้าที่ดังต่อไปนี้ (๑) เปิด หรือยอมให้ผู้อื่นเปิด จดหมายหรือสิ่งอื่นที่ส่งทางไปรษณีย์หรือ โทรเลข (๒) ทําให้เสียหาย ทําลาย ทําให้สูญหาย หรือยอมให้ผู้อื่นทําให้เสียหาย ทําลายหรือทําให้สูญหาย ซึ่งจดหมายหรือสิ่งอื่นที่ส่งทางไปรษณีย์หรือโทรเลข (๓) กัก ส่งให้ผิดทาง หรือส่งให้แก่บุคคลซึ่งรู้ว่ามิใช่เป็นผู้ควรรับซึ่งจดหมาย หรือสิ่งอื่นที่ส่งทางไปรษณีย์หรือโทรเลข หรือ เปิดเผยข้อความที่ส่งทางไปรษณีย์ ทางโทรเลข หรือทางโทรศัพท์ ต้องระวางโทษจําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจําทั้ง ปรับ"},{"section":"มาตรา ๑๖๔","num":"164","text":"ผู้ใดเป็นเจ้าพนักงาน รู้หรืออาจรู้ความลับในราชการ กระทํา โดยประการใด ๆ อันมิชอบด้วยหน้าที่ให้ผู้อื่นล่วงรู้ความลับนั้น ต้องระวางโทษจําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๖๕","num":"165","text":"ผู้ใดเป็นเจ้าพนักงาน มีหน้าที่ปฏิบัติการให้เป็นไปตาม กฎหมายหรือคําสั่งซึ่งได้สั่งเพื่อบังคับการให้เป็นไปตามกฎหมาย ป้องกันหรือขัดขวางมิให้การ เป็นไปตามกฎหมายหรือคําสั่งนั้น ต้องระวางโทษจําคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่น บาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๖๖","num":"166","text":"(๔) ความผิดต่อเจ้าพนักงานในการยุติธรรม ตามที่บัญญัติไว้ในมาตรา ๑๖๗ ถึงมาตรา ๑๙๒ และมาตรา ๑๙๔ ความผิดต่อตําแหน่งหน้าที่ในการยุติธรรม ตามที่บัญญัติไว้ในมาตรา ๒๐๐ ถึงมาตรา ๒๐๔ (๖) ความผิดเกี่ยวกับความสงบสุขของประชาชน ตามที่บัญญัติไว้ในมาตรา ๒๐๙ ถึงมาตรา ๒๑๖ (๗) ความผิดเกี่ยวกับการก่อให้เกิดภยันตรายต่อประชาชน ตามที่บัญญัติไว้ ในมาตรา ๒๑๗ ถึงมาตรา ๒๒๔ มาตรา ๒๒๖ ถึงมาตรา ๒๓๔ และมาตรา ๒๓๖ ถึงมาตรา ๒๓๘ (๘) ความผิดเกี่ยวกับเงินตรา ตามที่บัญญัติไว้ในมาตรา ๒๔๐ ถึงมาตรา ๒๔๙ ความผิดเกี่ยวกับดวงตราแสตมป์และตัว ตามที่บัญญัติไว้ในมาตรา ๒๕๐ ถึงมาตรา ๒๖๑ และ ความผิดเกี่ยวกับเอกสาร ตามที่บัญญัติไว้ในมาตรา ๒๖๔ ถึงมาตรา ๒๖๙ (๙) ความผิดเกี่ยวกับการค้า ตามที่บัญญัติไว้ในมาตรา ๒๗๐ ถึงมาตรา ๒๗๕ (๑๐) ความผิดเกี่ยวกับเพศ ตามที่บัญญัติไว้ในมาตรา ๒๗๖ ถึงมาตรา ๒๘๕ (๑๑) ความผิดต่อชีวิต ตามที่บัญญัติไว้ในมาตรา ๒๘๘ ถึงมาตรา ๒๙๐ และ"},{"section":"มาตรา ๑๖๗","num":"167","text":"ผู้ใดให้ ขอให้หรือรับว่าจะให้ทรัพย์สินหรือประโยชน์อื่นใด แก่เจ้าพนักงานในตําแหน่งตุลาการ พนักงานอัยการ ผู้ว่าคดีหรือพนักงานสอบสวน เพื่อจูงใจให้ กระทําการ ไม่กระทําการหรือประวิงการกระทําใดอันมิชอบด้วยหน้าที่ ต้องระวางโทษจําคุกไม่ เกินเจ็ดปี และปรับไม่เกินหนึ่งแสนสี่หมื่นบาท"},{"section":"มาตรา ๑๖๘","num":"168","text":"ผู้ใดขัดขืนคําบังคับตามกฎหมายของพนักงานอัยการ ผู้ว่า คดีหรือพนักงานสอบสวน ซึ่งให้มาเพื่อให้ถ้อยคํา ต้องระวางโทษจําคุกไม่เกินสามเดือน หรือ ปรับไม่เกินห้าพันบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๖๙","num":"169","text":"ผู้ใดขัดขืนคําบังคับตามกฎหมายของพนักงานอัยการ ผู้ว่า คดีหรือพนักงานสอบสวน ซึ่งให้ส่งหรือจัดการส่งทรัพย์สินหรือเอกสารใด ให้สาบาน ให้ ปฏิญาณหรือให้ให้ถ้อยคํา ต้องระวางโทษจําคุกไม่เกินสามเดือน หรือปรับไม่เกินห้าพันบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๗๐","num":"170","text":"ผู้ใดขัดขืนหมายหรือคําสั่งของศาลให้มาให้ถ้อยคํา ให้มา เบิกความหรือให้ส่งทรัพย์หรือเอกสารใดในการพิจารณาคดี ต้องระวางโทษจําคุกไม่เกินหก เดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๗๑","num":"171","text":"ผู้ใดขัดขืนคําสั่งของศาลให้สาบาน ปฏิญาณ ให้ถ้อยคําหรือ เบิกความ ต้องระวางโทษจําคุกไม่เกินหกเดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๗๒","num":"172","text":"ผู้ใดแจ้งข้อความอันเป็นเท็จเกี่ยวกับความผิดอาญา แก่ พนักงานอัยการ ผู้ว่าคดี พนักงานสอบสวน หรือเจ้าพนักงานผู้มีอํานาจสืบสวนคดีอาญา ซึ่ง อาจทําให้ผู้อื่นหรือประชาชนเสียหาย ต้องระวางโทษจําคุกไม่เกินสองปี หรือปรับไม่เกินสี่หมื่น บาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๗๓","num":"173","text":"ผู้ใดรู้ว่ามิได้มีการกระทําความผิดเกิดขึ้นแจ้งข้อความแก่ พนักงานสอบสวนหรือเจ้าพนักงานผู้มีอํานาจสืบสวนคดีอาญาว่า ได้มีการกระทําความผิด ต้อง ระวางโทษจําคุกไม่เกินสามปี และปรับไม่เกินหกหมื่นบาท"},{"section":"มาตรา ๑๗๔","num":"174","text":"ถ้าการแจ้งข้อความตามมาตรา ๑๗๒ หรือมาตรา ๑๗๓ เป็นการเพื่อจะแกล้งให้บุคคลใดต้องถูกบังคับตามวิธีการเพื่อความปลอดภัย ผู้กระทําต้อง ระวางโทษจําคุกไม่เกินสามปี และปรับไม่เกินหกหมื่นบาท ถ้าการแจ้งตามความในวรรคแรกเป็นการเพื่อจะแกล้งให้บุคคลใดต้องรับโทษ หรือรับโทษหนักขึ้น ผู้กระทําต้องระวางโทษจําคุกไม่เกินห้าปี และปรับไม่เกินหนึ่งแสนบาท"},{"section":"มาตรา ๑๗๕","num":"175","text":"ผู้ใดเอาความอันเป็นเท็จฟ้องผู้อื่นต่อศาลว่ากระทําความผิด อาญา หรือว่ากระทําความผิดอาญาแรงกว่าที่เป็นความจริง ต้องระวางโทษจําคุกไม่เกินห้าปี และปรับไม่เกินหนึ่งแสนบาท"},{"section":"มาตรา ๑๗๖","num":"176","text":"ผู้ใดกระทําความผิดตามมาตรา ๑๗๕ แล้วลุแก่โทษต่อศาล และขอถอนฟ้องหรือแก้ฟ้องก่อนมีคําพิพากษา ให้ศาลลงโทษน้อยกว่าที่กฎหมายกําหนดไว้ หรือศาลจะไม่ลงโทษเลยก็ได้"},{"section":"มาตรา ๑๗๗","num":"177","text":"มาตรา ๑๗๘ หรือมาตรา ๑๘๐ (๑) เป็นการกระทําในกรณีแห่งข้อหาว่า ผู้ใดกระทําความผิดที่มีระวางโทษ จําคุกตั้งแต่สามปีขึ้นไป ผู้กระทําต้องระวางโทษจําคุกตั้งแต่หกเดือนถึงเจ็ดปี และปรับตั้งแต่ หนึ่งหมื่นบาทถึงหนึ่งแสนสี่หมื่นบาท (๒) เป็นการกระทําในกรณีแห่งข้อหาว่า ผู้ใดกระทําความผิดที่มีระวางโทษถึง ประหารชีวิต หรือจําคุกตลอดชีวิต ผู้กระทําต้องระวางโทษจําคุกตั้งแต่หนึ่งปีถึงสิบห้าปี และ ปรับตั้งแต่สองหมื่นบาทถึงสามแสนบาท"},{"section":"มาตรา ๑๗๘","num":"178","text":"ผู้ใดซึ่งเจ้าพนักงานในตําแหน่งตุลาการ พนักงานอัยการ ผู้ ว่าคดีหรือพนักงานสอบสวน ให้แปลข้อความหรือความหมายใด แปลข้อความหรือความหมาย นั้นให้ผิดไปในข้อสําคัญ ต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือ ทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๗๙","num":"179","text":"ผู้ใดทําพยานหลักฐานอันเป็นเท็จ เพื่อให้พนักงานสอบสวน หรือเจ้าพนักงานผู้มีอํานาจสืบสวนคดีอาญาเชื่อว่าได้มีความผิดอาญาอย่างใดเกิดขึ้น หรือเชื่อ ว่าความผิดอาญาที่เกิดขึ้นร้ายแรงกว่าที่เป็นความจริง ต้องระวางโทษจําคุกไม่เกินสองปี หรือ ปรับไม่เกินสี่หมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๘๐","num":"180","text":"ผู้ใดนําสืบหรือแสดงพยานหลักฐานอันเป็นเท็จในการ พิจารณาคดี ถ้าเป็นพยานหลักฐานในข้อสําคัญในคดีนั้น ต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ ถ้าความผิดดังกล่าวในวรรคแรก ได้กระทําในการพิจารณาคดีอาญา ผู้กระทํา ต้องระวางโทษจําคุกไม่เกินเจ็ดปี และปรับไม่เกินหนึ่งแสนสี่หมื่นบาท"},{"section":"มาตรา ๑๘๑","num":"181","text":"ถ้าการกระทําความผิดตามมาตรา ๑๗๔ มาตรา ๑๗๕"},{"section":"มาตรา ๑๘๒","num":"182","text":"ผู้ใดกระทําความผิดตามมาตรา ๑๗๗ หรือมาตรา ๑๗๘ แล้วลุ แก่โทษ และกลับแจ้งความจริงต่อศาลหรือเจ้าพนักงานก่อนจบคําเบิกความหรือการแปล ผู้นั้น ไม่ต้องรับโทษ"},{"section":"มาตรา ๑๘๓","num":"183","text":"ผู้ใดกระทําความผิดตามมาตรา ๑๗๗ มาตรา ๑๗๘ หรือ"},{"section":"มาตรา ๑๘๔","num":"184","text":"ผู้ใดเพื่อจะช่วยผู้อื่นมิให้ต้องรับโทษหรือให้รับโทษน้อยลง ทําให้เสียหาย ทําลาย ซ่อนเร้น เอาไปเสีย หรือทําให้สูญหายหรือไร้ประโยชน์ซึ่งพยานหลักฐาน ในการกระทําความผิด ต้องระวางโทษจําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือ ทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๘๕","num":"185","text":"ผู้ใดทําให้เสียหาย ทําลาย ซ่อนเร้น เอาไปเสีย หรือทําให้ สูญหายหรือไร้ประโยชน์ ซึ่งทรัพย์หรือเอกสารใดที่ได้ส่งไว้ต่อศาล หรือที่ศาลให้รักษาไว้ในการ พิจารณาคดี ต้องระวางโทษจําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๘๖","num":"186","text":"ผู้ใดทําให้เสียหาย ทําลาย ซ่อนเร้น เอาไปเสีย หรือทําให้ สูญหายหรือไร้ประโยชน์ ซึ่งทรัพย์สินที่ได้มีคําพิพากษาให้ริบ ต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๘๗","num":"187","text":"ผู้ใดเพื่อจะมิให้การเป็นไปตามคําพิพากษาหรือคําสั่งของ ศาล ทําให้เสียหาย ทําลาย ซ่อนเร้น เอาไปเสีย หรือทําให้สูญหายหรือไร้ประโยชน์ ซึ่งทรัพย์ที่ ถูกยึดหรืออายัด หรือที่ตนรู้ว่าน่าจะถูกยึดหรืออายัด ต้องระวางโทษจําคุกไม่เกินสามปี หรือ ปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๘๘","num":"188","text":"ผู้ใดทําให้เสียหาย ทําลาย ซ่อนเร้น เอาไปเสีย หรือทําให้ สูญหายหรือไร้ประโยชน์ ซึ่งพิ รือเจ้าพนักงานผู้มีอํานาจสืบสวนคดีอาญาหรือจัดการให้เป็นไปตามหมาย อาญา กระทําการหรือไม่กระทําการอย่างใด ๆ ในตําแหน่งอันเป็นการมิชอบเพื่อจะช่วยบุคคล หนึ่งบุคคลใดมิให้ต้องโทษหรือให้รับโทษน้อยลง ต้องระวางโทษจําคุกตั้งแต่หกเดือนถึงเจ็ดปี และปรับตั้งแต่หนึ่งหมื่นบาทถึงหนึ่งแสนสี่หมื่นบาท ถ้าการกระทําหรือไม่กระทํานั้นเป็นการเพื่อจะแกล้งให้บุคคลหนึ่งบุคคลใด ต้องรับโทษ รับโทษหนักขึ้น หรือต้องถูกบังคับตามวิธีการเพื่อความปลอดภัย ผู้กระทําต้อง ระวางโทษจําคุกตลอดชีวิต หรือจําคุกตั้งแต่หนึ่งปีถึงยี่สิบปี และปรับตั้งแต่สองหมื่นบาทถึงสี่ แสนบาท"},{"section":"มาตรา ๒๐๑","num":"201","text":"ผู้ใดเป็นเจ้าพนักงานในตําแหน่งตุลาการ พนักงานอัยการ ผู้ ว่าคดี หรือพนักงานสอบสวน เรียก รับ หรือยอมจะรับทรัพย์สินหรือประโยชน์อื่นใดสําหรับตน เองหรือผู้อื่นโดยมิชอบเพื่อกระทําการหรือไม่กระทําการอย่างใดในตําแหน่ง ไม่ว่าการนั้นจะ ชอบหรือมิชอบด้วยหน้าที่ ต้องระวางโทษ จําคุกตั้งแต่ห้าปีถึงยี่สิบปี หรือจําคุกตลอดชีวิต และปรับตั้งแต่หนึ่งแสนบาทถึงสี่แสนบาท หรือประหารชีวิต"},{"section":"มาตรา ๒๐๒","num":"202","text":"แก้ไขเพิ่มเติมโดยพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา พ.ศ. ๒๕๐๒ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๗ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐"},{"section":"มาตรา ๒๐๓","num":"203","text":"ผู้ใดเป็นเจ้าพนักงาน มีหน้าที่ปฏิบัติการให้เป็นไปตามคํา พิพากษาหรือคําสั่งของศาล ป้องกันหรือขัดขวางมิให้การเป็นไปตามคําพิพากษาหรือคําสั่งนั้น ต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๐๔","num":"204","text":"ผู้ใดเป็นเจ้าพนักงาน มีตําแหน่งหน้าที่ควบคุมดูแลผู้ที่ ต้องคุมขังตามอํานาจของศาล ของพนักงานสอบสวนหรือของเจ้าพนักงานผู้มีอํานาจสืบสวน คดีอาญากระทําด้วยประการใด ๆ ให้ผู้ที่อยู่ในระหว่างคุมขังนั้นหลุดพ้นจากการคุมขังไป ต้อง ระวางโทษจําคุกตั้งแต่หนึ่งปีถึงเจ็ดปี และปรับตั้งแต่สองหมื่นบาทถึงหนึ่งแสนสี่หมื่นบาท ถ้าผู้ที่หลุดพ้นจากการคุมขังไปนั้นเป็นบุคคลที่ต้องคําพิพากษาของศาลหนึ่ง ศาลใดให้ลงโทษประหารชีวิต จําคุกตลอดชีวิตหรือจําคุกตั้งแต่สิบห้าปีขึ้นไป หรือมีจํานวน ตั้งแต่สามคนขึ้นไป ผู้กระทําต้องระวางโทษจําคุกตั้งแต่สองปีถึงสิบปี และปรับตั้งแต่สี่หมื่นบาท ถึงสองแสนบาท"},{"section":"มาตรา ๒๐๕","num":"205","text":"ถ้าการกระทําดังกล่าวในมาตรา ๒๐๔ เป็นการกระทําโดย ประมาท ผู้กระทําต้องระวางโทษจําคุกไม่เกินสองปี หรือปรับไม่เกินสี่หมื่นบาท หรือทั้งจําทั้ง ปรับ ถ้าผู้ที่หลุดพ้นจากการคุมขังไปด้วยการกระทําโดยประมาทนั้นเป็นบุคคลที่ ต้องคําพิพากษาของศาลหนึ่งศาลใดให้ลงโทษประหารชีวิต จําคุกตลอดชีวิตหรือจําคุกตั้งแต่ สิบห้าปีขึ้นไป หรือมีจํานวนตั้งแต่สามคนขึ้นไป ผู้กระทําต้องระวางโทษจําคุกไม่เกินสามปี หรือ ปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ ถ้าผู้กระทําความผิดจัดให้ได้ตัวผู้ที่หลุดพ้นจากการคุมขังคืนมาภายในสาม เดือน ให้งดการลงโทษแก่ผู้กระทําความผิดนั้น ลักษณะ ๔ ความผิดเกี่ยวกับศาสนา"},{"section":"มาตรา ๒๐๖","num":"206","text":"แก้ไขเพิ่มเติมโดยคําสั่งของคณะปฏิรูปการปกครองแผ่นดิน ฉบับที่ ๔๑ ลงวัน ที่ ๒๑ ตุลาคม พ.ศ. ๒๕๑๙ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๕ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐"},{"section":"มาตรา ๒๐๗","num":"207","text":"ผู้ใดก่อให้เกิดการวุ่นวายขึ้นในที่ประชุมศาสนิกชนเวลา ประชุมกันนมัสการหรือกระทําพิธีกรรมตามศาสนาใด ๆ โดยชอบด้วยกฎหมาย ต้องระวางโทษ จําคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๐๘","num":"208","text":"ผู้ใดแต่งกายหรือใช้เครื่องหมายที่แสดงว่าเป็นภิกษุ สาม เณร นักพรตหรือนักบวชในศาสนาใดโดยมิชอบ เพื่อให้บุคคลอื่นเชื่อว่า ตนเป็นบุคคลเช่นว่านั้น ต้องระวางโทษจําคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่นบาท หรือทั้งจําทั้งปรับ ลักษณะ ๕ ความผิดเกี่ยวกับความสงบสุขของประชาชน"},{"section":"มาตรา ๒๐๙","num":"209","text":"ผู้ใดเป็นสมาชิกของคณะบุคคลซึ่งปกปิดวิธีดําเนินการและมี ความมุ่งหมายเพื่อการอันมิชอบด้วยกฎหมาย ผู้นั้นกระทําความผิดฐานเป็นอั้งยี่ ต้องระวางโทษ จําคุกไม่เกินเจ็ดปี และปรับไม่เกินหนึ่งแสนสี่หมื่นบาท ถ้าผู้กระทําความผิดเป็นหัวหน้า ผู้จัดการหรือผู้มีตําแหน่งหน้าที่ในคณะบุคคล นั้น ผู้นั้นต้องระวางโทษจําคุกไม่เกินสิบปี และปรับไม่เกินสองแสนบาท"},{"section":"มาตรา ๒๑๐","num":"210","text":"ผู้ใดสมคบกันตั้งแต่ห้าคนขึ้นไปเพื่อกระทําความผิดอย่าง หนึ่งอย่างใดตามที่บัญญัติไว้ในภาค ๒ นี้ และความผิดนั้นมีกําหนดโทษจําคุกอย่างสูงตั้งแต่ หนึ่งปีขึ้นไป ผู้นั้นกระทําความผิดฐานเป็นซ่องโจร ต้องระวางโทษจําคุกไม่เกินห้าปี หรือปรับไม่ เกินหนึ่งแสนบาท หรือทั้งจําทั้งปรับ ถ้าเป็นการสมคบเพื่อกระทําความผิดที่มีระวางโทษถึงประหารชีวิต จําคุก ตลอดชีวิตหรือจําคุกอย่างสูงตั้งแต่สิบปีขึ้นไป ผู้กระทําต้องระวางโทษจําคุกตั้งแต่สองปีถึงสิบปี และปรับตั้งแต่สี่หมื่นบาทถึงสองแสนบาท"},{"section":"มาตรา ๒๑๑","num":"211","text":"ผู้ใดประชุมในที่ประชุมอั้งยี่หรือซ่องโจร ผู้นั้นกระทําความ ผิดฐานเป็นอั้งยี่หรือซ่องโจร เว้นแต่ผู้นั้นจะแสดงได้ว่า ได้ประชุมโดยไม่รู้ว่าเป็นการประชุมของ อั้งยี่หรือซ่องโจร"},{"section":"มาตรา ๒๑๒","num":"212","text":"ผู้ใด (๑) จัดหาที่ประชุมหรือที่พํานักให้แก่อั้งยี่หรือซ่องโจร (๒) ชักชวนบุคคลให้เข้าเป็นสมาชิกอั้งยี่หรือพรรคพวกซ่องโจร (๓) อุปการะอั้งยี่หรือซ่องโจรโดยให้ทรัพย์หรือโดยประการอื่น หรือ (๔) ช่วยจําหน่ายทรัพย์ที่อั้งยี่หรือซ่องโจรได้มาโดยการกระทําความผิด ต้องระวางโทษเช่นเดียวกับผู้กระทําความผิดฐานเป็นอั้งยี่หรือซ่องโจร แล้วแต่ กรณี"},{"section":"มาตรา ๒๑๓","num":"213","text":"ถ้าสมาชิกอั้งยี่หรือพรรคพวกซ่องโจรคนหนึ่งคนใดได้กระทํา ความผิดตามความมุ่งหมายของอั้งยี่หรือซ่องโจรนั้น สมาชิกอั้งยี่หรือพรรคพวกซ่องโจรที่อยู่ ด้วยในขณะกระทําความผิด หรืออยู่ด้วยในที่ประชุมแต่ไม่ได้คัดค้านในการตกลงให้กระทํา ความผิดนั้น และบรรดาหัวหน้าผู้จัดการหรือผู้มีตําแหน่งหน้าที่ในอั้งยี่หรือซ่องโจรนั้น ต้อง ระวางโทษตามที่บัญญัติไว้สําหรับความผิดนั้นทุกคน"},{"section":"มาตรา ๒๑๔","num":"214","text":"ผู้ใดประพฤติตนเป็นปกติธุระเป็นผู้จัดหาที่พํานัก ที่ซ่อนเร้น หรือที่ประชุมให้บุคคลซึ่งตนรู้ว่าเป็นผู้กระทําความผิดที่บัญญัติไว้ในภาค ๒ นี้ ต้องระวางโทษ จําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ ถ้าการกระทําความผิดนั้น เป็นการกระทําเพื่อช่วยบิดา มารดา บุตร สามีหรือ ภริยาของผู้กระทํา ศาลจะไม่ลงโทษก็ได้"},{"section":"มาตรา ๒๑๕","num":"215","text":"ผู้ใดมั่วสุมกันตั้งแต่สิบคนขึ้นไป ใช้กําลังประทุษร้ายขู่เข็ญ ว่าจะใช้กําลังประทุษร้าย หรือกระทําการอย่างหนึ่งอย่างใดให้เกิดการวุ่นวายขึ้นในบ้านเมือง ต้องระวางโทษจําคุกไม่เกินหกเดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือทั้งจําทั้งปรับ ถ้าผู้กระทําความผิดคนหนึ่งคนใดมีอาวุธ บรรดาผู้ที่กระทําความผิด ต้อง ระวางโทษจําคุกไม่เกินสองปี หรือปรับไม่เกินสี่หมื่นบาท หรือทั้งจําทั้งปรับ ถ้าผู้กระทําความผิดเป็นหัวหน้า หรือเป็นผู้มีหน้าที่สั่งการในการกระทําความ ผิดนั้น ต้องระวางโทษจําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๑๖","num":"216","text":"เมื่อเจ้าพนักงานสั่งผู้ที่มั่วสุมเพื่อกระทําความผิดตาม"},{"section":"มาตรา ๒๑๗","num":"217","text":"ถึงมาตรา ๒๒๔ (๓) ความผิดเกี่ยวกับเงินตรา ตามที่บัญญัติไว้ในมาตรา ๒๔๐ ถึงมาตรา ๒๔๖ (๔) ความผิดเกี่ยวกับเพศ ตามที่บัญญัติไว้ในมาตรา ๒๗๖ ถึงมาตรา ๒๘๖ (๕) ความผิดต่อชีวิต ตามที่บัญญัติไว้ในมาตรา ๒๘๘ ถึงมาตรา ๒๙๐ มาตรา ๒๙๒ ถึงมาตรา ๒๙๔ (๖) ความผิดต่อร่างกาย ตามที่บัญญัติไว้ในมาตรา ๒๙๕ ถึงมาตรา ๒๙๙ (๗) ความผิดต่อเสรีภาพ ตามที่บัญญัติไว้ในมาตรา ๓๐๙ ถึงมาตรา ๓๒๐ (๘) ความผิดเกี่ยวกับทรัพย์ ตามที่บัญญัติไว้ในมาตรา ๓๓๔ ถึงมาตรา ๓๔๐"},{"section":"มาตรา ๒๑๘","num":"218","text":"ผู้ใดวางเพลิงเผาทรัพย์ดังต่อไปนี้ (๑) โรงเรือน เรือ หรือแพที่คนอยู่อาศัย (๒) โรงเรือน เรือหรือแพอันเป็นที่เก็บหรือที่ทําสินค้า (๓) โรงมหรสพหรือสถานที่ประชุม โรงเรือนอันเป็นสาธารณสมบัติของแผ่นดิน เป็นสาธารณสถาน หรือเป็นที่ สําหรับประกอบพิธีกรรมตามศาสนา (๕) สถานีรถไฟ ท่าอากาศยานหรือที่จอดรถหรือเรือสาธารณะ (๖) เรือกลไฟ หรือเรือยนต์ อันมีระวางตั้งแต่ห้าตันขึ้นไป อากาศยาน หรือรถ ไฟที่ใช้ในการขนส่งสาธารณะ ต้องระวางโทษประหารชีวิต จําคุกตลอดชีวิต หรือจําคุกตั้งแต่ห้าปีถึงยี่สิบปี"},{"section":"มาตรา ๒๑๙","num":"219","text":"ผู้ใดตระเตรียมเพื่อกระทําความผิดดังกล่าวในมาตรา ๒๑๗ หรือมาตรา ๒๑๘ ต้องระวางโทษเช่นเดียวกับพยายามกระทําความผิดนั้น ๆ"},{"section":"มาตรา ๒๒๐","num":"220","text":"ผู้ใดกระทําให้เกิดเพลิงไหม้แก่วัตถุใด ๆ แม้เป็นของตนเอง จนน่าจะเป็นอันตรายแก่บุคคลอื่นหรือทรัพย์ของผู้อื่น ต้องระวางโทษจําคุกไม่เกินเจ็ดปี และ ปรับไม่เกินหนึ่งแสนสี่หมื่นบาท ถ้าการกระทําความผิดดังกล่าวในวรรคแรก เป็นเหตุให้เกิดเพลิงไหม้แก่ทรัพย์ ตามที่ระบุไว้ในมาตรา ๒๑๘ ผู้กระทําต้องระวางโทษดังที่บัญญัติไว้ในมาตรา ๒๑๘"},{"section":"มาตรา ๒๒๑","num":"221","text":"ผู้ใดกระทําให้เกิดระเบิดจนน่าจะเป็นอันตรายแก่บุคคลอื่น หรือทรัพย์ของผู้อื่น ต้องระวางโทษจําคุกไม่เกินเจ็ดปี และปรับไม่เกินหนึ่งแสนสี่หมื่นบาท"},{"section":"มาตรา ๒๒๒","num":"222","text":"ผู้ใดกระทําให้เกิดระเบิดจนเป็นเหตุให้เกิดอันตรายแก่ทรัพย์ดัง กล่าวในมาตรา ๒๑๗ หรือมาตรา ๒๑๘ ต้องระวางโทษดังที่บัญญัติไว้ในมาตรานั้น ๆ"},{"section":"มาตรา ๒๒๓","num":"223","text":"ความผิดดังกล่าวในมาตรา ๒๑๗ มาตรา ๒๑๘ มาตรา ๒๒๐ มาตรา ๒๒๑ หรือมาตรา ๒๒๒ นั้น ถ้าทรัพย์ที่เป็นอันตราย หรือที่น่าจะเป็นอันตราย เป็น ทรัพย์ที่มีราคาน้อย และการกระทํานั้นไม่น่าจะเป็นอันตรายแก่บุคคลอื่น ผู้กระทําต้องระวาง โทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๒๔","num":"224","text":"แก้ไขเพิ่มเติมโดยประกาศของคณะปฏิวัติ ฉบับที่ ๑๑ ลงวันที่ ๒๑ พฤศจิกาย น พ.ศ. ๒๕๑๔ อัตราโทษ แก้ไขเพิ่มเติมโดยมาตรา ๔ แห่งพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมาย อาญา (ฉบับท ่บุคคลหรือทรัพย์ จนน่าจะเป็นเหตุให้เกิดอันตรายแก่บุคคลอื่น ต้อง ระวางโทษจําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๒๗","num":"227","text":"ผู้ใดเป็นผู้มีวิชาชีพในการออกแบบควบคุม หรือทําการ ก่อสร้าง ซ่อมแซมหรือรื้อถอน อาคารหรือสิ่งปลูกสร้างใด ๆ ไม่ปฏิบัติตามหลักเกณฑ์ หรือวิธี การอันพึงกระทําการนั้น ๆ โดยประการที่น่าจะเป็นเหตุให้เกิดอันตรายแก่บุคคลอื่น ต้องระวาง โทษจําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๒๘","num":"228","text":"ผู้ใดกระทําด้วยประการใด ๆ เพื่อให้เกิดอุทกภัย หรือเพื่อให้ เกิดขัดข้องแก่การใช้น้ำซึ่งเป็นสาธารณูปโภค ถ้าการกระทํานั้นน่าจะเป็นอันตรายแก่บุคคลอื่น หรือทรัพย์ของผู้อื่น ต้องระวางโทษจําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจํา ทั้งปรับ ถ้าการกระทําผิดดังกล่าวในวรรคแรกเป็นเหตุให้เกิดอันตรายแก่บุคคลอื่นหรือ ทรัพย์ของผู้อื่น ผู้กระทําต้องระวางโทษจําคุกตั้งแต่หกเดือนถึงเจ็ดปี และปรับตั้งแต่หนึ่งหมื่น บาทถึงหนึ่งแสนสี่หมื่นบาท"},{"section":"มาตรา ๒๒๙","num":"229","text":"ผู้ใดกระทําด้วยประการใด ๆ ให้ทางสาธารณะ ประตูน้ำ ทํานบ เขื่อน อันเป็นส่วนของทางสาธารณะ หรือที่ขึ้นลงของอากาศยาน อยู่ในลักษณะอันน่าจะ เป็นเหตุให้เกิดอันตรายแก่การจราจร ต้องระวางโทษจําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสน บาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๓๐","num":"230","text":"ผู้ใดเอาสิ่งใด ๆ กีดขวางทางรถไฟหรือทางรถราง ทําให้ราง รถไฟหรือรางรถรางหลุด หลวมหรือเคลื่อนจากที่ หรือกระทําแก่เครื่องสัญญาณจนน่าจะเป็น เหตุให้เกิดอันตรายแก่การเดินรถไฟหรือรถราง ต้องระวางโทษจําคุกตั้งแต่หกเดือนถึงเจ็ดปี และปรับตั้งแต่หนึ่งหมื่นบาทถึงหนึ่งแสนสี่หมื่นบาท"},{"section":"มาตรา ๒๓๑","num":"231","text":"ผู้ใดกระทําด้วยประการใด ๆ ให้ประภาคาร ทุ่น สัญญาณ หรือสิ่งอื่นใด ซึ่งจัดไว้เป็นสัญญาณเพื่อความปลอดภัยในการจราจรทางบก การเดินเรือหรือ การเดินอากาศ อยู่ในลักษณะอันน่าจะเป็นเหตุให้เกิดอันตรายแก่การจราจรทางบก การเดินเรือ หรือการเดินอากาศ ต้องระวางโทษจําคุกตั้งแต่หกเดือนถึงเจ็ดปี และปรับตั้งแต่หนึ่งหมื่นบาท ถึงหนึ่งแสนสี่หมื่นบาท"},{"section":"มาตรา ๒๓๒","num":"232","text":"ผู้ใดกระทําด้วยประการใด ๆ ให้ยานพาหนะดังต่อไปนี้ อยู่ ในลักษณะอันน่าจะเป็นเหตุให้เกิดอันตรายแก่บุคคล (๑) เรือเดินทะเล อากาศยาน รถไฟหรือรถราง (๒) รถยนต์ที่ใช้สําหรับการขนส่งสาธารณะ หรือ (๓) เรือกลไฟ หรือเรือยนต์อันมีระวางตั้งแต่ห้าตันขึ้นไป ที่ใช้สําหรับการขนส่ง สาธารณะ ต้องระวางโทษจําคุกตั้งแต่หกเดือนถึงเจ็ดปี และปรับตั้งแต่หนึ่งหมื่นบาทถึง หนึ่งแสนสี่หมื่นบาท"},{"section":"มาตรา ๒๓๓","num":"233","text":"ผู้ใดใช้ยานพาหนะรับจ้างขนส่งคนโดยสาร เมื่อยานพาหนะ นั้นมีลักษณะหรือมีการบรรทุกจนน่าจะเป็นอันตรายแก่บุคคลในยานพาหนะนั้น ต้องระวางโทษ จําคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๓๔","num":"234","text":"ผู้ใดกระทําด้วยประการใด ๆ แก่สิ่งที่ใช้ในการผลิตในการส่ง พลังงานไฟฟ้าหรือในการส่งน้ำ จนเป็นเหตุให้ประชาชนขาดความสะดวก หรือน่าจะเป็นเหตุให้ เกิดอันตรายแก่ประชาชน ต้องระวางโทษจําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือ ทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๓๕","num":"235","text":"ผู้ใดกระทําการด้วยประการใด ๆ ให้การสื่อสารสาธารณะ ทางไปรษณีย์ ทางโทรเลข ทางโทรศัพท์ หรือทางวิทยุขัดข้อง ต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๓๖","num":"236","text":"ผู้ใดปลอมปนอาหาร ยาหรือเครื่องอุปโภคบริโภคอื่นใดเพื่อ บุคคลอื่นเสพหรือใช้ และการปลอมปนนั้นน่าจะเป็นเหตุให้เกิดอันตรายแก่สุขภาพ หรือจําหน่าย หรือเสนอขาย สิ่งเช่นว่านั้นเพื่อบุคคลเสพหรือใช้ ต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่ เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๓๗","num":"237","text":"ผู้ใดเอาของที่มีพิษหรือสิ่งอื่นที่น่าจะเป็นอันตรายแก่สุขภาพ เจือลงในอาหาร หรือในน้ำซึ่งอยู่ในบ่อสระหรือที่ขังน้ำใด ๆ และอาหารหรือน้ำนั้นได้มีอยู่หรือ จัดไว้เพื่อประชาชนบริโภค ต้องระวางโทษจําคุกตั้งแต่หกเดือนถึงสิบปี และปรับตั้งแต่หนึ่งหมื่น บาทถึงสองแสนบาท"},{"section":"มาตรา ๒๓๘","num":"238","text":"ถ้าการกระทําความผิดตามมาตรา ๒๒๖ ถึงมาตรา ๒๓๗ เป็นเหตุให้บุคคลอื่นถึงแก่ความตาย ผู้กระทําต้องระวางโทษจําคุกตลอดชีวิต หรือจําคุกตั้งแต่ ห้าปีถึงยี่สิบปี และปรับตั้งแต่หนึ่งแสนบาทถึงสี่แสนบาท ถ้าเป็นเหตุให้บุคคลอื่นรับอันตรายสาหัส ผู้กระทําต้องระวางโทษจําคุกตั้งแต่ หนึ่งปีถึงสิบปี และปรับตั้งแต่สองหมื่นบาทถึงสองแสนบาท"},{"section":"มาตรา ๒๓๙","num":"239","text":"ถ้าการกระทําดังกล่าวในมาตรา ๒๒๖ ถึงมาตรา ๒๓๗ เป็น การกระทําโดยประมาท และใกล้จะเป็นอันตรายแก่ชีวิตของบุคคลอื่น ผู้กระทําต้องระวางโทษ จําคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่นบาท หรือทั้งจําทั้งปรับ ลักษณะ ๗ ความผิดเกี่ยวกับการปลอมและการแปลง หมวด ๑ ความผิดเกี่ยวกับเงินตรา"},{"section":"มาตรา ๒๔๐","num":"240","text":"ผู้ใดทําปลอมขึ้นซึ่งเงินตรา ไม่ว่าจะปลอมขึ้นเพื่อให้เป็น เหรียญกษาปณ์ ธนบัตรหรือสิ่งอื่นใดซึ่งรัฐบาลออกใช้หรือให้อํานาจให้ออกใช้ หรือทําปลอมขึ้น ซึ่งพันธบัตรรัฐบาลหรือใบสําคัญสําหรับรับดอกเบี้ยพันธบัตรนั้น ๆ ผู้นั้นกระทําความผิดฐาน ปลอมเงินตรา ต้องระวางโทษจําคุกตลอดชีวิต หรือจําคุกตั้งแต่สิบปีถึงยี่สิบปี และปรับตั้งแต่ สองแสนบาทถึงสี่แสนบาท"},{"section":"มาตรา ๒๔๑","num":"241","text":"ผู้ใดแปลงเงินตรา ไม่ว่าจะเป็นเหรียญกษาปณ์ ธนบัตรหรือ สิ่งอื่นใดซึ่งรัฐบาลออกใช้หรือให้อํานาจให้ออกใช้ หรือแปลงพันธบัตรรัฐบาลหรือใบสําคัญ สําหรับรับดอกเบี้ยพันธบัตรนั้น ๆ ให้ผิดไปจากเดิม เพื่อให้ผู้อื่นเชื่อว่ามีมูลค่าสูงกว่าจริง ผู้นั้น กระทําความผิดฐานแปลงเงินตรา ต้องระวางโทษจําคุกตลอดชีวิต หรือจําคุกตั้งแต่ห้าปีถึงยี่สิบ ปี และปรับตั้งแต่หนึ่งแสนบาทถึงสี่แสนบาท"},{"section":"มาตรา ๒๔๒","num":"242","text":"ผู้ใดกระทําโดยทุจริตให้เหรียญกษาปณ์ซึ่งรัฐบาลออกใช้มี น้ำหนักลดลง ต้องระวางโทษจําคุกไม่เกินเจ็ดปี และปรับไม่เกินหนึ่งแสนสี่หมื่นบาท ผู้ใดนําเข้าในราชอาณาจักร นําออกใช้หรือมีไว้เพื่อนําออกใช้ซึ่ง เหรียญกษาปณ์ที่มีผู้กระทําโดยทุจริตให้น้ำหนักลดลงตามความในวรรคแรก ต้องระวางโทษ เช่นเดียวกัน"},{"section":"มาตรา ๒๔๓","num":"243","text":"ผู้ใดนําเข้าในราชอาณาจักรซึ่งสิ่งใด ๆ อันเป็นของปลอมตาม"},{"section":"มาตรา ๒๔๔","num":"244","text":"ผู้ใดมีไว้เพื่อนําออกใช้ซึ่งสิ่งใด ๆ อันตนได้มาโดยรู้ว่าเป็น ของปลอมตามมาตรา ๒๔๐ หรือของแปลงตามมาตรา ๒๔๑ ต้องระวางโทษจําคุกตั้งแต่หนึ่งปี ถึงสิบห้าปี และปรับตั้งแต่สองหมื่นบาทถึงสามแสนบาท"},{"section":"มาตรา ๒๔๕","num":"245","text":"ผู้ใดได้มาซึ่งสิ่งใด ๆ โดยไม่รู้ว่าเป็นของปลอมตามมาตรา ๒๔๐ หรือของแปลงตามมาตรา ๒๔๑ ถ้าต่อมารู้ว่าเป็นของปลอมหรือของแปลงเช่นว่านั้น ยังขืน นําออกใช้ ต้องระวางโทษจําคุกไม่เกินสิบปี หรือปรับไม่เกินสองแสนบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๔๖","num":"246","text":"ผู้ใดทําเครื่องมือหรือวัตถุสําหรับปลอมหรือแปลงเงินตรา ไม่ว่าจะเป็นเหรียญกษาปณ์ ธนบัตรหรือสิ่งใด ๆ ซึ่งรัฐบาลออกใช้หรือให้อํานาจให้ออกใช้ หรือ สําหรับปลอมหรือแปลงพันธบัตรรัฐบาลหรือใบสําคัญสําหรับรับดอกเบี้ยพันธบัตรนั้น ๆ หรือมี เครื่องมือหรือวัตถุเช่นว่านั้นเพื่อใช้ในการปลอมหรือแปลง ต้องระวางโทษจําคุกตั้งแต่ห้าปีถึง สิบห้าปี และปรับตั้งแต่หนึ่งแสนบาทถึงสามแสนบาท"},{"section":"มาตรา ๒๔๗","num":"247","text":"ถ้าการกระทําดังกล่าวในหมวดนี้เป็นการกระทําเกี่ยวกับ เงินตรา ไม่ว่าจะเป็นเหรียญกษาปณ์ ธนบัตรหรือสิ่งอื่นใดซึ่งรัฐบาลต่างประเทศออกใช้หรือให้ อํานาจให้ออกใช้ หรือเกี่ยวกับพันธบัตรรัฐบาลต่างประเทศหรือใบสําคัญสําหรับรับดอกเบี้ย พันธบัตรนั้น ผู้กระทําต้องระวางโทษกึ่งหนึ่งของโทษที่บัญญัติไว้ในมาตรานั้น ๆ"},{"section":"มาตรา ๒๔๘","num":"248","text":"ถ้าผู้กระทําความผิดตามมาตรา ๒๔๐ มาตรา ๒๔๑หรือมาตรา ๒๔๗ ได้กระทําความผิดตามมาตราอื่นที่บัญญัติไว้ในหมวดนี้อันเกี่ยวกับสิ่งที่ตนปลอมหรือ แปลงนั้นด้วย ให้ลงโทษผู้นั้นตามมาตรา ๒๔๐ มาตรา ๒๔๑ หรือมาตรา ๒๔๗ แต่กระทงเดียว"},{"section":"มาตรา ๒๔๙","num":"249","text":"ผู้ใดทําบัตรหรือโลหะธาตุอย่างใด ๆ ให้มีลักษณะและขนาด คล้ายคลึงกับเงินตรา ไม่ว่าจะเป็นเหรียญกษาปณ์ ธนบัตรหรือสิ่งใด ๆ ซึ่งรัฐบาลออกใช้หรือให้ อํานาจให้ออกใช้หรือพันธบัตรรัฐบาล หรือใบสําคัญสําหรับรับดอกเบี้ยพันธบัตรนั้น ๆ หรือ จําหน่ายบัตรหรือโลหธาตุเช่นว่านั้น ต้องระวางโทษจําคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่น บาท หรือทั้งจําทั้งปรับ ถ้าการจําหน่ายบัตร หรือโลหะธาตุดังกล่าวในวรรคแรกเป็นการจําหน่าย โดย การนําออกใช้ดังเช่นสิ่งใด ๆ ที่กล่าวในวรรคแรก ผู้กระทําต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ หมวด ๒ ความผิดเกี่ยวกับดวงตรา แสตมป์และตัว"},{"section":"มาตรา ๒๕๐","num":"250","text":"ผู้ใดทําปลอมขึ้นซึ่งดวงตราแผ่นดิน รอยตราแผ่นดินหรือ พระปรมาภิไธย ต้องระวางโทษจําคุกตั้งแต่ห้าปีถึงยี่สิบปี และปรับตั้งแต่หนึ่งแสนบาทถึงสี่แสน บาท”"},{"section":"มาตรา ๒๕๑","num":"251","text":"ซึ่งเป็นดวงตราหรือรอยตราอันแท้จริง และใช้ดวงตราหรือรอยตรานั้นโดยมิชอบ ในประการที่น่าจะทําให้ผู้อื่นหรือประชาชนเสียหาย ต้องระวางโทษสองในสามส่วนของโทษที่ บัญญัติไว้ในมาตรา ๒๕๐ หรือมาตรา ๒๕๑ นั้น"},{"section":"มาตรา ๒๕๒","num":"252","text":"ผู้ใดใช้ดวงตรา รอยตราหรือพระปรมาภิไธย ดังกล่าวมาใน"},{"section":"มาตรา ๒๕๓","num":"253","text":"ผู้ใดได้มาซึ่งดวงตราหรือรอยตราดังกล่าวในมาตรา ๒๕๐หรือ"},{"section":"มาตรา ๒๕๔","num":"254","text":"ผู้ใดทําปลอมขึ้นซึ่งแสตมป์รัฐบาล ซึ่งใช้สําหรับการไป รษณีย์การภาษีอากรหรือการเก็บค่าธรรมเนียม หรือแปลงแสตมป์รัฐบาล ซึ่งใช้ในการเช่นว่า นั้นให้ผิดไปจากเดิม เพื่อให้ผู้อื่นเชื่อว่ามีมูลค่าสูงกว่าจริง ต้องระวางโทษจําคุกตั้งแต่หนึ่งปีถึง เจ็ดปี และปรับตั้งแต่สองหมื่นบาทถึงหนึ่งแสนสี่หมื่นบาท"},{"section":"มาตรา ๒๕๕","num":"255","text":"ผู้ใดนําเข้าในราชอาณาจักรซึ่งดวงตราแผ่นดิน รอยตรา แผ่นดิน พระปรมาภิไธย ดวงตราหรือรอยตราของทบวงการเมือง ขององค์การสาธารณะ หรือ ของเจ้าพนักงาน หรือแสตมป์ซึ่งระบุไว้ในมาตรา ๒๕๐ มาตรา ๒๕๑ หรือมาตรา ๒๕๔ อันเป็น ของปลอม หรือของแปลง ต้องระวางโทษจําคุกตั้งแต่หนึ่งปีถึงสิบปี และปรับตั้งแต่สองหมื่น บาทถึงสองแสนบาท"},{"section":"มาตรา ๒๕๖","num":"256","text":"ผู้ใดลบ ถอนหรือกระทําด้วยประการใด ๆ แก่แสตมป์ รัฐบาลซึ่งระบุไว้ในมาตรา ๒๕๔ และมีเครื่องหมายหรือการกระทําอย่างใดแสดงว่าใช้ไม่ได้แล้ว เพื่อให้ใช้ได้อีก ต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้ง ปรับ"},{"section":"มาตรา ๒๕๗","num":"257","text":"ผู้ใดใช้ ขาย เสนอขาย แลกเปลี่ยนหรือเสนอแลกเปลี่ยนซึ่ง แสตมป์อันเกิดจากการกระทําดังกล่าวในมาตรา ๒๕๔ หรือมาตรา ๒๕๖ ไม่ว่าการกระทําตาม มาตรานั้น ๆ จะได้กระทําภายในหรือนอกราชอาณาจักร ต้องระวางโทษจําคุกไม่เกินสามปี หรือ ปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๒๕๘","num":"258","text":"ผู้ใดทําปลอมขึ้นซึ่งตัวโดยสารซึ่งใช้ในการขนส่งสาธารณะ หรือแปลงตัวโดยสารซึ่งใช้ในการขนส่งสาธารณะให้ผิดไปจากเดิม เพื่อให้ผู้อื่นเชื่อว่ามีมูลค่าสูง กว่าจริง หรือลบ ถอน หรือกระทําด้วยประการใด ๆ แก่ตัวเช่นว่านั้นซึ่งมีเครื่องหมายหรือการ กระทําอย่างใด แสดงว่าใช้ไม่ได้แล้วเพื่อให้ใช้ได้อีก ต้องระวางโทษจําคุ
