<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0d14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="กฎหมายอาญา">
<title>ประมวลกฎหมายอาญา</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{
  --bg:#09090f;--bg1:#0f1117;--bg2:#151b27;--bg3:#1a2235;
  --border:#1e2d3d;--border2:#2d3f52;
  --text:#e8edf5;--text2:#94a3b8;--text3:#475569;
  --gold:#f59e0b;--red:#dc2626;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,"Sarabun","Noto Sans Thai",sans-serif}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#header{background:linear-gradient(180deg,#0d1420,#0f1117);border-bottom:1px solid var(--border);
  padding:10px 16px 8px;padding-top:calc(10px + var(--sat));flex-shrink:0}
.hrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--red));
  border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ttl{font-size:16px;font-weight:700;color:#f1f5f9;line-height:1.2}
.sub{font-size:10px;color:var(--text3);margin-top:1px}
.sw{position:relative;margin-bottom:7px}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
#si{width:100%;padding:9px 36px 9px 32px;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);font-size:15px;font-family:inherit;outline:none;
  -webkit-appearance:none;transition:border .15s}
#si:focus{border-color:var(--gold)}
#si::placeholder{color:var(--text3)}
#cb{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;
  color:var(--text3);font-size:20px;cursor:pointer;display:none;padding:2px;line-height:1}
.pills{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:4px 11px;border-radius:20px;font-size:11px;border:1px solid var(--border2);
  background:transparent;color:var(--text2);font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .15s}
.pill.on{background:var(--gold);border-color:var(--gold);color:#000;font-weight:600}
.tabs{display:flex;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0}
.tb{flex:1;padding:8px 0;font-size:12px;font-family:inherit;background:none;border:none;
  color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-weight:500}
.tb.on{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
#rp{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.rc{font-size:11px;color:var(--text3);padding:8px 15px 4px}
.rl{padding:0 13px 120px}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:11px;
  padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:all .12s;-webkit-user-select:none}
.card:active{background:var(--bg2);border-color:var(--gold);transform:scale(.985)}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.badge{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--red));
  color:#000;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:700}
.hint{color:var(--gold);font-size:10.5px}
.ct{font-size:12.5px;color:var(--text2);line-height:1.7;display:-webkit-box;
  -webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99;opacity:0;
  pointer-events:none;transition:opacity .25s;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
#ov.on{opacity:1;pointer-events:all}
#ds{position:fixed;bottom:0;left:0;right:0;background:#0d1420;
  border-top:1px solid var(--border);border-radius:18px 18px 0 0;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  z-index:100;max-height:85dvh;display:flex;flex-direction:column;
  padding-bottom:var(--sab)}
#ds.on{transform:translateY(0)}
.hdl{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:8px auto 0;flex-shrink:0}
.shead{display:flex;justify-content:space-between;align-items:center;
  padding:8px 15px 10px;flex-shrink:0;border-bottom:1px solid var(--border)}
.scl{background:var(--bg2);border:1px solid var(--border2);color:var(--text2);
  border-radius:7px;padding:5px 11px;font-size:12.5px;font-family:inherit;cursor:pointer}
.sb{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 15px;flex:1}
.box{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:11px}
.bl{font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.bl.ai{color:var(--gold)}
.lt{font-size:13px;color:var(--text2);line-height:1.85;white-space:pre-wrap}
.al{display:flex;align-items:center;gap:7px;color:var(--text3);font-size:12.5px}
.sp{animation:spin 1s linear infinite;display:inline-block}
.aerr{color:#ef4444;font-size:12.5px}
.ap{margin:2px 0;font-size:13px;color:#cbd5e1;line-height:1.9}
.ap.n{margin:9px 0 3px;font-weight:600;color:var(--gold);font-size:13.5px}
#hp{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:8px 13px 100px}
.hcard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:10px 13px;margin-bottom:6px;cursor:pointer}
.hcard:active{border-color:var(--border2)}
.ht{font-size:10px;color:var(--text3);margin-top:5px}
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.ei{font-size:38px;margin-bottom:10px}
#ib{display:none;background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;
  padding:9px 15px;font-size:12.5px;font-weight:600;cursor:pointer;flex-shrink:0;text-align:center}
#ib span{font-size:11px;font-weight:400;display:block}
#ig{display:none;background:#1a2235;border-bottom:1px solid var(--border2);
  padding:10px 15px;font-size:12px;flex-shrink:0;position:relative}
#ig b{color:var(--gold)}
#igc{position:absolute;right:12px;top:10px;background:none;border:none;
  color:var(--text3);font-size:20px;cursor:pointer;font-family:inherit}
mark{background:#fbbf24;color:#000;border-radius:2px;padding:0 1px}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:up .25s ease}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="hrow">
      <div class="logo">⚖️</div>
      <div style="flex:1">
        <div class="ttl">ประมวลกฎหมายอาญา</div>
        <div class="sub">พ.ศ. ๒๕๖๙ • 448 มาตรา • AI อธิบาย</div>
      </div>
      <button id="inst-btn" style="display:none;background:var(--bg2);border:1px solid var(--border2);
        color:var(--gold);border-radius:8px;padding:5px 10px;font-size:11.5px;cursor:pointer;
        font-family:inherit;flex-shrink:0" onclick="showGuide()">📲 ติดตั้ง</button>
    </div>
    <div class="sw">
      <span class="si">🔍</span>
      <input type="search" id="si" placeholder="ค้นหา เช่น ฆ่าผู้อื่น, ลักทรัพย์, มาตรา 288..." autocomplete="off" spellcheck="false">
      <button id="cb" onclick="cls()">×</button>
    </div>
    <div class="pills" id="pills"></div>
  </div>
  <div id="ib" onclick="doInstall()">
    📲 กดที่นี่เพื่อติดตั้งแอปบนหน้าจอหลัก
    <span>ใช้งานออฟไลน์ได้ • ไม่ต้องโหลดซ้ำ</span>
  </div>
  <div id="ig">
    <button id="igc" onclick="this.parentElement.style.display='none'">×</button>
    <b>📲 วิธีติดตั้งบน iPhone / iPad</b><br>
    1. กดปุ่ม <b>Share ⬆️</b> ด้านล่างหน้าจอ<br>
    2. เลื่อนหา <b>"Add to Home Screen"</b> → กด <b>Add</b>
  </div>
  <div class="tabs">
    <button class="tb on" id="ts" onclick="stab('s')">🔍 ค้นหา</button>
    <button class="tb" id="th" onclick="stab('h')">🕐 ประวัติ (<span id="hc">0</span>)</button>
  </div>
  <div id="rp">
    <div class="rc" id="rc"></div>
    <div class="rl" id="rl"></div>
  </div>
  <div id="hp">
    <div class="empty" id="he"><div class="ei">📚</div><div>ยังไม่มีประวัติ<br>คลิกมาตราใดก็ได้</div></div>
    <div id="hl"></div>
  </div>
</div>
<div id="ov" onclick="cld()"></div>
<div id="ds">
  <div class="hdl"></div>
  <div class="shead">
    <span class="badge" id="sb2"></span>
    <button class="scl" onclick="cld()">✕ ปิด</button>
  </div>
  <div class="sb" id="sb3"></div>
</div>
<script>
const D=[{"section":"มาตรา ๑","num":"1","text":"ในประมวลกฎหมายนี้ (๑) “โดยทุจริต” หมายความว่า เพื่อแสวงหาประโยชน์ที่มิควรได้โดยชอบด้วย กฎหมายสําหรับตนเองหรือผู้อื่น (๒) “ทางสาธารณ” หมายความว่า ทางบกหรือทางน้ำสําหรับประชาชนใช้ใน การจราจร และให้หมายความรวมถึงทางรถไฟและทางรถรางที่มีรถเดิน สําหรับประชาชนโดย สารด้วย (๓) “สาธารณสถาน” หมายความว่า สถานที่ใด ๆ ซึ่งประชาชนมีความ ชอบธรรมที่จะเข้าไปได้ “เคหสถาน” หมายความว่า ที่ซึ่งใช้เป็นที่อยู่อาศัย เช่น เรือน โรง เรือ หรือ แพ ซึ่งคนอยู่อาศัย และให้หมายความรวมถึงบริเวณของที่ซึ่งใช้เป็นที่อยู่อาศัยนั้นด้วย จะมี รั้วล้อมหรือไม่ก็ตาม (๕) “อาวุธ” หมายความรวมถึงสิ่งซึ่งไม่เป็นอาวุธโดยสภาพ แต่ซึ่งได้ใช้หรือ เจตนาจะใช้ประทุษร้ายร่างกายถึงอันตรายสาหัสอย่างอาวุธ (๖) “ใช้กําลังประทุษร้าย” หมายความว่า ทําการประทุษร้ายแก่กายหรือจิตใจ ของบุคคล ไม่ว่าจะทําด้วยใช้แรงกายภาพหรือด้วยวิธีอื่นใด และให้หมายความรวมถึงการ กระทําใด ๆ ซึ่งเป็นเหตุให้บุคคลหนึ่งบุคคลใดอยู่ในภาวะที่ไม่สามารถขัดขืนได้ ไม่ว่าจะโดยใช้ ยาทําให้มึนเมา สะกดจิตหรือใช้วิธีอื่นใดอันคล้ายคลึงกัน (๗) “เอกสาร” หมายความว่า กระดาษหรือวัตถุอื่นใดซึ่งได้ทําให้ปรากฏ ความหมายด้วยตัวอักษร ตัวเลข ผังหรือแผนแบบอย่างอื่น จะเป็นโดยวิธีพิมพ์ถ่ายภาพหรือวิธี อื่นอันเป็นหลักฐานแห่งความหมายนั้น (๘) “เอกสารราชการ” หมายความว่า เอกสารซึ่งเจ้าพนักงานได้ทําขึ้นหรือ รับรองในหน้าที่ และให้หมายความรวมถึงสําเนาเอกสารนั้น ๆ ที่เจ้าพนักงานได้รับรองในหน้าที่ ด้วย (๙) “เอกสารสิทธิ” หมายความว่า เอกสารที่เป็นหลักฐานแห่งการก่อ เปลี่ยนแปลง โอน สงวนหรือระงับซึ่งสิทธิ (๑๐) “ลายมือชื่อ” หมายความรวมถึงลายพิมพ์นิ้วมือและเครื่องหมายซึ่ง บุคคลลงไว้แทนลายมือชื่อของตน (๑๑) “กลางคืน” หมายความว่า เวลาระหว่างพระอาทิตย์ตกและพระอาทิตย์ ขึ้น (๑๒) “คุมขัง” หมายความว่า คุมตัว ควบคุม ขัง กักขังหรือจําคุก (๑๓) “ค่าไถ่” หมายความว่า ทรัพย์สินหรือประโยชน์ที่เรียกเอา หรือให้เพื่อ แลกเปลี่ยนเสรีภาพของผู้ถูกเอาตัวไป ผู้ถูกหน่วงเหนี่ยวหรือผู้ถูกกักขัง “บัตรอิเล็กทรอนิกส์” หมายความว่า (ก) เอกสารหรือวัตถุอื่นใดไม่ว่าจะมีรูปลักษณะใดที่ผู้ออกได้ออกให้แก่ผู้ มีสิทธิใช้ ซึ่งจะระบุชื่อหรือไม่ก็ตาม โดยบันทึกข้อมูลหรือรหัสไว้ด้วยการประยุกต์ใช้วิธีการทาง อิเล็กตรอน ไฟฟ้า คลื่นแม่เหล็กไฟฟ้า หรือวิธีอื่นใดในลักษณะคล้ายกัน ซึ่งรวมถึงการประยุกต์ ใช้วิธีการทางแสงหรือวิธีการทางแม่เหล็กให้ปรากฏความหมายด้วยตัวอักษร ตัวเลข รหัส หมายเลขบัตร หรือสัญลักษณ์อื่นใด ทั้งที่สามารถมองเห็นและมองไม่เห็นด้วยตาเปล่า (ข) ข้อมูล รหัส หมายเลขบัญชี หมายเลขชุดทางอิเล็กทรอนิกส์หรือ เครื่องมือทางตัวเลขใด ๆ ที่ผู้ออกได้ออกให้แก่ผู้มีสิทธิใช้ โดยมิได้มีการออกเอกสารหรือวัตถุอื่น ใดให้ แต่มีวิธีการใช้ในทํานองเดียวกับ (ก) หรือ (ค) สิ่งอื่นใดที่ใช้ประกอบกับข้อมูลอิเล็กทรอนิกส์เพื่อแสดงความสัมพันธ์ ระหว่างบุคคลกับข้อมูลอิเล็กทรอนิกส์ โดยมีวัตถุประสงค์เพื่อระบุตัวบุคคลผู้เป็นเจ้าของ (๑๕) “หนังสือเดินทาง”หมายความว่า เอกสารสําคัญประจําตัวไม่ว่าจะมี รูปลักษณะใดที่รัฐบาลไทย รัฐบาลต่างประเทศ หรือองค์การระหว่างประเทศออกให้แก่บุคคล ใด เพื่อใช้แสดงตนในการเดินทางระหว่างประเทศ และให้หมายความรวมถึงเอกสารใช้แทน หนังสือเดินทางและแบบหนังสือเดินทางที่ยังไม่ได้กรอกข้อความเกี่ยวกับผู้ถือหนังสือเดินทาง ด้วย (๑๖) “เจ้าพนักงาน” หมายความว่า บุคคลซึ่งกฎหมายบัญญัติว่าเป็น เจ้าพนักงานหรือได้รับแต่งตั้งตามกฎหมายให้ปฏิบัติหน้าที่ราชการ ไม่ว่าเป็นประจําหรือครั้ง คราว และไม่ว่าจะได้รับค่าตอบแทนหรือไม่ (๑๗) “สื่อลามกอนาจารเด็ก” หมายความว่า วัตถุหรือสิ่งที่แสดงให้รู้หรือ เห็นถึงการกระทําทางเพศของเด็กหรือกับเด็กซึ่งมีอายุไม่เกินสิบแปดปี โดยรูป เรื่อง หรือ ลักษณะสามารถสื่อไปในทางลามกอนาจาร ไม่ว่าจะอยู่ในรูปแบบของเอกสาร ภาพเขียน ภาพ พิมพ์ ภาพระบายสี สิ่งพิมพ์ รูปภาพ ภาพโฆษณา เครื่องหมาย รูปถ่าย ภาพยนตร์ แถบบันทึก เสียง แถบบันทึกภาพ หรือรูปแบบอื่นใดในลักษณะทํานองเดียวกัน และให้หมายความรวมถึง วัตถุหรือสิ่งต่าง ๆ ข้างต้นที่จัดเก็บในระบบคอมพิวเตอร์หรือในอุปกรณ์อิเล็กทรอนิกส์อื่นที่ สามารถแสดงผลให้เข้าใจความหมายได้ (๑๘) “กระทําชําเรา” หมายความว่า กระทําเพื่อสนองความใคร่ของผู้ กระทํา โดยการใช้อวัยวะเพศของผู้กระทําล่วงล้ำอวัยวะเพศ ทวารหนัก หรือช่องปากของผู้อื่น หรือการใช้อวัยวะอื่นของผู้กระทําหรือวัตถุล่วงล้ำอวัยวะเพศหรือทวารหนักของผู้อื่น หรือการ ให้ผู้อื่นกระทํากับผู้กระทําในลักษณะเดียวกัน แต่การให้ผู้อื่นกระทําการดังกล่าวนั้นไม่รวมถึง กรณีที่ผู้อื่นใช้อวัยวะอื่นหรือวัตถุล่วงล้ำอวัยวะเพศหรือทวารหนักของผู้กระทํา ทั้งนี้ อวัยวะ เพศให้หมายความรวมถึงอวัยวะเพศจากการผ่าตัด (๑๙) “คุกคามทางเพศ” หมายความว่า กระทําโดยทางกาย วาจา การ ส่งเสียง การแสดงอากัปกิริยาหรือท่าทาง การติดต่อสื่อสาร การเฝ้าดู การติดตามรังควาน หรือกระทําด้วยประการใด ๆ รวมถึงกระทําด้วยระบบคอมพิวเตอร์ อุปกรณ์โทรคมนาคม หรือ อุปกรณ์อิเล็กทรอนิกส์อื่นที่สามารถแสดงผลให้เข้าใจความหมายได้ ต่อผู้อื่น อันมีลักษณะส่อไป ในทางเพศ โดยประการที่น่าจะทําให้ผู้อื่นนั้นเดือดร้อนรําคาญ อับอาย ถูกเหยียดหยาม หวาด กลัว หรือได้รับความไม่ปลอดภัยในทางเพศ หมวด ๒ การใช้กฎหมายอาญา"},{"section":"มาตรา ๒","num":"2","text":"พระราชบัญญัตินี้ให้ใช้บังคับตั้งแต่วันถัดจากวันประกาศในราชกิจ จานุเบกษาเป็นต้นไป หมายเหตุ :- เหตุผลในการประกาศใช้พระราชบัญญัติฉบับนี้ คือ โดยที่ศาลรัฐธรรมนูญมีคํา วินิจฉัยที่ ๔/๒๕๖๓ ลงวันที่ ๑๙ กุมภาพันธ์ ๒๕๖๓ วินิจฉัยว่า บทบัญญัติความผิดฐานหญิงทํา ให้ตนเองแท้งลูกหรือยอมให้ผู้อื่นทําให้ตนแท้งลูก ตามมาตรา ๓๐๑ แห่งประมวลกฎหมาย อาญา ขัดหรือแย้งต่อมาตรา ๒๘ ของรัฐธรรมนูญแห่งราชอาณาจักรไทย เนื่องจากการทําแท้ง หรือการยุติการตั้งครรภ์เป็นปัญหาทั้งทางสังคมทางการแพทย์ และทางกฎหมายที่มีความ ละเอียดอ่อน รวมทั้งเป็นประเด็นปัญหาที่เกี่ยวข้องกับจริยธรรมและศีลธรรม ซึ่งถือว่าเป็นความ ผิดทางอาญาและกําหนดโทษแก่หญิงเพียงฝ่ายเดียวที่ทําให้ตนเองแท้งลูกหรือยอมให้ผู้อื่นทํา ให้ตนแท้งลูก ทั้งนี้ ความผิดฐานทําให้แท้งลูกมีเจตนารมณ์และคุณธรรมทางกฎหมายที่ ต้องการคุ้มครองชีวิตของทารกในครรภ์ โดยเห็นถึงความสําคัญและคุณค่าของชีวิตมนุษย์ที่ กําลังจะเกิดมา แต่เนื่องจากรากฐานของสังคมไม่ได้ขึ้นอยู่กับการเห็นคุณค่าของชีวิตมนุษย์ เพียงเท่านั้น แต่ยังต้องมีปัจจัยอื่นที่สําคัญเป็นรากฐานของสังคมประกอบด้วยเช่นเดียวกับการ คุ้มครองสิทธิในการมีชีวิตของทารกในครรภ์ หากมุ่งคุ้มครองสิทธิของทารกในครรภ์เพียงอย่าง เดียว โดยมิได้พิจารณาการคุ้มครองสิทธิของหญิงผู้ตั้งครรภ์อันมีมาก่อนสิทธิของทารกใน ครรภ์เป็นสิ่งที่อาจส่งผลกระทบให้หญิงไม่ได้รับความเป็นธรรมและถูกลิดรอนหรือจํากัดสิทธิใน เนื้อตัวร่างกายของหญิงซึ่งเป็นสิทธิตามธรรมชาติ อันเป็นสิทธิพื้นฐานของศักดิ์ศรีความเป็น มนุษย์ที่บุคคลย่อมมีสิทธิและเสรีภาพที่จะกระทําการใดหรือไม่กระทําการใดต่อชีวิตและ ร่างกายของตนได้ตราบเท่าที่การกระทํานั้นไม่ไปรบกวนหรือล่วงล้ำเข้าไปในสิทธิหรือเสรีภาพ ของผู้อื่น รวมทั้งยังส่งผลกระทบถึงสิทธิในการกําหนดเจตจํานงของหญิงตั้งครรภ์ที่ครอบคลุม ไปถึงสิทธิในการตัดสินใจของหญิงว่าจะยุติการตั้งครรภ์หรือตั้งครรภ์ต่อไปหรือไม่ การคุ้มครอง สิทธิของทารกในครรภ์และสิทธิของหญิงตั้งครรภ์ต้องให้เกิดความสมดุลกันโดยอาจต้องนําช่วง ระยะเวลาการตั้งครรภ์มาเป็นหลักเกณฑ์ในการพิจารณา การปฏิเสธสิทธิของหญิงโดย ปราศจากการกําหนดเงื่อนไขหรือเงื่อนเวลาที่เหมาะสมดังเช่นมาตรา ๓๐๑ แห่งประมวล กฎหมายอาญาเป็นการจํากัดสิทธิและเสรีภาพของหญิงเกินความจําเป็น ประกอบกับรัฐมีหน้าที่ กําหนดให้มีมาตรการส่งเสริมให้บุคคลใช้สิทธิและเสรีภาพโดยจัดให้มีมาตรการในการยุติการ ตั้งครรภ์ที่ปลอดภัย ถูกต้องตามกฎหมาย ไม่กระทบต่อการใช้สิทธิของหญิง และในขณะเดียว กันก็ต้องเข้าไปดูแลและคุ้มครองชีวิตของทารกในครรภ์มิให้ถูกกระทบสิทธิในการมีชีวิตด้วยเช่น กัน บทบัญญัติมาตรา ๓๐๑ แห่งประมวลกฎหมายอาญา จึงกระทบต่อสิทธิและเสรีภาพในชีวิต และร่างกายของหญิงเกินความจําเป็น ไม่เป็นไปตามหลักแห่งความได้สัดส่วนและเป็นการ จํากัดสิทธิและเสรีภาพตามมาตรา ๒๘ ของรัฐธรรมนูญแห่งราชอาณาจักรไทย นอกจากนี้ ศาล รัฐธรรมนูญยังได้ให้ข้อเสนอแนะด้วยว่าประมวลกฎหมายอาญาและกฎหมายที่เกี่ยวข้องเรื่อง การทําแท้งสมควรได้รับการปรับปรุงแก้ไขเพื่อให้สอดคล้องกับสภาพการณ์ในปัจจุบัน สมควร แก้ไขเพิ่มเติมบทบัญญัติเกี่ยวกับความผิดฐานทําให้แท้งลูก โดยกําหนดอายุครรภ์สําหรับความ ผิดฐานหญิงทําให้ตนเองแท้งลูกหรือยอมให้ผู้อื่นทําให้ตนแท้งลูกตามมาตรา ๓๐๑ รวมทั้งเพิ่ม เหตุยกเว้นความผิดฐานทําให้แท้งลูกตามมาตรา ๓๐๕ ให้สอดคล้องกับคําวินิจฉัยและข้อเสนอ แนะของศาลรัฐธรรมนูญดังกล่าว จึงจําเป็นต้องตราพระราชบัญญัตินี้ พระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา (ฉบับที่ ๒๙) พ.ศ. ๒๕๖๕"},{"section":"มาตรา ๓","num":"3","text":"ถ้ากฎหมายที่ใช้ในขณะกระทําความผิดแตกต่างกับกฎหมายที่ใช้ใน ภายหลังการกระทําความผิด ให้ใช้กฎหมายในส่วนที่เป็นคุณแก่ผู้กระทําความผิดไม่ว่าในทางใด เว้นแต่คดีถึงที่สุดแล้ว แต่ในกรณีที่คดีถึงที่สุดแล้วดังต่อไปนี้ ถ้าผู้กระทําความผิดยังไม่ได้รับโทษ หรือกําลังรับโทษอยู่ และโทษที่ กําหนดตามคําพิพากษาหนักกว่าโทษที่กําหนดตามกฎหมายที่บัญญัติในภายหลัง เมื่อสํานวน ความปรากฏแก่ศาลหรือเมื่อผู้กระทําความผิด ผู้แทนโดยชอบธรรมของผู้นั้น ผู้อนุบาลของผู้นั้น หรือพนักงานอัยการร้องขอ ให้ศาลกําหนดโทษเสียใหม่ตามกฎหมายที่บัญญัติในภายหลัง ใน การที่ศาลจะกําหนดโทษใหม่นี้ ถ้าปรากฏว่า ผู้กระทําความผิดได้รับโทษมาบ้างแล้ว เมื่อได้ คํานึงถึงโทษตามกฎหมายที่บัญญัติในภายหลัง หากเห็นเป็นการสมควร ศาลจะกําหนดโทษ น้อยกว่าโทษขั้นต่ำที่กฎหมายที่บัญญัติในภายหลังกําหนดไว้ถ้าหากมีก็ได้ หรือถ้าเห็นว่าโทษที่ ผู้กระทําความผิดได้รับมาแล้วเป็นการเพียงพอ ศาลจะปล่อยผู้กระทําความผิดไปก็ได้ (๒) ถ้าศาลพิพากษาให้ประหารชีวิตผู้กระทําความผิดและตามกฎหมายที่ บัญญัติในภายหลัง โทษที่จะลงแก่ผู้กระทําความผิดไม่ถึงประหารชีวิต ให้งดการประหารชีวิตผู้ กระทําความผิด และให้ถือว่าโทษประหารชีวิตตามคําพิพากษาได้เปลี่ยนเป็นโทษสูงสุดที่จะพึง ลงได้ตามกฎหมายที่บัญญัติในภายหลัง"},{"section":"มาตรา ๔","num":"4","text":"ผู้ใดกระทําความผิดในราชอาณาจักร ต้องรับโทษตามกฎหมาย การกระทําความผิดในเรือไทยหรืออากาศยานไทย ไม่ว่าจะอยู่ ณ ที่ใด ให้ถือ ว่ากระทําความผิดในราชอาณาจักร"},{"section":"มาตรา ๕","num":"5","text":"ให้รัฐมนตรีว่าการกระทรวงยุติธรรมรักษาการตามพระราชบัญญัติ นี้ หมายเหตุ :- เหตุผลในการประกาศใช้พระราชบัญญัติฉบับนี้ คือ เนื่องจากปัจจุบันบทบัญญัติ เกี่ยวกับการลงโทษประหารชีวิตและจําคุกตลอดชีวิตแก่ผู้ซึ่งกระทําความผิดในขณะที่มีอายุต่ำ กว่าสิบแปดปีตามประมวลกฎหมายอาญายังไม่สอดคล้องกับข้อ ๖ วรรคห้า แห่งกติการะหว่าง ประเทศว่าด้วยสิทธิพลเมืองและสิทธิทางการเมือง ค.ศ. ๑๙๖๖ ที่กําหนดว่า บุคคลอายุต่ำกว่า สิบแปดปีที่กระทําความผิดจะถูกพิพากษาประหารชีวิตมิได้ และข้อ ๓๗ ก) แห่งอนุสัญญาว่า ด้วยสิทธิเด็ก ค.ศ. ๑๙๘๙ ที่กําหนดว่า จะไม่มีเด็กคนใดได้รับการทรมาน หรือถูกปฏิบัติหรือลง โทษที่โหดร้าย ไร้มนุษยธรรมหรือต่ำช้า จะไม่มีการลงโทษประหารชีวิต หรือจําคุกตลอดชีวิตที่ ไม่มีโอกาสจะได้รับการปล่อยตัวสําหรับความผิดที่กระทําโดยบุคคลที่มีอายุต่ำกว่าสิบแปดปีซึ่ง ประเทศไทยเข้าเป็นภาคี นอกจากนั้น บทบัญญัติตามประมวลกฎหมายอาญาเกี่ยวกับวิธีการ ประหารชีวิตโดยการเอาไปยิงเสียให้ตายยังไม่เหมาะสมและสอดคล้องกับสภาวการณ์ใน ปัจจุบัน เนื่องจากเป็นวิธีการที่ทารุณโหดร้ายและไร้มนุษยธรรมที่รัฐไม่พึงปฏิบัติต่อผู้กระทํา ความผิด สมควรแก้ไขเพิ่มเติมประมวลกฎหมายอาญาเพื่อกําหนดมิให้นําโทษประหารชีวิตและ โทษจําคุกตลอดชีวิตมาใช้บังคับแก่ผู้ซึ่งกระทําความผิดในขณะที่มีอายุต่ำกว่าสิบแปดปี และใน กรณีที่บุคคลดังกล่าวได้กระทําความผิดที่มีระวางโทษประหารชีวิตหรือจําคุกตลอดชีวิต ให้ถือ ว่าระวางโทษดังกล่าวได้เปลี่ยนเป็นระวางโทษจําคุกห้าสิบปีและเพื่อเปลี่ยนวิธีการประหารชีวิต จากการเอาไปยิงเสียให้ตายเป็นดําเนินการฉีดสารพิษให้ตายแทน จึงจําเป็นต้องตรา พระราชบัญญัตินี้ พระราชกําหนดแก้ไขเพิ่มเติมประมวลกฎหมายอาญา พ.ศ. ๒๕๔๖"},{"section":"มาตรา ๖","num":"6","text":"เมื่อประมวลกฎหมายได้ใช้บังคับแล้วในการจําคุกแทนค่าปรับตาม กฎหมายใด ไม่ว่ากฎหมายนั้นจะบัญญัติไว้ประการใด ให้นําประมวลกฎหมายอาญามาใช้ บังคับ แต่สําหรับความผิดที่ได้กระทําก่อนวันที่ประมวลกฎหมายอาญาใช้บังคับ มิให้กักขังเกิน กว่าหนึ่งปีสําหรับโทษปรับกระทงเดียว และสองปีสําหรับโทษปรับหลายกระทง"},{"section":"มาตรา ๗","num":"7","text":"ในกรณีวิธีการเพื่อความปลอดภัยตามมาตรา ๔๖ แห่งประมวล กฎหมายอาญา ให้นําบทบัญญัติแห่งประมวลกฎหมายวิธีพิจารณาความอาญามาใช้บังคับ เสมือนเป็นความผิดอาญา แต่ห้ามมิให้คุมขังชั้นสอบสวนเกินกว่าสี่สิบแปดชั่วโมงนับแต่เวลาที่ผู้ ถูกจับมาถึงที่ทําการของพนักงานฝ่ายปกครองหรือตํารวจ แต่มิให้นับเวลาเดินทางตามปกติที่ นําตัวผู้ถูกจับมาศาลรวมเข้าในกําหนดเวลาสี่สิบแปดชั่วโมงนั้นด้วย"},{"section":"มาตรา ๘","num":"8","text":"เมื่อประมวลกฎหมายอาญาได้ใช้บังคับแล้ว บทบัญญัติแห่ง กฎหมายใดอ้างถึงกฎหมายลักษณะอาญา หรืออ้างถึงบทบัญญัติแห่งกฎหมายลักษณะอาญา ให้ถือว่าบทบัญญัติแห่งกฎหมายนั้นอ้างถึงประมวลกฎหมายอาญา หรือบทบัญญัติแห่ง ประมวลกฎหมายอาญาในบทมาตราที่มีนัยเช่นเดียวกัน แล้วแต่กรณี ผู้รับสนองพระบรมราชโองการ จอมพล ป. พิบูลสงคราม นายกรัฐมนตรี สารบาญ ประมวลกฎหมายอาญา ภาค ๑บทบัญญัติทั่วไป มาตรา ลักษณะ ๑บทบัญญัติที่ใช้แก่ความผิดทั่วไป หมวด ๑บทนิยาม ๑ หมวด ๒การใช้กฎหมายอาญา ๒-๑๗ หมวด ๓ โทษและวิธีการเพื่อความปลอดภัย ส่วนที่ ๑ โทษ ๑๘-๓๘ ส่วนที่ ๒ วิธีการเพื่อความปลอดภัย ๓๙-๕๐ ส่วนที่ ๓ วิธีเพิ่มโทษลดโทษ และการรอการลงโทษ ๕๑-๕๘ หมวด ๔ ความรับผิดในทางอาญา ๕๙-๗๙ หมวด ๕ การพยายามกระทําความผิด ๘๐-๘๒ หมวด ๖ ตัวการและผู้สนับสนุน ๘๓-๘๙ หมวด ๗ การกระทําความผิดหลายบทหรือหลายกระทง ๙๐-๙๑ หมวด ๘ การกระทําความผิดอีก ๙๒-๙๔ หมวด ๙ อายุความ ๙๕-๑๐๑ ลักษณะ ๒บทบัญญัติที่ใช้แก่ความผิดลหุโทษ ๑๐๒-๑๐๖ ภาค ๒ ความผิด ลักษณะ ๑ความผิดเกี่ยวกับความมั่นคงแห่งราชอาณาจักร หมวด ๑ ความผิดต่อองค์พระมหากษัตริย์พระราชินี รัชทายาท และผู้สําเร็จราชการแทนพระองค์ ๑๐๗-๑๑๒ หมวด ๒ ความผิดต่อความมั่นคงของรัฐภายใน ราชอาณาจักร ๑๑๓-๑๑๘ หมวด ๓ ความผิดต่อความมั่นคงของรัฐภายนอก ราชอาณาจักร ๑๑๙-๑๒๙ หมวด ๔ ความผิดต่อสัมพันธไมตรีกับต่างประเทศ ๑๓๐-๑๓๕ ลักษณะ ๑/๑ ความผิดเกี่ยวกับการก่อการร้าย ๑๓๕/๑-๑๓๕/๔ ลักษณะ ๒ความผิดเกี่ยวกับการปกครอง หมวด ๑ ความผิดต่อเจ้าพนักงาน ๑๓๖-๑๔๖ หมวด ๒ ความผิดต่อตําแหน่งหน้าที่ราชการ ๑๔๗-๑๖๖ ลักษณะ ๓ความผิดเกี่ยวกับการยุติธรรม หมวด ๑ ความผิดต่อเจ้าพนักงานในการยุติธรรม ๑๖๗-๑๙๙ หมวด ๒ ความผิดต่อตําแหน่งหน้าที่ในการยุติธรรม ๒๐๐-๒๐๕ ลักษณะ ๔ ความผิดเกี่ยวกับศาสนา ๒๐๖-๒๐๘ ลักษณะ ๕ ความผิดเกี่ยวกับความสงบสุขของประชาชน ๒๐๙-๒๑๖ ลักษณะ ๖ ความผิดเกี่ยวกับการก่อให้เกิดภยันตรายต่อประชาชน ๒๑๗-๒๓๙ ้ จาก 128 ลักษณะ ๗ ความผิดเกี่ยวกับการปลอมและการแปลง หมวด ๑ ความผิดเกี่ยวกับเงินตรา ๒๔๐-๒๔๙ หมวด ๒ ความผิดเกี่ยวกับดวงตรา แสตมป์และตัว ๒๕๐-๒๖๓ หมวด ๓ ความผิดเกี่ยวกับเอกสาร ๒๖๔-๒๖๙ หมวด ๔ ความผิดเกี่ยวกับบัตรอิเล็กทรอนิกส์ ๒๖๙/๑-๒๖๙/๗ หมวด ๕ ความผิดเกี่ยวกับหนังสือเดินทาง ๒๖๙/๘-๒๖๙/๑๕ ลักษณะ ๘ความผิดเกี่ยวกับการค้า ๒๗๐-๒๗๕ ลักษณะ ๙ความผิดเกี่ยวกับเพศ ๒๗๖-๒๘๗ ลักษณะ ๑๐ความผิดเกี่ยวกับชีวิตและร่างกาย หมวด ๑ ความผิดต่อชีวิต ๒๘๘-๒๙๔ หมวด ๒ ความผิดต่อร่างกาย ๒๙๕-๓๐๐ หมวด ๓ ความผิดฐานทําให้แท้งลูก ๓๐๑-๓๐๕ หมวด ๔ ความผิดฐานทอดทิ้งเด็กคนป่วยเจ็บหรือคนชรา ๓๐๖-๓๐๘ ลักษณะ ๑๑ความผิดเกี่ยวกับเสรีภาพและชื่อเสียง หมวด ๑ ความผิดต่อเสรีภาพ ๓๐๙-๓๒๑/๑ หมวด ๒ ความผิดฐานเปิดเผยความลับ ๓๒๒-๓๒๕ หมวด ๓ ความผิดฐานหมิ่นประมาท ๓๒๖-๓๓๓ ลักษณะ ๑๒ ความผิดเกี่ยวกับทรัพย์ หมวด ๑ ความผิดฐานลักทรัพย์และวิ่งราวทรัพย์ ๓๓๔-๓๓๖ ทวิ หมวด ๒ ความผิดฐานกรรโชก รีดเอาทรัพย์ ชิงทรัพย์ และปล้นทรัพย์ ๓๓๗-๓๔๐ ตรี หมวด ๓ ความผิดฐานฉ้อโกง ๓๔๑-๓๔๘ หมวด ๔ ความผิดฐานโกงเจ้าหนี้ ๓๔๙-๓๕๑ หมวด ๕ ความผิดฐานยักยอก ๓๕๒-๓๕๖ หมวด ๖ ความผิดฐานรับของโจร ๓๕๗ หมวด ๗ ความผิดฐานทําให้เสียทรัพย์ ๓๕๘-๓๖๑ หมวด ๘ ความผิดฐานบุกรุก ๓๖๒-๓๖๖ ลักษณะ ๑๓ ความผิดเกี่ยวกับศพ ๓๖๖/๑-๓๖๖/๔ ภาค ๓ ลหุโทษ ๓๖๗-๓๙๘ ประมวลกฎหมายอาญา ภาค ๑ บทบัญญัติทั่วไป ลักษณะ ๑ บทบัญญัติที่ใช้แก่ความผิดทั่วไป หมวด ๑ บทนิยาม"},{"section":"มาตรา ๙","num":"9","text":"เจ้าพนักงานของรัฐบาลไทยกระทําความผิดตามที่บัญญัติไว้ใน"},{"section":"มาตรา ๑๐","num":"10","text":"ผู้ใดกระทําการนอกราชอาณาจักรซึ่งเป็นความผิดตาม มาตราต่าง ๆ ที่ระบุไว้ในมาตรา ๗ (๒) และ (๓) มาตรา ๘ และมาตรา ๙ ห้ามมิให้ลงโทษผู้นั้น ในราชอาณาจักรเพราะการกระทํานั้นอีก ถ้า (๑) ได้มีคําพิพากษาของศาลในต่างประเทศอันถึงที่สุดให้ปล่อยตัวผู้นั้นหรือ (๒) ศาลในต่างประเทศพิพากษาให้ลงโทษและผู้นั้นได้พ้นโทษแล้ว ถ้าผู้ต้องคําพิพากษาได้รับโทษสําหรับการกระทํานั้นตามคําพิพากษาของ ศาลในต่างประเทศมาแล้ว แต่ยังไม่พ้นโทษศาลจะลงโทษน้อยกว่าที่กฎหมายกําหนดไว้สําหรับ ความผิดนั้นเพียงใดก็ได้ หรือจะไม่ลงโทษเลยก็ได้ ทั้งนี้ โดยคํานึงถึงโทษที่ผู้นั้นได้รับมาแล้ว"},{"section":"มาตรา ๑๑","num":"11","text":"ให้ประธานศาลฎีกาและรัฐมนตรีว่าการกระทรวงยุติธรรมรักษา การตามพระราชบัญญัตินี้ หมายเหตุ :- เหตุผลในการประกาศใช้พระราชบัญญัติฉบับนี้ คือ โดยที่หลักเกณฑ์และวิธีการ บังคับโทษปรับในเรื่องการยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องในทรัพย์สินเพื่อใช้ค่าปรับยังไม่ ได้กําหนดไว้ และการกําหนดอัตราเงินในการกักขังแทนค่าปรับที่ใช้อยู่ในปัจจุบันไม่สอดคล้อง กับสภาพเศรษฐกิจและสังคมที่เปลี่ยนแปลงไป สมควรกําหนดหลักเกณฑ์และวิธีการดังกล่าวให้ ชัดเจนเพื่อให้ผู้มีหน้าที่ปฏิบัติงานสามารถปฏิบัติได้ รวมทั้งกําหนดอัตราเงินในการกักขังแทน ค่าปรับให้สอดคล้องกับค่าแรงขั้นต่ำและภาวะเศรษฐกิจ ส่วนบทบัญญัติว่าด้วยการรอการ กําหนดโทษหรือรอการลงโทษซึ่งเป็นวิธีการแก้ไขฟื้นฟูผู้กระทําความผิดที่ไม่ควรถูกส่งเข้าสู่ ระบบเรือนจํา ยังไม่มีการนํามาใช้กับผู้ที่จะถูกลงโทษปรับรวมทั้งไม่เปิดโอกาสให้ผู้ที่เคย ต้องโทษจําคุกแม้เพียงเล็กน้อยหรือมิใช่ผู้กระทําผิดติดนิสัยได้รับโอกาสในการรอการ กําหนดโทษหรือรอการลงโทษ ทําให้มีผู้ต้องถูกจําคุกระยะสั้นอยู่ในเรือนจําเป็นจํานวนมาก สมควรแก้ไขหลักเกณฑ์ในเรื่องดังกล่าวให้เหมาะสมยิ่งขึ้น นอกจากนี้ ปัจจุบันมีการใช้ผู้ที่มี ความอ่อนแอทางร่างกายหรือจิตใจ หรือผู้ที่อยู่ในภาวะจํายอมให้กระทําความผิดมากขึ้น ซึ่งไม่ เพียงแต่สร้างความเสียหายให้แก่ผู้ที่เป็นเหยื่อของอาชญากรรม ยังทําให้ผู้ที่ถูกใช้ซึ่งไม่มีมูลเหตุ จูงใจในการกระทําความผิดมาก่อนต้องกระทําความผิดและได้รับโทษ ทั้งอาจต้องตกอยู่ใน ภยันตรายและได้รับความเดือดร้อนต่อตนเองและครอบครัว สมควรกําหนดให้ผู้ใช้ในกรณีดัง กล่าวต้องรับโทษหนักขึ้น และให้มีมาตรการลดโทษแก่ผู้ถูกใช้หรือผู้กระทําตามคําโฆษณาหรือ ประกาศแก่บุคคลทั่วไปให้กระทําความผิดที่ได้เปิดเผยข้อมูลสําคัญจนสามารถดําเนินคดีกับผู้ ใช้หรือผู้โฆษณาหรือประกาศดังกล่าวด้วย จึงจําเป็นต้องตราพระราชบัญญัตินี้ พระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา (ฉบับที่ ๒๖) พ.ศ. ๒๕๖๐"},{"section":"มาตรา ๑๒","num":"12","text":"วิธีการเพื่อความปลอดภัยจะใช้บังคับแก่บุคคลใดได้ก็ต่อเมื่อมีบท บัญญัติแห่งกฎหมายให้ใช้บังคับได้เท่านั้น และกฎหมายที่จะใช้บังคับนั้นให้ใช้กฎหมายในขณะที่ ศาลพิพากษา"},{"section":"มาตรา ๑๓","num":"13","text":"ถ้าตามบทบัญญัติของกฎหมายที่บัญญัติในภายหลังได้มีการยก เลิกวิธีการเพื่อความปลอดภัยใด และถ้าผู้ใดถูกใช้บังคับวิธีการเพื่อความปลอดภัยนั้นอยู่ ก็ให้ ศาลสั่งระงับการใช้บังคับวิธีการเพื่อความปลอดภัยนั้นเสีย เมื่อสํานวนความปรากฏแก่ศาล หรือเมื่อผู้นั้น ผู้แทนโดยชอบธรรมของผู้นั้น ผู้อนุบาลของผู้นั้นหรือพนักงานอัยการร้องขอ"},{"section":"มาตรา ๑๔","num":"14","text":"ในกรณีที่มีผู้ถูกใช้บังคับวิธีการเพื่อความปลอดภัยใดอยู่ และได้มี บทบัญญัติของกฎหมายที่บัญญัติในภายหลังเปลี่ยนแปลงเงื่อนไขที่จะสั่งให้มีการใช้บังคับวิธี การเพื่อความปลอดภัยนั้นไป ซึ่งเป็นผลอันไม่อาจนํามาใช้บังคับแก่กรณีของผู้นั้นได้ หรือนํามา ใช้บังคับได้แต่การใช้บังคับวิธีการเพื่อความปลอดภัยตามบทบัญญัติของกฎหมายที่บัญญัติใน ภายหลังเป็นคุณแก่ผู้นั้นยิ่งกว่า เมื่อสํานวนความปรากฏแก่ศาล หรือเมื่อผู้นั้น ผู้แทนโดย ชอบธรรมของผู้นั้น ผู้อนุบาลของผู้นั้นหรือพนักงานอัยการร้องขอต่อศาลให้ยกเลิกการใช้บังคับ วิธีการเพื่อความปลอดภัย หรือร้องขอรับผลตามบทบัญญัติแห่งกฎหมายนั้น แล้วแต่กรณี ให้ ศาลมีอํานาจสั่งตามที่เห็นสมควร"},{"section":"มาตรา ๑๕","num":"15","text":"ถ้าตามบทบัญญัติของกฎหมายที่บัญญัติในภายหลัง โทษใดได้ เปลี่ยนลักษณะมาเป็นวิธีการเพื่อความปลอดภัย และได้มีคําพิพากษาลงโทษนั้นแก่บุคคลใดไว้ ก็ให้ถือว่าโทษที่ลงนั้นเป็นวิธีการเพื่อความปลอดภัยด้วย ในกรณีดังกล่าวในวรรคแรก ถ้ายังไม่ได้ลงโทษผู้นั้นหรือผู้นั้นยังรับโทษอยู่ ก็ ให้ใช้บังคับวิธีการเพื่อความปลอดภัยแก่ผู้นั้นต่อไป และถ้าหากว่าตามบทบัญญัติของกฎหมาย ที่บัญญัติในภายหลังมีเงื่อนไขที่จะสั่งให้มีการใช้บังคับวิธีการเพื่อความปลอดภัย อันไม่อาจนํา มาใช้บังคับแก่กรณีของผู้นั้นหรือนํามาใช้บังคับได้ แต่การใช้บังคับวิธีการเพื่อความปลอดภัย ตามบทบัญญัติของกฎหมายที่บัญญัติในภายหลังเป็นคุณแก่ผู้นั้นยิ่งกว่า เมื่อสํานวนความ ปรากฏแก่ศาล หรือเมื่อผู้นั้น ผู้แทนโดยชอบธรรมของผู้นั้น ผู้อนุบาลของผู้นั้นหรือพนักงานอัย การร้องขอต่อศาลให้ยกเลิกการใช้บังคับวิธีการเพื่อความปลอดภัย หรือร้องขอรับผลตามบท บัญญัติแห่งกฎหมายนั้น แล้วแต่กรณี ให้ศาลมีอํานาจสั่งตามที่เห็นสมควร"},{"section":"มาตรา ๑๖","num":"16","text":"เมื่อศาลได้พิพากษาให้ใช้บังคับวิธีการเพื่อความปลอดภัยแก่ผู้ใด แล้ว ถ้าภายหลังความปรากฏแก่ศาลตามคําเสนอของผู้นั้นเอง ผู้แทนโดยชอบธรรมของผู้นั้น ผู้ อนุบาลของผู้นั้นหรือพนักงานอัยการว่า พฤติการณ์เกี่ยวกับการใช้บังคับนั้นได้เปลี่ยนแปลงไป จากเดิม ศาลจะสั่งเพิกถอนหรืองดการใช้บังคับวิธีการเพื่อความปลอดภัยแก่ผู้นั้นไว้ชั่วคราว ตามที่เห็นสมควรก็ได้"},{"section":"มาตรา ๑๗","num":"17","text":"บทบัญญัติในภาค ๑ แห่งประมวลกฎหมายนี้ ให้ใช้ในกรณีแห่ง ความผิดตามกฎหมายอื่นด้วย เว้นแต่กฎหมายนั้น ๆ จะได้บัญญัติไว้เป็นอย่างอื่น หมวด ๓ โทษและวิธีการเพื่อความปลอดภัย ส่วนที่ ๑ โทษ"},{"section":"มาตรา ๑๘","num":"18","text":"โทษสําหรับลงแก่ผู้กระทําความผิดมีดังนี้ ประหารชีวิต (๒) จําคุก (๓) กักขัง (๔) ปรับ (๕) ริบทรัพย์สิน โทษประหารชีวิตและโทษจําคุกตลอดชีวิตมิให้นํามาใช้บังคับแก่ผู้ซึ่งกระทํา ความผิดในขณะที่มีอายุต่ำกว่าสิบแปดปี ในกรณีผู้ซึ่งกระทําความผิดในขณะที่มีอายุต่ำกว่าสิบแปดปีได้กระทําความ ผิดที่มีระวางโทษประหารชีวิตหรือจําคุกตลอดชีวิต ให้ถือว่าระวางโทษดังกล่าวได้เปลี่ยนเป็น ระวางโทษจําคุกห้าสิบปี"},{"section":"มาตรา ๑๙","num":"19","text":"ผู้ใดต้องโทษประหารชีวิต ให้ดําเนินการด้วยวิธีฉีดยาหรือ สารพิษให้ตาย หลักเกณฑ์และวิธีการประหารชีวิต ให้เป็นไปตามระเบียบที่กระทรวงยุติธรรม กําหนด โดยประกาศในราชกิจจานุเบกษา"},{"section":"มาตรา ๒๐","num":"20","text":"บรรดาความผิดที่กฎหมายกําหนดให้ลงโทษทั้งจําคุกและปรับ ด้วยนั้น ถ้าศาลเห็นสมควรจะลงแต่โทษจําคุกก็ได้"},{"section":"มาตรา ๒๑","num":"21","text":"ในการคํานวณระยะเวลาจําคุก ให้นับวันเริ่มจําคุกรวมคํานวณเข้า ด้วยและให้นับเป็นหนึ่งวันเต็มโดยไม่ต้องคํานึงถึงจํานวนชั่วโมง ถ้าระยะเวลาที่คํานวณนั้นกําหนดเป็นเดือน ให้นับสามสิบวันเป็นหนึ่งเดือน ถ้า กําหนดเป็นปี ให้คํานวณตามปีปฏิทินในราชการ เมื่อผู้ต้องคําพิพากษาถูกจําคุกครบกําหนดแล้ว ให้ปล่อยตัวในวันถัดจากวันที่ ครบกําหนด"},{"section":"มาตรา ๒๒","num":"22","text":"โทษจําคุก ให้เริ่มแต่วันมีคําพิพากษา แต่ถ้าผู้ต้องคําพิพากษาถูก คุมขังก่อนศาลพิพากษา ให้หักจํานวนวันที่ถูกคุมขังออกจากระยะเวลาจําคุกตามคําพิพากษา เว้นแต่คําพิพากษานั้นจะกล่าวไว้เป็นอย่างอื่น ในกรณีที่คําพิพากษากล่าวไว้เป็นอย่างอื่น โทษจําคุกตามคําพิพากษาเมื่อรวม จํานวนวันที่ถูกคุมขังก่อนศาลพิพากษาในคดีเรื่องนั้นเข้าด้วยแล้ว ต้องไม่เกินอัตราโทษขั้นสูง ของกฎหมายที่กําหนดไว้สําหรับความผิดที่ได้กระทําลงนั้น ทั้งนี้ ไม่เป็นการ กระทบกระเทือนบทบัญญัติในมาตรา ๙๑"},{"section":"มาตรา ๒๓","num":"23","text":"ผู้ใดกระทําความผิดซึ่งมีโทษจําคุก และในคดีนั้นศาลจะลงโทษ จําคุกไม่เกินสามเดือน ถ้าไม่ปรากฏว่าผู้นั้นได้รับโทษจําคุกมาก่อน หรือปรากฏว่าได้รับโทษ จําคุกมาก่อน แต่เป็นโทษสําหรับความผิดที่ได้กระทําโดยประมาทหรือความผิดลหุโทษ ศาลจะ พิพากษาให้ลงโทษกักขังไม่เกินสามเดือนแทนโทษจําคุกนั้นก็ได้"},{"section":"มาตรา ๒๔","num":"24","text":"ผู้ใดต้องโทษกักขัง ให้กักตัวไว้ในสถานที่กักขังซึ่งกําหนดไว้อันมิ ใช่เรือนจํา สถานีตํารวจ หรือสถานที่ควบคุมผู้ต้องหาของพนักงานสอบสวน ถ้าศาลเห็นเป็นการสมควร จะสั่งในคําพิพากษาให้กักขังผู้กระทําความผิดไว้ ในที่อาศัยของผู้นั้นเอง หรือของผู้อื่นที่ยินยอมรับผู้นั้นไว้ หรือสถานที่อื่นที่อาจกักขังได้ เพื่อให้ เหมาะสมกับประเภทหรือสภาพของผู้ถูกกักขังก็ได้ ถ้าความปรากฏแก่ศาลว่า การกักขังผู้ต้องโทษกักขังไว้ในสถานที่กักขังตาม วรรคหนึ่งหรือวรรคสอง อาจก่อให้เกิดอันตรายต่อผู้นั้น หรือทําให้ผู้ซึ่งต้องพึ่งพาผู้ต้องโทษ กักขังในการดํารงชีพได้รับความเดือดร้อนเกินสมควร หรือมีพฤติการณ์พิเศษประการอื่นที่ แสดงให้เห็นว่าไม่สมควรกักขังผู้ต้องโทษกักขังในสถานที่ดังกล่าว ศาลจะมีคําสั่งให้กักขังผู้ ต้องโทษกักขังในสถานที่อื่นซึ่งมิใช่ที่อยู่อาศัยของผู้นั้นเองโดยได้รับความยินยอมจากเจ้าของ หรือผู้ครอบครองสถานที่ก็ได้ กรณีเช่นว่านี้ ให้ศาลมีอํานาจกําหนดเงื่อนไขอย่างหนึ่งอย่างใด ให้ผู้ต้องโทษกักขังปฏิบัติ และหากเจ้าของหรือผู้ครอบครองสถานที่ดังกล่าวยินยอม ศาลอาจมี คําสั่งแต่งตั้งผู้นั้นเป็นผู้ควบคุมดูแลและให้ถือว่าผู้ที่ได้รับแต่งตั้งเป็นเจ้าพนักงานตามประมวล กฎหมายนี้"},{"section":"มาตรา ๒๕","num":"25","text":"ผู้ต้องโทษกักขังในสถานที่ซึ่งกําหนด จะได้รับการเลี้ยงดูจาก สถานที่นั้น แต่ภายใต้ข้อบังคับของสถานที่ผู้ต้องโทษกักขังมีสิทธิที่จะรับอาหารจากภายนอก โดยค่าใช้จ่ายของตนเอง ใช้เสื้อผ้าของตนเอง ได้รับการเยี่ยมอย่างน้อยวันละหนึ่งชั่วโมง และ รับและส่งจดหมายได้ ผู้ต้องโทษกักขังจะต้องทํางานตามระเบียบ ข้อบังคับและวินัย ถ้าผู้ต้องโทษกัก ขังประสงค์จะทํางานอย่างอื่นก็ให้อนุญาตให้เลือกทําได้ตามประเภทงานที่ตนสมัคร แต่ต้องไม่ ขัดต่อระเบียบ ข้อบังคับ วินัย หรือความปลอดภัยของสถานที่นั้น"},{"section":"มาตรา ๒๖","num":"26","text":"ถ้าผู้ต้องโทษกักขังถูกกักขังในที่อาศัยของผู้นั้นเอง หรือของผู้อื่น ที่ยินยอมรับผู้นั้นไว้ ผู้ต้องโทษกักขังนั้นมีสิทธิที่จะดําเนินการในวิชาชีพหรืออาชีพของตนใน สถานที่ดังกล่าวได้ ในการนี้ ศาลจะกําหนดเงื่อนไขให้ผู้ต้องโทษกักขังปฏิบัติอย่างหนึ่งอย่างใด หรือไม่ก็ได้ แล้วแต่ศาลจะเห็นสมควร"},{"section":"มาตรา ๒๗","num":"27","text":"ถ้าในระหว่างที่ผู้ต้องโทษกักขังตามมาตรา ๒๓ ได้รับโทษ กักขังอยู่ความปรากฏแก่ศาลเอง หรือปรากฏแก่ศาลตามคําแถลงของพนักงานอัยการหรือผู้ ควบคุมดูแลสถานที่กักขังว่า (๑) ผู้ต้องโทษกักขังฝ่าฝืนระเบียบ ข้อบังคับ หรือวินัยของสถานที่กักขัง (๒) ผู้ต้องโทษกักขังไม่ปฏิบัติตามเงื่อนไขที่ศาลกําหนด หรือ (๓) ผู้ต้องโทษกักขังต้องคําพิพากษาให้ลงโทษจําคุก ศาลอาจเปลี่ยนโทษกักขังเป็นโทษจําคุกมีกําหนดเวลาตามที่ศาลเห็นสมควร แต่ต้องไม่เกินกําหนดเวลาของโทษกักขังที่ผู้ต้องโทษกักขังจะต้องได้รับต่อไป"},{"section":"มาตรา ๒๘","num":"28","text":"ผู้ใดต้องโทษปรับ ผู้นั้นจะต้องชําระเงินตามจํานวนที่กําหนดไว้ใน คําพิพากษาต่อศาล"},{"section":"มาตรา ๒๙","num":"29","text":"ผู้ใดต้องโทษปรับและไม่ชําระค่าปรับภายในสามสิบวันนับแต่ วันที่ศาลพิพากษา ผู้นั้นจะต้องถูกยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องในทรัพย์สินเพื่อใช้ค่า ปรับหรือมิฉะนั้นจะต้องถูกกักขังแทนค่าปรับ แต่ถ้าศาลเห็นเหตุอันควรสงสัยว่าผู้นั้นจะ หลีกเลี่ยงไม่ชําระค่าปรับ ศาลจะสั่งเรียกประกันหรือจะสั่งให้กักขังผู้นั้นแทนค่าปรับไปพลาง ก่อนก็ได้ ความในวรรคสองของมาตรา ๒๔ มิให้นํามาใช้บังคับแก่การกักขังแทนค่าปรับ"},{"section":"มาตรา ๒๙/๑","num":"29/1","text":"ในกรณีที่ผู้ต้องโทษปรับไม่ชําระค่าปรับภายในกําหนดเวลา ตามมาตรา ๒๙ วรรคหนึ่ง ให้ศาลมีอํานาจออกหมายบังคับคดีเพื่อยึดทรัพย์สินหรืออายัดสิทธิ เรียกร้องในทรัพย์สินของผู้นั้นเพื่อใช้ค่าปรับ การบังคับคดีตามวรรคหนึ่ง ให้นําประมวลกฎหมายวิธีพิจารณาความแพ่งมา ใช้บังคับโดยอนุโลม โดยให้เจ้าพนักงานศาลที่ได้รับแต่งตั้งและพนักงานอัยการเป็นผู้มีอํานาจ หน้าที่ในการดําเนินการบังคับคดีและให้เจ้าพนักงานบังคับคดีมีอํานาจหน้าที่ยึดทรัพย์สินหรือ อายัดสิทธิเรียกร้องในทรัพย์สินของผู้ต้องโทษปรับและขายทอดตลาดตามที่ได้รับแจ้งจากศาล หรือพนักงานอัยการ ทั้งนี้ มิให้หน่วยงานของรัฐเรียกค่าฤชาธรรมเนียมหรือค่าใช้จ่ายจากผู้ ดําเนินการบังคับคดี การตรวจสอบหาทรัพย์สินของผู้ต้องโทษปรับโดยพนักงานอัยการเพื่อการ บังคับคดีตามวรรคสอง ให้ปฏิบัติตามหลักเกณฑ์ วิธีการ และเงื่อนไขที่กําหนดในข้อบังคับของ อัยการสูงสุด บทบัญญัติมาตรานี้ไม่กระทบต่อการที่ศาลจะมีคําสั่งตามมาตรา ๒๙ วรรค หนึ่ง"},{"section":"มาตรา ๓๐","num":"30","text":"ในการกักขังแทนค่าปรับ ให้ถืออัตราห้าร้อยบาทต่อหนึ่งวัน และไม่ว่าในกรณีความผิดกระทงเดียวหรือหลายกระทง ห้ามกักขังเกินกําหนดหนึ่งปี เว้นแต่ใน กรณีที่ศาลพิพากษาให้ปรับตั้งแต่สองแสนบาทขึ้นไป ศาลจะสั่งให้กักขังแทนค่าปรับเป็นระยะ เวลาเกินกว่าหนึ่งปีแต่ไม่เกินสองปีก็ได้ ในการคํานวณระยะเวลานั้น ให้นับวันเริ่มกักขังแทนค่าปรับรวมเข้าด้วยและให้ นับเป็นหนึ่งวันเต็มโดยไม่ต้องคํานึงถึงจํานวนชั่วโมง ในกรณีที่ผู้ต้องโทษปรับถูกคุมขังก่อนศาลพิพากษา ให้หักจํานวนวันที่ถูกคุม ขังนั้นออกจากจํานวนเงินค่าปรับ โดยถืออัตราห้าร้อยบาทต่อหนึ่งวัน เว้นแต่ผู้นั้นต้องคํา พิพากษาให้ลงโทษทั้งจําคุกและปรับ ในกรณีเช่นว่านี้ ถ้าจะต้องหักจํานวนวันที่ถูกคุมขังออก จากเวลาจําคุกตามมาตรา ๒๒ ก็ให้หักออกเสียก่อนเหลือเท่าใดจึงให้หักออกจากเงินค่าปรับ เมื่อผู้ต้องโทษปรับถูกกักขังแทนค่าปรับครบกําหนดแล้ว ให้ปล่อยตัวในวันถัด จากวันที่ครบกําหนด ถ้านําเงินค่าปรับมาชําระครบแล้ว ให้ปล่อยตัวไปทันที"},{"section":"มาตรา ๓๐/๑","num":"30/1","text":"ในกรณีที่ศาลพิพากษาปรับ ผู้ต้องโทษปรับซึ่งมิใช่นิติบุคคล และไม่มีเงินชําระค่าปรับอาจยื่นคําร้องต่อศาลชั้นต้นที่พิพากษาคดีเพื่อขอทํางานบริการสังคม หรือทํางานสาธารณประโยชน์แทนค่าปรับ หรือถ้าความปรากฏแก่ศาลในขณะที่พิพากษาคดีว่า ผู้ต้องโทษปรับรายใดอยู่ในเกณฑ์ที่จะทํางานบริการสังคมหรือทํางานสาธารณประโยชน์ตาม มาตรานี้ได้ และถ้าผู้ต้องโทษปรับยินยอม ศาลจะมีคําสั่งให้ผู้นั้นทํางานบริการสังคมหรือทํา งานสาธารณประโยชน์แทนค่าปรับก็ได้ การพิจารณาคําร้องตามวรรคแรก เมื่อศาลได้พิจารณาถึงฐานะการเงิน ประวัติและสภาพความผิดของผู้ต้องโทษปรับแล้ว เห็นเป็นการสมควร ศาลจะมีคําสั่งให้ผู้นั้นทํา งานบริการสังคมหรือทํางานสาธารณประโยชน์แทนค่าปรับก็ได้ ทั้งนี้ ภายใต้การดูแลของ พนักงานคุมประพฤติ เจ้าหน้าที่ของรัฐ หน่วยงานของรัฐ หรือองค์การซึ่งมีวัตถุประสงค์เพื่อการ บริการสังคม การกุศลสาธารณะหรือสาธารณประโยชน์ที่ยินยอมรับดูแล กรณีที่ศาลมีคําสั่งให้ผู้ต้องโทษปรับทํางานบริการสังคมหรือทํางานสาธารณป ระโยชน์แทนค่าปรับให้ศาลกําหนดลักษณะหรือประเภทของงาน ผู้ดูแลการทํางาน วันเริ่มทํา งาน ระยะเวลาทํางาน และจํานวนชั่วโมงที่ถือเป็นการทํางานหนึ่งวัน ทั้งนี้ โดยคํานึงถึงเพศ อายุ ประวัติ การนับถือศาสนา ความประพฤติ สติปัญญา การศึกษาอบรม สุขภาพ ภาวะแห่ง จิต นิสัย อาชีพ สิ่งแวดล้อมหรือสภาพความผิดของผู้ต้องโทษปรับประกอบด้วย และศาลจะ กําหนดเงื่อนไขอย่างหนึ่งอย่างใดให้ผู้ต้องโทษปรับปฏิบัติเพื่อแก้ไขฟื้นฟูหรือป้องกันมิให้ผู้นั้น กระทําความผิดขึ้นอีกก็ได้ ถ้าภายหลังความปรากฏแก่ศาลว่าพฤติการณ์เกี่ยวกับการทํางานบริการ สังคมหรือทํางานสาธารณประโยชน์ของผู้ต้องโทษปรับได้เปลี่ยนแปลงไป ศาลอาจแก้ไข เปลี่ยนแปลงคําสั่งที่กําหนดไว้นั้นก็ได้ตามที่เห็นสมควร ในการกําหนดระยะเวลาทํางานแทนค่าปรับตามวรรคสาม ให้นําบทบัญญัติ"},{"section":"มาตรา ๓๐/๒","num":"30/2","text":"ถ้าภายหลังศาลมีคําสั่งอนุญาตตามมาตรา ๓๐/๑ แล้ว ความปรากฏแก่ศาลเองหรือความปรากฏตามคําแถลงของโจทก์หรือเจ้าพนักงานว่าผู้ต้องโทษ ปรับมีเงินพอชําระค่าปรับได้ในเวลาที่ยื่นคําร้องตามมาตรา ๓๐/๑ หรือฝ่าฝืนหรือไม่ปฏิบัติตาม คําสั่งหรือเงื่อนไขที่ศาลกําหนด ศาลจะเพิกถอนคําสั่งอนุญาตดังกล่าวและปรับ หรือกักขังแทน ค่าปรับ โดยให้หักจํานวนวันที่ทํางานมาแล้วออกจากจํานวนเงินค่าปรับก็ได้ ในระหว่างการทํางานบริการสังคมหรือทํางานสาธารณประโยชน์แทนค่าปรับ หากผู้ต้องโทษปรับไม่ประสงค์จะทํางานดังกล่าวต่อไป อาจขอเปลี่ยนเป็นรับโทษปรับ หรือกัก ขังแทนค่าปรับก็ได้ ในกรณีนี้ให้ศาลมีคําสั่งอนุญาตตามคําร้อง โดยให้หักจํานวนวันที่ทํางานมา แล้วออกจากจํานวนเงินค่าปรับ"},{"section":"มาตรา ๓๐/๓","num":"30/3","text":"เพิ่มโดยพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา (ฉบับที่ ๑๕) พ.ศ. ๒๕๔๕"},{"section":"มาตรา ๓๑","num":"31","text":"ในกรณีที่ศาลจะพิพากษาให้ปรับผู้กระทําความผิดหลายคน ใน ความผิดอันเดียวกัน ในกรณีเดียวกันให้ศาลลงโทษปรับเรียงตามรายตัวบุคคล"},{"section":"มาตรา ๓๒","num":"32","text":"ทรัพย์สินใดที่กฎหมายบัญญัติไว้ว่า ผู้ใดทําหรือมีไว้เป็นความผิด ให้ริบเสียทั้งสิ้น ไม่ว่าเป็นของผู้กระทําความผิด และมีผู้ถูกลงโทษตามคําพิพากษาหรือไม่"},{"section":"มาตรา ๓๓","num":"33","text":"ในการริบทรัพย์สิน นอกจากศาลจะมีอํานาจริบตามกฎหมายที่ บัญญัติไว้โดยเฉพาะแล้ว ให้ศาลมีอํานาจสั่งให้ริบทรัพย์สินดังต่อไปนี้อีกด้วย คือ (๑) ทรัพย์สินซึ่งบุคคลได้ใช้ หรือมีไว้เพื่อใช้ในการกระทําความผิด หรือ (๒) ทรัพย์สินซึ่งบุคคลได้มาโดยได้กระทําความผิด เว้นแต่ทรัพย์สินเหล่านี้เป็นทรัพย์สินของผู้อื่นซึ่งมิได้รู้เห็นเป็นใจด้วยในการ กระทําความผิด"},{"section":"มาตรา ๓๔","num":"34","text":"บรรดาทรัพย์สิน ซึ่งได้ให้ตามความในมาตรา ๑๔๓ มาตรา ๑๔๔ มาตรา ๑๔๙ มาตรา ๑๕๐"},{"section":"มาตรา ๓๕","num":"35","text":"ทรัพย์สินซึ่งศาลพิพากษาให้ริบให้ตกเป็นของแผ่นดิน แต่ศาลจะ พิพากษาให้ทําให้ทรัพย์สินนั้นใช้ไม่ได้หรือทําลายทรัพย์สินนั้นเสียก็ได้"},{"section":"มาตรา ๓๖","num":"36","text":"ในกรณีที่ศาลสั่งให้ริบทรัพย์สินตามมาตรา ๓๓ หรือมาตรา ๓๔ ไปแล้ว หากปรากฏในภายหลังโดยคําเสนอของเจ้าของแท้จริงว่า ผู้เป็นเจ้าของแท้จริงมิได้รู้เห็น เป็นใจด้วยในการกระทําความผิด ก็ให้ศาลสั่งให้คืนทรัพย์สิน ถ้าทรัพย์สินนั้นยังคงมีอยู่ในความ ครอบครองของเจ้าพนักงาน แต่คําเสนอของเจ้าของแท้จริงนั้นจะต้องกระทําต่อศาลภายใน หนึ่งปีนับแต่วันคําพิพากษาถึงที่สุด"},{"section":"มาตรา ๓๗","num":"37","text":"ถ้าผู้ที่ศาลสั่งให้ส่งทรัพย์สินที่ริบไม่ส่งภายในเวลาที่ศาลกําหนด ให้ศาลมีอํานาจสั่งดังต่อไปนี้ (๑) ให้ยึดทรัพย์สินนั้น (๒) ให้ชําระราคาหรือสั่งยึดทรัพย์สินอื่นของผู้นั้นชดใช้ราคาจนเต็ม หรือ (๓) ในกรณีที่ศาลเห็นว่า ผู้นั้นจะส่งทรัพย์สินที่สั่งให้ส่งได้ แต่ไม่ส่ง หรือชําระ ราคาทรัพย์สินนั้นได้ แต่ไม่ชําระ ให้ศาลมีอํานาจกักขังผู้นั้นไว้จนกว่าจะปฏิบัติตามคําสั่งแต่ไม่ เกินหนึ่งปี แต่ถ้าภายหลังปรากฏแก่ศาลเอง หรือโดยคําเสนอของผู้นั้นว่า ผู้นั้นไม่สามารถส่ง ทรัพย์สินหรือชําระราคาได้ ศาลจะสั่งให้ปล่อยตัวผู้นั้นไปก่อนครบกําหนดก็ได้"},{"section":"มาตรา ๓๘","num":"38","text":"โทษให้เป็นอันระงับไปด้วยความตายของผู้กระทําความผิด ส่วนที่ ๒ วิธีการเพื่อความปลอดภัย"},{"section":"มาตรา ๓๙","num":"39","text":"วิธีการเพื่อความปลอดภัย มีดังนี้ (๑) กักกัน (๒) ห้ามเข้าเขตกําหนด (๓) เรียกประกันทัณฑ์บน (๔) คุมตัวไว้ในสถานพยาบาล (๕) ห้ามการประกอบอาชีพบางอย่าง"},{"section":"มาตรา ๔๐","num":"40","text":"กักกัน คือ การควบคุมผู้กระทําความผิดติดนิสัยไว้ภายในเขต กําหนด เพื่อป้องกันการกระทําความผิดเพื่อดัดนิสัย และเพื่อฝึกหัดอาชีพ"},{"section":"มาตรา ๔๑","num":"41","text":"ผู้ใดเคยถูกศาลพิพากษาให้กักกันมาแล้วหรือเคยถูกศาล พิพากษาให้ลงโทษจําคุกไม่ต่ำกว่าหกเดือนมาแล้วไม่น้อยกว่าสองครั้งในความผิดดังต่อไปนี้ คือ ความผิดเกี่ยวกับความสงบสุขของประชาชน ตามที่บัญญัติไว้ในมาตรา ๒๐๙ ถึงมาตรา ๒๑๖ (๒) ความผิดเกี่ยวกับการก่อให้เกิดภยันตรายต่อประชาชน ตามที่บัญญัติไว้ใน"},{"section":"มาตรา ๔๒","num":"42","text":"ในการคํานวณระยะเวลากักกัน ให้นับวันที่ศาลพิพากษาเป็นวัน เริ่มกักกัน แต่ถ้ายังมีโทษจําคุกหรือกักขัง ที่ผู้ต้องกักกันนั้นจะต้องรับอยู่ก็ให้จําคุกหรือกักขัง เสียก่อนและให้นับวันถัดจากวันที่พ้นโทษจําคุก หรือพ้นจากกักขังเป็นวันเริ่มกักกัน ระยะเวลากักกัน และการปล่อยตัวผู้ถูกกักกัน ให้นําบทบัญญัติมาตรา ๒๑มา ใช้บังคับโดยอนุโลม"},{"section":"มาตรา ๔๓","num":"43","text":"การฟ้องขอให้กักกันเป็นอํานาจของพนักงานอัยการโดยเฉพาะ และจะขอรวมกันไปในฟ้องคดีอันเป็นมูลให้เกิดอํานาจฟ้องขอให้กักกันหรือจะฟ้องภายหลังก็ได้"},{"section":"มาตรา ๔๔","num":"44","text":"ห้ามเข้าเขตกําหนด คือการห้ามมิให้เข้าไปในท้องที่ หรือสถานที่ที่ กําหนดไว้ในคําพิพากษา"},{"section":"มาตรา ๔๕","num":"45","text":"เมื่อศาลพิพากษาให้ลงโทษผู้ใด และศาลเห็นสมควรเพื่อความ ปลอดภัยของประชาชน ไม่ว่าจะมีคําขอหรือไม่ ศาลอาจสั่งในคําพิพากษาว่าเมื่อผู้นั้นพ้นโทษ ตามคําพิพากษาแล้ว ห้ามมิให้ผู้นั้นเข้าในเขตกําหนดเป็นเวลาไม่เกินห้าปี"},{"section":"มาตรา ๔๖","num":"46","text":"ถ้าความปรากฏแก่ศาลตามข้อเสนอของพนักงานอัยการว่าผู้ ใดจะก่อเหตุร้ายให้เกิดภยันตรายแก่บุคคลหรือทรัพย์สินของผู้อื่น หรือจะกระทําการใดให้เกิด ความเสียหายแก่สิ่งแวดล้อมหรือทรัพยากรธรรมชาติตามกฎหมายเกี่ยวกับสิ่งแวดล้อมและ ทรัพยากรธรรมชาติ ในการพิจารณาคดีความผิดใด ไม่ว่าศาลจะลงโทษผู้ถูกฟ้องหรือไม่ก็ตาม เมื่อมีเหตุอันควรเชื่อว่าผู้ถูกฟ้องน่าจะก่อเหตุร้ายให้เกิดภยันตรายแก่บุคคลหรือทรัพย์สินของผู้ อื่น หรือจะกระทําความผิดให้เกิดความเสียหายแก่สิ่งแวดล้อมหรือทรัพยากรธรรมชาติตาม กฎหมายเกี่ยวกับสิ่งแวดล้อมและทรัพยากรธรรมชาติ ให้ศาลมีอํานาจที่จะสั่งผู้นั้นให้ทําทัณฑ์ บนโดยกําหนดจํานวนเงินไม่เกินกว่าห้าหมื่นบาทว่าผู้นั้นจะไม่ก่อเหตุร้ายหรือจะไม่กระทํา ความผิดดังกล่าวแล้วตลอดเวลาที่ศาลกําหนดแต่ไม่เกินสองปี และจะสั่งให้มีประกันด้วยหรือ ไม่ก็ได้ ถ้าผู้นั้นไม่ยอมทําทัณฑ์บนหรือหาประกันไม่ได้ ให้ศาลมีอํานาจสั่งกักขังผู้นั้น จนกว่าจะทําทัณฑ์บนหรือหาประกันได้ แต่ไม่ให้กักขังเกินกว่าหกเดือน หรือจะสั่งห้ามผู้นั้นเข้า ในเขตกําหนดตามมาตรา ๔๕ ก็ได้ การกระทําของผู้ซึ่งมีอายุต่ำกว่าสิบแปดปีมิให้อยู่ในบังคับแห่งบทบัญญัติตาม มาตรานี้"},{"section":"มาตรา ๔๗","num":"47","text":"ถ้าผู้ทําทัณฑ์บนตามความในมาตรา ๔๖ กระทําผิดทัณฑ์บนให้ ศาลมีอํานาจสั่งให้ผู้นั้นชําระเงินไม่เกินจํานวนที่ได้กําหนดไว้ในทัณฑ์บน ถ้าผู้นั้นไม่ชําระให้นํา บทบัญญัติในมาตรา ๒๙ และมาตรา ๓๐ มาใช้บังคับ"},{"section":"มาตรา ๔๘","num":"48","text":"ถ้าศาลเห็นว่า การปล่อยตัวผู้มีจิตบกพร่อง โรคจิตหรือ จิตฟั่ นเฟือน ซึ่งไม่ต้องรับโทษหรือได้รับการลดโทษตามมาตรา ๖๕ จะเป็นการไม่ปลอดภัยแก่ ประชาชน ศาลจะสั่งให้ส่งไปคุมตัวไว้ในสถานพยาบาลก็ได้ และคําสั่งนี้ศาลจะเพิกถอนเสียเมื่อ ใดก็ได้"},{"section":"มาตรา ๔๙","num":"49","text":"ในกรณีที่ศาลพิพากษาลงโทษจําคุก หรือพิพากษาว่ามีความผิด แต่รอการกําหนดโทษ หรือรอการลงโทษบุคคลใด ถ้าศาลเห็นว่าบุคคลนั้นได้กระทําความผิด เกี่ยวเนื่องกับการเสพสุราเป็นอาจิณ หรือการเป็นผู้ติดยาเสพติดให้โทษ ศาลจะกําหนดในคํา พิพากษาว่า บุคคลนั้นจะต้องไม่เสพสุรา ยาเสพติดให้โทษอย่างหนึ่งอย่างใด หรือทั้งสองอย่าง ภายในระยะเวลาไม่เกินสองปีนับแต่วันพ้นโทษหรือวันปล่อยตัวเพราะรอการกําหนดโทษ หรือ รอการลงโทษก็ได้ ในกรณีที่บุคคลดังกล่าวในวรรคแรกไม่ปฏิบัติตามที่ศาลกําหนด ศาลจะสั่งให้ ส่งไปคุมตัวไว้ในสถานพยาบาลเป็นเวลาไม่เกินสองปีก็ได้"},{"section":"มาตรา ๕๐","num":"50","text":"เมื่อศาลพิพากษาให้ลงโทษผู้ใด ถ้าศาลเห็นว่าผู้นั้นกระทําความ ผิดโดยอาศัยโอกาสจากการประกอบอาชีพหรือวิชาชีพ หรือเนื่องจากการประกอบอาชีพหรือ วิชาชีพ และเห็นว่าหากผู้นั้นประกอบอาชีพหรือวิชาชีพนั้นต่อไปอาจจะกระทําความผิดเช่นนั้น ขึ้นอีก ศาลจะสั่งไว้ในคําพิพากษาห้ามการประกอบอาชีพหรือวิชาชีพนั้น มีกําหนดเวลาไม่เกิน ห้าปีนับแต่วันพ้นโทษไปแล้วก็ได้ ส่วนที่ ๓ วิธีเพิ่มโทษ ลดโทษ และการรอการลงโทษ"},{"section":"มาตรา ๕๑","num":"51","text":"แก้ไขเพิ่มเติมโดยพระราชบัญญัติแก้ไขเพิ่มเติมประมวลกฎหมายอาญา (ฉบับที่ ๖) พ.ศ. ๒๕๒๖"},{"section":"มาตรา ๕๒","num":"52","text":"ในการลดโทษประหารชีวิต ไม่ว่าจะเป็นการลดมาตราส่วน โทษหรือลดโทษที่จะลง ให้ลดดังต่อไปนี้ (๑) ถ้าจะลดหนึ่งในสามให้ลดเป็นโทษจําคุกตลอดชีวิต (๒) ถ้าจะลดกึ่งหนึ่ง ให้ลดเป็นโทษจําคุกตลอดชีวิต หรือโทษจําคุกตั้งแต่ยี่สิบ ห้าปี ถึงห้าสิบปี"},{"section":"มาตรา ๕๓","num":"53","text":"ในการลดโทษจําคุกตลอดชีวิต ไม่ว่าจะเป็นการลดมาตราส่วน โทษหรือลดโทษที่จะลง ให้เปลี่ยนโทษจําคุกตลอดชีวิตเป็นโทษจําคุกห้าสิบปี"},{"section":"มาตรา ๕๔","num":"54","text":"ในการคํานวณการเพิ่มโทษหรือลดโทษที่จะลง ให้ศาลตั้งกําหนด โทษที่จะลงแก่จําเลยเสียก่อนแล้ว จึงเพิ่มหรือลด ถ้ามีทั้งการเพิ่มและการลดโทษที่จะลง ให้เพิ่ม ก่อนแล้วจึงลดจากผลที่เพิ่มแล้วนั้น ถ้าส่วนของการเพิ่มเท่ากับหรือมากกว่าส่วนของการลด และศาลเห็นสมควรจะไม่เพิ่มไม่ลดก็ได้"},{"section":"มาตรา ๕๕","num":"55","text":"ถ้าโทษจําคุกที่ผู้กระทําความผิดจะต้องรับมีกําหนดเวลาเพียง สามเดือนหรือน้อยกว่า ศาลจะกําหนดโทษจําคุกให้น้อยลงอีกก็ได้ หรือถ้าโทษจําคุกที่ผู้กระทํา ความผิดจะต้องรับ มีกําหนดเวลาเพียงสามเดือนหรือน้อยกว่าและมีโทษปรับด้วย ศาลจะ กําหนดโทษจําคุกให้น้อยลง หรือจะยกโทษจําคุกเสีย คงให้ปรับแต่อย่างเดียวก็ได้"},{"section":"มาตรา ๕๖","num":"56","text":"ผู้ใดกระทําความผิดซึ่งมีโทษจําคุกหรือปรับ และในคดีนั้นศาล จะลงโทษจําคุกไม่เกินห้าปีไม่ว่าจะลงโทษปรับด้วยหรือไม่ก็ตามหรือลงโทษปรับ ถ้าปรากฏว่าผู้ นั้น ไม่เคยรับโทษจําคุกมาก่อน หรือ (๒) เคยรับโทษจําคุกมาก่อนแต่เป็นโทษสําหรับความผิดที่ได้กระทําโดย ประมาท หรือความผิดลหุโทษ หรือเป็นโทษจําคุกไม่เกินหกเดือน หรือ (๓) เคยรับโทษจําคุกมาก่อนแต่พ้นโทษจําคุกมาแล้วเกินกว่าห้าปี แล้วมา กระทําความผิดอีก โดยความผิดในครั้งหลังเป็นความผิดที่ได้กระทําโดยประมาทหรือความ ผิดลหุโทษ และเมื่อศาลได้คํานึงถึงอายุ ประวัติ ความประพฤติ สติปัญญา การ ศึกษาอบรม สุขภาพ ภาวะแห่งจิต นิสัย อาชีพ และสิ่งแวดล้อมของผู้นั้น หรือสภาพความผิด หรือการรู้สึกความผิด และพยายามบรรเทาผลร้ายที่เกิดขึ้น หรือเหตุอื่นอันควรปรานีแล้ว ศาล จะพิพากษาว่าผู้นั้นมีความผิดแต่รอการกําหนดโทษหรือกําหนดโทษแต่รอการลงโทษไว้ ไม่ว่า จะเป็นโทษจําคุกหรือปรับอย่างหนึ่งอย่างใดหรือทั้งสองอย่าง เพื่อให้โอกาสกลับตัวภายในระยะ เวลาที่ศาลจะได้กําหนดแต่ต้องไม่เกินห้าปีนับแต่วันที่ศาลพิพากษา โดยจะกําหนดเงื่อนไขเพื่อ คุมความประพฤติของผู้นั้นด้วยหรือไม่ก็ได้ เงื่อนไขเพื่อคุมความประพฤติของผู้กระทําความผิดตามวรรคหนึ่ง ศาลอาจ กําหนดข้อเดียวหรือหลายข้อตามควรแก่กรณีได้ ดังต่อไปนี้ (๑) ให้ไปรายงานตัวต่อเจ้าพนักงานที่ศาลระบุไว้เป็นครั้งคราว เพื่อ เจ้าพนักงานจะได้สอบถาม แนะนํา ช่วยเหลือ หรือตักเตือนตามที่เห็นสมควรในเรื่องความ ประพฤติและการประกอบอาชีพ หรือจัดให้กระทํากิจกรรมบริการสังคมหรือสาธารณประโยชน์ (๒) ให้ฝึกหัดหรือทํางานอาชีพอันเป็นกิจจะลักษณะ (๓) ให้ละเว้นการคบหาสมาคมหรือการประพฤติใดอันอาจนําไปสู่การกระทํา ความผิดในทํานองเดียวกันอีก (๔) ให้ไปรับการบําบัดรักษาการติดยาเสพติดให้โทษ ความบกพร่องทาง ร่างกายหรือจิตใจ หรือความเจ็บป่วยอย่างอื่น ณ สถานที่และตามระยะเวลาที่ศาลกําหนด (๕) ให้เข้ารับการฝึกอบรม ณ สถานที่และตามระยะเวลาที่ศาลกําหนด (๖) ห้ามออกนอกสถานที่อยู่อาศัย หรือห้ามเข้าในสถานที่ใดในระหว่างเวลาที่ ศาลกําหนด ทั้งนี้ จะใช้อุปกรณ์อิเล็กทรอนิกส์หรืออุปกรณ์อื่นใดที่สามารถใช้ตรวจสอบหรือ จํากัดการเดินทางด้วยก็ได้ (๗) ให้ชดใช้ค่าสินไหมทดแทนหรือเยียวยาความเสียหายโดยวิธีอื่นให้แก่ผู้ เสียหายตามที่ผู้กระทําความผิดและผู้เสียหายตกลงกัน ให้แก้ไขฟื้นฟูหรือเยียวยาความเสียหายที่เกิดแก่ทรัพยากรธรรมชาติ หรือ สิ่งแวดล้อม หรือชดใช้ค่าเสียหายเพื่อการดังกล่าว (๙) ให้ทําทัณฑ์บนโดยกําหนดจํานวนเงินตามที่ศาลเห็นสมควรว่าจะไม่ก่อ เหตุร้าย หรือก่อให้เกิดภยันตรายแก่บุคคลอื่นหรือทรัพย์สิน (๑๐) เงื่อนไขอื่น ๆ ตามที่ศาลเห็นสมควรกําหนดเพื่อแก้ไข ฟื้นฟู หรือป้องกันมิ ให้ผู้กระทําความผิดกระทําหรือมีโอกาสกระทําความผิดขึ้นอีก หรือเงื่อนไขในการเยียวยาผู้ เสียหายตามที่เห็นสมควร เงื่อนไขตามที่ศาลได้กําหนดตามความในวรรคสองนั้น ถ้าภายหลังความ ปรากฏแก่ศาลตามคําขอของผู้กระทําความผิด ผู้แทนโดยชอบธรรมของผู้นั้น ผู้อนุบาลของผู้ นั้น พนักงานอัยการหรือเจ้าพนักงานว่าพฤติการณ์ที่เกี่ยวแก่การควบคุมความประพฤติของผู้ กระทําความผิดได้เปลี่ยนแปลงไป เมื่อศาลเห็นสมควรศาลอาจแก้ไขเพิ่มเติมหรือเพิกถอนข้อ หนึ่งข้อใดเสียก็ได้ หรือจะกําหนดเงื่อนไขข้อใดตามที่กล่าวในวรรคสองที่ศาลยังมิได้กําหนดไว้ เพิ่มเติมขึ้นอีกก็ได้ หรือถ้ามีการกระทําผิดทัณฑ์บนให้นําบทบัญญัติมาตรา ๔๗ มาใช้บังคับโดย อนุโลม"},{"section":"มาตรา ๕๗","num":"57","text":"เมื่อความปรากฏแก่ศาลเอง หรือความปรากฏตามคําแถลงของ พนักงานอัยการหรือเจ้าพนักงานว่า ผู้กระทําความผิดไม่ปฏิบัติตามเงื่อนไขดังที่ศาลกําหนด ตามมาตรา ๕๖ ศาลอาจตักเตือนผู้กระทําความผิด หรือจะกําหนดการลงโทษที่ยังไม่ได้กําหนด หรือลงโทษซึ่งรอไว้นั้นก็ได้"},{"section":"มาตรา ๕๘","num":"58","text":"เมื่อความปรากฏแก่ศาลเอง หรือความปรากฏตามคําแถลงของ โจทก์หรือเจ้าพนักงานว่า ภายในเวลาที่ศาลกําหนดตามมาตรา ๕๖ ผู้ที่ถูกศาลพิพากษาได้ กระทําความผิดอันมิใช่ความผิดที่ได้กระทําโดยประมาทหรือความผิดลหุโทษ และศาล พิพากษาให้ลงโทษจําคุกสําหรับความผิดนั้น ให้ศาลที่พิพากษาคดีหลังกําหนดโทษที่รอการ กําหนดไว้ในคดีก่อนบวกเข้ากับโทษในคดีหลัง หรือบวกโทษที่รอการลงโทษไว้ในคดีก่อนเข้ากับ โทษในคดีหลัง แล้วแต่กรณี แต่ถ้าภายในเวลาที่ศาลได้กําหนดตามมาตรา ๕๖ ผู้นั้นมิได้กระทําความผิดดัง กล่าวมาในวรรคแรก ให้ผู้นั้นพ้นจากการที่จะถูกกําหนดโทษ หรือถูกลงโทษในคดีนั้น แล้วแต่ กรณี หมวด ๔ ความรับผิดในทางอาญา"},{"section":"มาตรา ๕๙","num":"59","text":"บุคคลจะต้องรับผิดในทางอาญาก็ต่อเมื่อได้กระทําโดยเจตนา เว้นแต่จะได้กระทําโดยประมาท ในกรณีที่กฎหมายบัญญัติให้ต้องรับผิดเมื่อได้กระทําโดย ประมาท หรือเว้นแต่ในกรณีที่กฎหมายบัญญัติไว้โดยแจ้งชัดให้ต้องรับผิดแม้ได้กระทําโดยไม่มี เจตนา กระทําโดยเจตนา ได้แก่กระทําโดยรู้สํานึกในการที่กระทําและในขณะเดียวกัน ผู้กระทําประสงค์ต่อผล หรือย่อมเล็งเห็นผลของการกระทํานั้น ถ้าผู้กระทํามิได้รู้ข้อเท็จจริงอันเป็นองค์ประกอบของความผิด จะถือว่าผู้ กระทําประสงค์ต่อผล หรือย่อมเล็งเห็นผลของการกระทํานั้นมิได้ กระทําโดยประมาท ได้แก่กระทําความผิดมิใช่โดยเจตนา แต่กระทําโดย ปราศจากความระมัดระวังซึ่งบุคคลในภาวะเช่นนั้นจักต้องมีตามวิสัยและพฤติการณ์ และผู้ กระทําอาจใช้ความระมัดระวังเช่นว่านั้นได้ แต่หาได้ใช้ให้เพียงพอไม่ การกระทํา ให้หมายความรวมถึงการให้เกิดผลอันหนึ่งอันใดขึ้นโดยงดเว้นการ ที่จักต้องกระทําเพื่อป้องกันผลนั้นด้วย"},{"section":"มาตรา ๖๐","num":"60","text":"ผู้ใดเจตนาที่จะกระทําต่อบุคคลหนึ่ง แต่ผลของการกระทําเกิดแก่ อีกบุคคลหนึ่งโดยพลาดไป ให้ถือว่าผู้นั้นกระทําโดยเจตนาแก่บุคคลซึ่งได้รับผลร้ายจากการ กระทํานั้น แต่ในกรณีที่กฎหมายบัญญัติให้ลงโทษหนักขึ้นเพราะฐานะของบุคคลหรือเพราะ ความสัมพันธ์ระหว่างผู้กระทํากับบุคคลที่ได้รับผลร้าย มิให้นํากฎหมายนั้น มาใช้บังคับเพื่อลง โทษผู้กระทําให้หนักขึ้น"},{"section":"มาตรา ๖๑","num":"61","text":"ผู้ใดเจตนาจะกระทําต่อบุคคลหนึ่ง แต่ได้กระทําต่ออีกบุคคลหนึ่ง โดยสําคัญผิด ผู้นั้นจะยกเอาความสําคัญผิดเป็นข้อแก้ตัวว่ามิได้กระทําโดยเจตนาหาได้ไม่"},{"section":"มาตรา ๖๒","num":"62","text":"ข้อเท็จจริงใด ถ้ามีอยู่จริงจะทําให้การกระทําไม่เป็นความผิด หรือ ทําให้ผู้กระทําไม่ต้องรับโทษ หรือได้รับโทษน้อยลง แม้ข้อเท็จจริงนั้นจะไม่มีอยู่จริง แต่ผู้กระทํา สําคัญผิดว่ามีอยู่จริง ผู้กระทําย่อมไม่มีความผิด หรือได้รับยกเว้นโทษ หรือได้รับโทษน้อยลง แล้วแต่กรณี ถ้าความไม่รู้ข้อเท็จจริงตามความในวรรคสามแห่งมาตรา ๕๙ หรือความ สําคัญผิดว่ามีอยู่จริงตามความในวรรคแรก ได้เกิดขึ้นด้วยความประมาทของผู้กระทําความผิด ให้ผู้กระทํารับผิดฐานกระทําโดยประมาท ในกรณีที่กฎหมายบัญญัติไว้โดยเฉพาะว่า การ กระทํานั้นผู้กระทําจะต้องรับโทษแม้กระทําโดยประมาท บุคคลจะต้องรับโทษหนักขึ้นโดยอาศัยข้อเท็จจริงใด บุคคลนั้นจะต้องได้รู้ข้อ เท็จจริงนั้น"},{"section":"มาตรา ๖๓","num":"63","text":"ถ้าผลของการกระทําความผิดใดทําให้ผู้กระทําต้องรับโทษหนัก ขึ้น ผลของการกระทําความผิดนั้นต้องเป็นผลที่ตามธรรมดาย่อมเกิดขึ้นได้"},{"section":"มาตรา ๖๔","num":"64","text":"บุคคลจะแก้ตัวว่าไม่รู้กฎหมายเพื่อให้พ้นจากความรับผิดในทาง อาญาไม่ได้ แต่ถ้าศาลเห็นว่า ตามสภาพและพฤติการณ์ ผู้กระทําความผิดอาจจะไม่รู้ว่า กฎหมายบัญญัติว่าการกระทํานั้นเป็นความผิด ศาลอาจอนุญาตให้แสดงพยานหลักฐาน ต่อศาล และถ้าศาลเชื่อว่า ผู้กระทําไม่รู้ว่ากฎหมายบัญญัติไว้เช่นนั้น ศาลจะลงโทษน้อยกว่าที่ กฎหมายกําหนดไว้สําหรับความผิดนั้นเพียงใดก็ได้"},{"section":"มาตรา ๖๕","num":"65","text":"ผู้ใดกระทําความผิดในขณะไม่สามารถรู้ผิดชอบหรือไม่สามารถ บังคับตนเองได้เพราะมีจิตบกพร่อง โรคจิตหรือจิตฟั่ นเฟือน ผู้นั้นไม่ต้องรับโทษสําหรับความ ผิดนั้น แต่ถ้าผู้กระทําความผิดยังสามารถรู้ผิดชอบอยู่บ้าง หรือยังสามารถบังคับตน เองได้บ้าง ผู้นั้นต้องรับโทษสําหรับความผิดนั้น แต่ศาลจะลงโทษน้อยกว่าที่กฎหมายกําหนดไว้ สําหรับความผิดนั้นเพียงใดก็ได้"},{"section":"มาตรา ๖๖","num":"66","text":"ความมึนเมาเพราะเสพสุราหรือสิ่งเมาอย่างอื่นจะยกขึ้นเป็นข้อแก้ ตัวตามมาตรา ๖๕ ไม่ได้ เว้นแต่ความมึนเมานั้นจะได้เกิดโดยผู้เสพไม่รู้ว่าสิ่งนั้นจะทําให้มึนเมา หรือได้เสพโดยถูกขืนใจให้เสพ และได้กระทําความผิดในขณะไม่สามารถรู้ผิดชอบ หรือไม่ สามารถบังคับตนเองได้ ผู้กระทําความผิดจึงจะได้รับยกเว้นโทษสําหรับความผิดนั้น แต่ถ้าผู้นั้น ยังสามารถรู้ผิดชอบอยู่บ้าง หรือยังสามารถบังคับตนเองได้บ้าง ศาลจะลงโทษน้อยกว่าที่ กฎหมายกําหนดไว้สําหรับความผิดนั้นเพียงใดก็ได้"},{"section":"มาตรา ๖๗","num":"67","text":"ผู้ใดกระทําความผิดด้วยความจําเป็น (๑) เพราะอยู่ในที่บังคับหรือภายใต้อํานาจซึ่งไม่สามารถหลีกเลี่ยงหรือขัดขืน ได้ หรือ (๒) เพราะเพื่อให้ตนเองหรือผู้อื่นพ้นจากภยันตรายที่ใกล้จะถึงและไม่สามารถ หลีกเลี่ยงให้พ้นโดยวิธีอื่นใดได้ เมื่อภยันตรายนั้นตนมิได้ก่อให้เกิดขึ้นเพราะความผิดของตน ถ้าการกระทํานั้นไม่เป็นการเกินสมควรแก่เหตุแล้ว ผู้นั้นไม่ต้องรับโทษ"},{"section":"มาตรา ๖๘","num":"68","text":"ผู้ใดจําต้องกระทําการใดเพื่อป้องกันสิทธิของตน หรือของผู้อื่น ให้พ้นภยันตรายซึ่งเกิดจากการประทุษร้ายอันละเมิดต่อกฎหมาย และเป็นภยันตรายที่ใกล้จะ ถึง ถ้าได้กระทําพอสมควรแก่เหตุ การกระทํานั้นเป็นการป้องกันโดยชอบด้วยกฎหมาย ผู้นั้นไม่ มีความผิด"},{"section":"มาตรา ๖๙","num":"69","text":"ในกรณีที่บัญญัติไว้ในมาตรา ๖๗ และมาตรา ๖๘ นั้น ถ้าผู้กระทํา ได้กระทําไปเกินสมควรแก่เหตุหรือเกินกว่ากรณีแห่งความจําเป็น หรือเกินกว่ากรณีแห่งการ จําต้องกระทําเพื่อป้องกัน ศาลจะลงโทษน้อยกว่าที่กฎหมายกําหนดไว้สําหรับความผิดนั้นเพียง ใดก็ได้ แต่ถ้าการกระทํานั้นเกิดขึ้นจากความตื่นเต้น ความตกใจ หรือความกลัว ศาลจะไม่ลง โทษผู้กระทําก็ได้"},{"section":"มาตรา ๗๐","num":"70","text":"ผู้ใดกระทําตามคําสั่งของเจ้าพนักงาน แม้คําสั่งนั้นจะมิชอบด้วย กฎหมาย ถ้าผู้กระทํามีหน้าที่หรือเชื่อโดยสุจริตว่ามีหน้าที่ต้องปฏิบัติตาม ผู้นั้นไม่ต้องรับโทษ เว้นแต่จะรู้ว่าคําสั่งนั้นเป็นคําสั่งซึ่งมิชอบด้วยกฎหมาย"},{"section":"มาตรา ๗๑","num":"71","text":"ความผิดตามที่บัญญัติไว้ในมาตรา ๓๓๔ ถึงมาตรา ๓๓๖ วรรค แรก และมาตรา ๓๔๑ ถึงมาตรา ๓๖๔ นั้น ถ้าเป็นการกระทําที่สามีกระทําต่อภริยา หรือภริยา กระทําต่อสามี ผู้กระทําไม่ต้องรับโทษ ความผิดดังระบุมานี้ ถ้าเป็นการกระทําที่ผู้บุพการีกระทําต่อผู้สืบสันดาน ผู้ สืบสันดานกระทําต่อผู้บุพการี หรือพี่หรือน้องร่วมบิดามารดาเดียวกันกระทําต่อกัน แม้ กฎหมายมิได้บัญญัติให้เป็นความผิดอันยอมความได้ ก็ให้เป็นความผิดอันยอมความได้ และ นอกจากนั้น ศาลจะลงโทษน้อยกว่าที่กฎหมายกําหนดไว้สําหรับความผิดนั้นเพียงใดก็ได้"},{"section":"มาตรา ๗๒","num":"72","text":"ผู้ใดบันดาลโทสะโดยถูกข่มเหงอย่างร้ายแรงด้วยเหตุอันไม่เป็น ธรรม จึงกระทําความผิดต่อผู้ข่มเหงในขณะนั้น ศาลจะลงโทษผู้นั้นน้อยกว่าที่กฎหมายกําหนด ไว้สําหรับความผิดนั้นเพียงใดก็ได้"},{"section":"มาตรา ๗๓","num":"73","text":"เด็กอายุยังไม่เกินสิบสองปี กระทําการอันกฎหมายบัญญัติ เป็นความผิด เด็กนั้นไม่ต้องรับโทษ ให้พนักงานสอบสวนส่งตัวเด็กตามวรรคหนึ่งให้พนักงานเจ้าหน้าที่ตาม กฎหมายว่าด้วยการคุ้มครองเด็ก เพื่อดําเนินการคุ้มครองสวัสดิภาพตามกฎหมายว่าด้วยการ นั้น"},{"section":"มาตรา ๗๔","num":"74","text":"เด็กอายุกว่าสิบสองปีแต่ยังไม่เกินสิบห้าปี กระทําการอัน กฎหมายบัญญัติเป็นความผิด เด็กนั้นไม่ต้องรับโทษ แต่ให้ศาลมีอํานาจที่จะดําเนินการ ดังต่อ ไปนี้ (๑) ว่ากล่าวตักเตือนเด็กนั้นแล้วปล่อยตัวไป และถ้าศาลเห็นสมควรจะเรียก บิดา มารดา ผู้ปกครอง หรือบุคคลที่เด็กนั้นอาศัยอยู่มาตักเตือนด้วยก็ได้ (๒) ถ้าศาลเห็นว่าบิดา มารดา หรือผู้ปกครองสามารถดูแลเด็กนั้นได้ ศาลจะมี คําสั่งให้มอบตัวเด็กนั้นให้แก่บิดา มารดา หรือผู้ปกครองไป โดยวางข้อกําหนดให้บิดา มารดา หรือผู้ปกครองระวังเด็กนั้นไม่ให้ก่อเหตุร้ายตลอดเวลาที่ศาลกําหนดซึ่งต้องไม่เกินสามปีและ กําหนดจํานวนเงินตามที่เห็นสมควรซึ่งบิดา มารดา หรือผู้ปกครองจะต้องชําระต่อศาลไม่เกิน ครั้งละหนึ่งหมื่นบาท ในเมื่อเด็กนั้นก่อเหตุร้ายขึ้น แต่ถ้าเด็กนั้นอาศัยอยู่กับบุคคลอื่นนอกจาก บิดา มารดา หรือผู้ปกครอง และศาลเห็นว่าไม่สมควรจะเรียกบิดา มารดา หรือผู้ปกครองมา วางข้อกําหนดดังกล่าวข้างต้น ศาลจะเรียกตัวบุคคลที่เด็กนั้นอาศัยอยู่มาสอบถามว่าจะยอมรับ ข้อกําหนดทํานองที่บัญญัติไว้สําหรับบิดา มารดา หรือผู้ปกครองดังกล่าวมาข้างต้นหรือไม่ก็ได้ ถ้าบุคคลที่เด็กนั้นอาศัยอยู่ยอมรับข้อกําหนดเช่นว่านั้น ก็ให้ศาลมีคําสั่งมอบตัวเด็กให้แก่บุคคล นั้นไปโดยวางข้อกําหนดดังกล่าว (๓) ส่งตัวเด็กนั้นไปยังสถานศึกษา หรือสถานฝึกและอบรม หรือสถานแนะนํา ทางจิต หรือสถานที่ซึ่งจัดตั้งขึ้นเพื่อฝึกและอบรมเด็ก ตลอดระยะเวลาที่ศาลกําหนด แต่ไม่ให้ เกินกว่าวันที่เด็กนั้นจะมีอายุครบสิบแปดปี ในกรณีที่ศาลมอบตัวเด็กให้แก่บิดา มารดา ผู้ปกครอง หรือบุคคลที่เด็กนั้น อาศัยอยู่ ตาม (๒) ศาลจะกําหนดเงื่อนไขเพื่อคุมความประพฤติเด็กนั้นเช่นเดียวกับที่บัญญัติไว้ ในมาตรา ๕๖ ด้วยก็ได้ ในกรณีเช่นว่านี้ ให้ศาลแต่งตั้งพนักงานคุมประพฤติหรือพนักงานอื่นใด เพื่อคุมความประพฤติเด็กนั้น ในกรณีที่เด็กนั้นไม่มีบิดา มารดา หรือผู้ปกครอง หรือมีแต่ศาลเห็นว่าไม่ สามารถดูแลเด็กนั้นได้ หรือในกรณีที่เด็กอาศัยอยู่กับบุคคลอื่นนอกจากบิดา มารดา หรือผู้ ปกครอง และบุคคลนั้นไม่ยอมรับข้อกําหนดดังกล่าวใน (๒) ศาลจะมีคําสั่งให้มอบตัวเด็กนั้นให้ อยู่กับบุคคลหรือองค์การที่ศาลเห็นสมควรเพื่อดูแล อบรม และสั่งสอนตามระยะเวลาที่ศาล กําหนดก็ได้ในเมื่อบุคคลหรือองค์การนั้นยินยอม ในกรณีเช่นว่านี้ ให้บุคคลหรือองค์การนั้นมี อํานาจเช่นผู้ปกครองเฉพาะเพื่อดูแล อบรม และสั่งสอน รวมตลอดถึงการกําหนดที่อยู่และการ จัดให้เด็กมีงานทําตามสมควรหรือให้ดําเนินการคุ้มครองสวัสดิภาพเด็กตามกฎหมายว่าด้วย การนั้นก็ได้ คําสั่งของศาลดังกล่าวใน (๓) วรรคสอง และวรรคสามนั้น ถ้าในขณะใด ภายในระยะเวลาที่ศาลกําหนดไว้ ความปรากฏแก่ศาลโดยศาลรู้เองหรือตามคําเสนอของผู้มี ส่วนได้เสีย พนักงานอัยการ หรือบุคคลหรือองค์การที่ศาลมอบตัวเด็กเพื่อดูแล อบรม และ สั่งสอน หรือเจ้าพนักงานว่าพฤติการณ์เกี่ยวกับคําสั่งนั้นได้เปลี่ยนแปลงไป ก็ให้ศาลมีอํานาจ เปลี่ยนแปลงแก้ไขคําสั่งนั้นหรือมีคําสั่งใหม่ตามอํานาจในมาตรานี้"},{"section":"มาตรา ๗๕","num":"75","text":"ผู้ใดอายุกว่าสิบห้าปีแต่ต่ำกว่าสิบแปดปี กระทําการอัน กฎหมายบัญญัติเป็นความผิด ให้ศาลพิจารณาถึงความรู้ผิดชอบและสิ่งอื่นทั้งปวงเกี่ยวกับผู้นั้น ในอันที่จะควรวินิจฉัยว่าสมควรพิพากษาลงโทษผู้นั้นหรือไม่ ถ้าศาลเห็นว่าไม่สมควรพิพากษา ลงโทษก็ให้จัดการตามมาตรา ๗๔ หรือถ้าศาลเห็นว่าสมควรพิพากษาลงโทษ ก็ให้ลดมาตรา ส่วนโทษที่กําหนดไว้สําหรับความผิดลงกึ่งหนึ่ง"},{"section":"มาตรา ๗๖","num":"76","text":"ผู้ใดอายุตั้งแต่สิบแปดปีแต่ยังไม่เกินยี่สิบปี กระทําการอัน กฎหมายบัญญัติเป็นความผิด ถ้าศาลเห็นสมควรจะลดมาตราส่วนโทษที่กําหนดไว้สําหรับความ ผิดนั้นลงหนึ่งในสามหรือกึ่งหนึ่งก็ได้"},{"section":"มาตรา ๗๗","num":"77","text":"ในกรณีที่ศาลวางข้อกําหนดให้บิดามารดา ผู้ปกครองหรือบุคคล ที่เด็กนั้นอาศัยอยู่ ระวังเด็กนั้นไม่ให้ก่อเหตุร้ายตามความในมาตรา ๗๔ (๒) ถ้าเด็กนั้นก่อ เหตุร้ายขึ้นภายในเวลาในข้อกําหนด ศาลมีอํานาจบังคับบิดามารดา ผู้ปกครองหรือบุคคลที่เด็ก นั้นอาศัยอยู่ ให้ชําระเงินไม่เกินจํานวนในข้อกําหนดนั้น ภายในเวลาที่ศาลเห็นสมควร ถ้า บิดามารดา ผู้ปกครองหรือบุคคลที่เด็กนั้นอาศัยอยู่ไม่ชําระเงิน ศาลจะสั่งให้ยึดทรัพย์สินของ บิดามารดา ผู้ปกครองหรือบุคคลที่เด็กนั้นอาศัยอยู่ เพื่อใช้เงินที่จะต้องชําระก็ได้ ในกรณีที่ศาลได้บังคับให้บิดามารดา ผู้ปกครองหรือบุคคลที่เด็กนั้นอาศัยอยู่ ชําระเงินตามข้อกําหนดแล้วนั้น ถ้าศาลมิได้เปลี่ยนแปลงแก้ไขคําสั่งที่ได้วางข้อกําหนดนั้นเป็น อย่างอื่นตามความในมาตรา ๗๔ วรรคท้าย ก็ให้ข้อกําหนดนั้นคงใช้บังคับได้ต่อไปจนสิ้นเวลาที่ กําหนดไว้ในข้อกําหนดนั้น"},{"section":"มาตรา ๗๘","num":"78","text":"เมื่อปรากฏว่ามีเหตุบรรเทาโทษ ไม่ว่าจะได้มีการเพิ่มหรือการ ลดโทษตามบทบัญญัติแห่งประมวลกฎหมายนี้ หรือกฎหมายอื่นแล้วหรือไม่ ถ้าศาลเห็นสมควร จะลดโทษไม่เกินกึ่งหนึ่งของโทษที่จะลงแก่ผู้กระทําความผิดนั้นก็ได้ เหตุบรรเทาโทษนั้นได้แก่ผู้กระทําความผิดเป็นผู้โฉดเขลาเบาปัญญาตกอยู่ใน ความทุกข์อย่างสาหัส มีคุณความดีมาแต่ก่อน รู้สึกความผิดและพยายามบรรเทาผลร้ายแห่ง ความผิดนั้น ลุแก่โทษต่อเจ้าพนักงานหรือให้ความรู้แก่ศาลอันเป็นประโยชน์แก่การพิจารณา หรือเหตุอื่นที่ศาลเห็นว่ามีลักษณะทํานองเดียวกัน"},{"section":"มาตรา ๗๙","num":"79","text":"ในคดีที่มีโทษปรับสถานเดียว ถ้าผู้ที่ต้องหาว่ากระทําความผิด นําค่าปรับในอัตราอย่างสูงสําหรับความผิดนั้นมาชําระก่อนที่ศาลเริ่มต้นสืบพยาน ให้คดีนั้นเป็น อันระงับไป หมวด ๕ การพยายามกระทําความผิด"},{"section":"มาตรา ๘๐","num":"80","text":"ผู้ใดลงมือกระทําความผิดแต่กระทําไปไม่ตลอด หรือกระทําไป ตลอดแล้วแต่การกระทํานั้นไม่บรรลุผลผู้นั้นพยายามกระทําความผิด ผู้ใดพยายามกระทําความผิด ผู้นั้นต้องระวางโทษสองในสามส่วนของโทษที่ กฎหมายกําหนดไว้สําหรับความผิดนั้น"},{"section":"มาตรา ๘๑","num":"81","text":"ผู้ใดกระทําการโดยมุ่งต่อผลซึ่งกฎหมายบัญญัติเป็นความผิด แต่ การกระทํานั้นไม่สามารถจะบรรลุผลได้อย่างแน่แท้ เพราะเหตุปัจจัยซึ่งใช้ในการกระทําหรือเหตุ แห่งวัตถุที่มุ่งหมายกระทําต่อ ให้ถือว่าผู้นั้นพยายามกระทําความผิด แต่ให้ลงโทษไม่เกินกึ่งหนึ่ง ของโทษที่กฎหมายกําหนดไว้สําหรับความผิดนั้น ถ้าการกระทําดังกล่าวในวรรคแรกได้กระทําไปโดยความเชื่ออย่างงมงาย ศาลจะไม่ลงโทษก็ได้"},{"section":"มาตรา ๘๒","num":"82","text":"ผู้ใดพยายามกระทําความผิด หากยับยั้งเสียเองไม่กระทําการให้ ตลอด หรือกลับใจแก้ไขไม่ให้การกระทํานั้นบรรลุผล ผู้นั้นไม่ต้องรับโทษสําหรับการพยายาม กระทําความผิดนั้น แต่ถ้าการที่ได้กระทําไปแล้วต้องตามบทกฎหมายที่บัญญัติเป็นความผิด ผู้ นั้นต้องรับโทษสําหรับความผิดนั้น ๆ หมวด ๖ ตัวการและผู้สนับสนุน"},{"section":"มาตรา ๘๓","num":"83","text":"ในกรณีความผิดใดเกิดขึ้นโดยการกระทําของบุคคลตั้งแต่สองคน ขึ้นไป ผู้ที่ได้ร่วมกระทําความผิดด้วยกันนั้นเป็นตัวการ ต้องระวางโทษตามที่กฎหมายกําหนดไว้ สําหรับความผิดนั้น"},{"section":"มาตรา ๘๔","num":"84","text":"ผู้ใดก่อให้ผู้อื่นกระทําความผิดไม่ว่าด้วยการใช้ บังคับ ขู่เข็ญ จ้าง วาน หรือยุยงส่งเสริม หรือด้วยวิธีอื่นใด ผู้นั้นเป็นผู้ใช้ให้กระทําความผิด ถ้าความผิดมิได้กระทําลงไม่ว่าจะเป็นเพราะผู้ถูกใช้ไม่ยอมกระทํา ยังไม่ได้ กระทํา หรือเหตุอื่นใด ผู้ใช้ต้องระวางโทษเพียงหนึ่งในสามของโทษที่กําหนดไว้สําหรับความผิด นั้น ถ้าผู้ถูกใช้ได้กระทําความผิดนั้น ผู้ใช้ต้องรับโทษเสมือนเป็นตัวการ และถ้าผู้ ถูกใช้เป็นบุคคลอายุไม่เกินสิบแปดปี ผู้พิการ ผู้ทุพพลภาพ ลูกจ้างหรือผู้ที่อยู่ใต้บังคับบัญชา ของผู้ใช้ ผู้ที่มีฐานะยากจน หรือผู้ต้องพึ่งพาผู้ใช้เพราะเหตุป่วยเจ็บหรือไม่ว่าทางใด ให้เพิ่มโทษ ที่จะลงแก่ผู้ใช้กึ่งหนึ่งของโทษที่ศาลกําหนดสําหรับผู้นั้น"},{"section":"มาตรา ๘๕","num":"85","text":"ผู้ใดโฆษณาหรือประกาศแก่บุคคลทั่วไปให้กระทําความผิดและ ความผิดนั้นมีกําหนดโทษไม่ต่ำกว่าหกเดือน ผู้นั้นต้องระวางโทษกึ่งหนึ่งของโทษที่กําหนดไว้ สําหรับความผิดนั้น ถ้าได้มีการกระทําความผิด เพราะเหตุที่ได้มีการโฆษณาหรือประกาศตาม ความในวรรคแรก ผู้โฆษณาหรือประกาศต้องรับโทษเสมือนเป็นตัวการ"},{"section":"มาตรา ๘๕/๑","num":"85/1","text":"ถ้าผู้ถูกใช้ตามมาตรา ๘๔ หรือผู้กระทําตามคําโฆษณา หรือ ประกาศแก่บุคคลทั่วไปให้กระทําความผิดตามมาตรา ๘๕ ได้ให้ข้อมูลสําคัญอันเป็นการเปิดเผย ถึงการกระทําความผิดของผู้ใช้ให้กระทําความผิดหรือผู้โฆษณาหรือประกาศแก่บุคคลทั่วไปให้ กระทําความผิด และเป็นประโยชน์อย่างยิ่งต่อการดําเนินคดีแก่บุคคลดังกล่าว ศาลจะลงโทษผู้ นั้นน้อยกว่าอัตราโทษขั้นต่ำที่กําหนดไว้สําหรับความผิดนั้นเพียงใดก็ได้"},{"section":"มาตรา ๘๖","num":"86","text":"ผู้ใดกระทําด้วยประการใด ๆ อันเป็นการช่วยเหลือ หรือให้ความ สะดวกในการที่ผู้อื่นกระทําความผิดก่อนหรือขณะกระทําความผิด แม้ผู้กระทําความผิดจะมิได้ รู้ถึงการช่วยเหลือหรือให้ความสะดวกนั้นก็ตาม ผู้นั้นเป็นผู้สนับสนุนการกระทําความผิด ต้อง ระวางโทษสองในสามส่วนของโทษที่กําหนดไว้สําหรับความผิดที่สนับสนุนนั้น"},{"section":"มาตรา ๘๗","num":"87","text":"ในกรณีที่มีการกระทําความผิดเพราะมีผู้ใช้ให้กระทําตามมาตรา ๘๔ เพราะมีผู้โฆษณาหรือประกาศแก่บุคคลทั่วไปให้กระทําความผิดตามมาตรา ๘๕ หรือโดยมี ผู้สนับสนุนตามมาตรา ๘๖ ถ้าความผิดที่เกิดขึ้นนั้น ผู้กระทําได้กระทําไปเกินขอบเขตที่ใช้หรือที่ โฆษณาหรือประกาศ หรือเกินไปจากเจตนาของผู้สนับสนุน ผู้ใช้ให้กระทําความผิด ผู้โฆษณา หรือประกาศแก่บุคคลทั่วไปให้กระทําความผิดหรือผู้สนับสนุนการกระทําความผิด แล้วแต่กรณี ต้องรับผิดทางอาญาเพียงสําหรับความผิดเท่าที่อยู่ในขอบเขตที่ใช้หรือที่โฆษณาหรือประกาศ หรืออยู่ในขอบเขตแห่งเจตนาของผู้สนับสนุนการกระทําความผิดเท่านั้น แต่ถ้าโดยพฤติการณ์ อาจเล็งเห็นได้ว่า อาจเกิดการกระทําความผิดเช่นที่เกิดขึ้นนั้นได้จากการใช้ การโฆษณา หรือ ประกาศหรือการสนับสนุนผู้ใช้ให้กระทําความผิด ผู้โฆษณาหรือประกาศแก่บุคคลทั่วไปให้ กระทําความผิด หรือผู้สนับสนุนการกระทําความผิด แล้วแต่กรณี ต้องรับผิดทางอาญาตาม ความผิดที่เกิดขึ้นนั้น ในกรณีที่ผู้ถูกใช้ ผู้กระทําตามคําโฆษณา หรือประกาศแก่บุคคลทั่วไปให้ กระทําความผิด หรือตัวการในความผิด จะต้องรับผิดทางอาญามีกําหนดโทษสูงขึ้นเพราะ อาศัยผลที่เกิดจากการกระทําความผิด ผู้ใช้ให้กระทําความผิด ผู้โฆษณาหรือประกาศแก่บุคคล ทั่วไปให้กระทําความผิด หรือผู้สนับสนุนการกระทําความผิด แล้วแต่กรณี ต้องรับผิดทางอาญา ตามความผิดที่มีกําหนดโทษสูงขึ้นนั้นด้วย แต่ถ้าโดยลักษณะของความผิด ผู้กระทําจะต้องรับ ผิดทางอาญามีกําหนดโทษสูงขึ้นเฉพาะเมื่อผู้กระทําต้องรู้ หรืออาจเล็งเห็นได้ว่าจะเกิดผลเช่น นั้นขึ้น ผู้ใช้ให้กระทําความผิด ผู้โฆษณาหรือประกาศแก่บุคคลทั่วไปให้กระทําความผิด หรือผู้ สนับสนุนการกระทําความผิด จะต้องรับผิดทางอาญาตามความผิดที่มีกําหนดโทษสูงขึ้นก็ เฉพาะเมื่อตนได้รู้ หรืออาจเล็งเห็นได้ว่าจะเกิดผลเช่นที่เกิดขึ้นนั้น"},{"section":"มาตรา ๘๘","num":"88","text":"ถ้าความผิดที่ได้ใช้ ที่ได้โฆษณาหรือประกาศแก่บุคคลทั่วไปให้ กระทํา หรือที่ได้สนับสนุนให้กระทํา ได้กระทําถึงขั้นลงมือกระทําความผิด แต่เนื่องจากการเข้า ขัดขวางของผู้ใช้ ผู้โฆษณาหรือประกาศหรือผู้สนับสนุน ผู้กระทําได้กระทําไปไม่ตลอด หรือ กระทําไปตลอดแล้ว แต่การกระทํานั้นไม่บรรลุผล ผู้ใช้หรือผู้โฆษณาหรือประกาศ คงรับผิด เพียงที่บัญญัติไว้ในมาตรา ๘๔ วรรคสอง หรือมาตรา ๘๕ วรรคแรก แล้วแต่กรณี ส่วนผู้ สนับสนุนนั้นไม่ต้องรับโทษ"},{"section":"มาตรา ๘๙","num":"89","text":"ถ้ามีเหตุส่วนตัวอันควรยกเว้นโทษ ลดโทษหรือเพิ่มโทษแก่ผู้ กระทําความผิดคนใด จะนําเหตุนั้นไปใช้แก่ผู้กระทําความผิดคนอื่นในการกระทําความผิดนั้น ด้วยไม่ได้ แต่ถ้าเหตุอันควรยกเว้นโทษ ลดโทษหรือเพิ่มโทษเป็นเหตุในลักษณะคดี จึงให้ใช้แก่ผู้ กระทําความผิดในการกระทําความผิดนั้นด้วยกันทุกคน หมวด ๗ การกระทําความผิดหลายบทหรือหลายกระทง"},{"section":"มาตรา ๙๐","num":"90","text":"เมื่อการกระทําใดอันเป็นกรรมเดียวเป็นความผิดต่อกฎหมาย หลายบท ให้ใช้กฎหมายบทที่มีโทษหนักที่สุดลงโทษแก่ผู้กระทําความผิด"},{"section":"มาตรา ๙๑","num":"91","text":"เมื่อปรากฏว่าผู้ใดได้กระทําการอันเป็นความผิดหลาย กรรมต่างกัน ให้ศาลลงโทษผู้นั้นทุกกรรมเป็นกระทงความผิดไป แต่ไม่ว่าการเพิ่มโทษ ลดโทษ หรือลดมาตราส่วนโทษด้วยหรือไม่ก็ตาม เมื่อรวมโทษทุกกระทงแล้ว โทษจําคุกทั้งสิ้นต้องไม่ เกินกําหนดดังต่อไปนี้ (๑) สิบปี สําหรับกรณีความผิดกระทงที่หนักที่สุดมีอัตราโทษจําคุกอย่างสูงไม่ เกินสามปี (๒) ยี่สิบปี สําหรับกรณีความผิดกระทงที่หนักที่สุดมีอัตราโทษจําคุกอย่างสูง เกินสามปีแต่ไม่เกินสิบปี (๓) ห้าสิบปี สําหรับกรณีความผิดกระทงที่หนักที่สุดมีอัตราโทษจําคุกอย่างสูง เกินสิบปีขึ้นไป เว้นแต่กรณีที่ศาลลงโทษจําคุกตลอดชีวิต หมวด ๘ การกระทําความผิดอีก"},{"section":"มาตรา ๙๒","num":"92","text":"ผู้ใดต้องคําพิพากษาถึงที่สุดให้ลงโทษจําคุก ถ้าและได้กระทํา ความผิดใด ๆ อีกในระหว่างที่ยังจะต้องรับโทษอยู่ก็ดี ภายในเวลาห้าปีนับแต่วันพ้นโทษก็ดี หากศาลจะพิพากษาลงโทษครั้งหลังถึงจําคุก ก็ให้เพิ่มโทษที่จะลงแก่ผู้นั้นหนึ่งในสามของโทษที่ ศาลกําหนดสําหรับความผิดครั้งหลัง"},{"section":"มาตรา ๙๓","num":"93","text":"ผู้ใดต้องคําพิพากษาถึงที่สุดให้ลงโทษจําคุก ถ้าและได้กระทํา ความผิดอย่างหนึ่งอย่างใดที่จําแนกไว้ในอนุมาตราต่อไปนี้ซ้ำในอนุมาตราเดียวกันอีกใน ระหว่างที่ยังจะต้องรับโทษอยู่ก็ดี ภายในเวลาสามปีนับแต่วันพ้นโทษก็ดี ถ้าความผิดครั้งแรก เป็นความผิดซึ่งศาลพิพากษาลงโทษจําคุกไม่น้อยกว่าหกเดือน หากศาลจะพิพากษาลงโทษ ครั้งหลังถึงจําคุก ก็ให้เพิ่มโทษที่จะลงแก่ผู้นั้นกึ่งหนึ่งของโทษที่ศาลกําหนดสําหรับความผิดครั้ง หลัง (๑) ความผิดเกี่ยวกับความมั่นคงแห่งราชอาณาจักร ตามที่บัญญัติไว้ใน"},{"section":"มาตรา ๙๔","num":"94","text":"ความผิดอันได้กระทําโดยประมาท ความผิดลหุโทษ และ ความผิดซึ่งผู้กระทําได้กระทําในขณะที่มีอายุต่ำกว่าสิบแปดปีนั้น ไม่ว่าจะได้กระทําในครั้งก่อน หรือครั้งหลัง ไม่ถือว่าเป็นความผิดเพื่อการเพิ่มโทษตามความในหมวดนี้ หมวด ๙ อายุความ"},{"section":"มาตรา ๙๕","num":"95","text":"ในคดีอาญา ถ้ามิได้ฟ้องและได้ตัวผู้กระทําความผิดมายังศาล ภายในกําหนดดังต่อไปนี้ นับแต่วันกระทําความผิด เป็นอันขาดอายุความ (๑) ยี่สิบปี สําหรับความผิดต้องระวางโทษประหารชีวิต จําคุกตลอดชีวิต หรือ จําคุกยี่สิบปี สิบห้าปี สําหรับความผิดต้องระวางโทษจําคุกกว่าเจ็ดปีแต่ยังไม่ถึงยี่สิบปี (๓) สิบปี สําหรับความผิดต้องระวางโทษจําคุกกว่าหนึ่งปีถึงเจ็ดปี (๔) ห้าปี สําหรับความผิดต้องระวางโทษจําคุกกว่าหนึ่งเดือนถึงหนึ่งปี (๕) หนึ่งปี สําหรับความผิดต้องระวางโทษจําคุกตั้งแต่หนึ่งเดือนลงมาหรือ ต้องระวางโทษอย่างอื่น ถ้าได้ฟ้องและได้ตัวผู้กระทําความผิดมายังศาลแล้ว ผู้กระทําความผิดหลบ หนีหรือวิกลจริต และศาลสั่งงดการพิจารณาไว้จนเกินกําหนดดังกล่าวแล้วนับแต่วันที่หลบหนี หรือวันที่ศาลสั่งงดการพิจารณา ก็ให้ถือว่าเป็นอันขาดอายุความเช่นเดียวกัน"},{"section":"มาตรา ๙๖","num":"96","text":"ภายใต้บังคับมาตรา ๙๕ ในกรณีความผิดอันยอมความได้ ถ้าผู้ เสียหายมิได้ร้องทุกข์ภายในสามเดือนนับแต่วันที่รู้เรื่องความผิดและรู้ตัวผู้กระทําความผิด เป็น อันขาดอายุความ"},{"section":"มาตรา ๙๗","num":"97","text":"ในการฟ้องขอให้กักกัน ถ้าจะฟ้องภายหลังการฟ้องคดีอันเป็นมูล ้ ให้เกิดอํานาจฟ้องขอให้กักกัน ต้องฟ้องภายในกําหนดหกเดือนนับแต่วันที่ฟ้องคดีนั้น มิฉะนั้น เป็นอันขาดอายุความ"},{"section":"มาตรา ๙๘","num":"98","text":"เมื่อได้มีคําพิพากษาถึงที่สุดให้ลงโทษผู้ใด ผู้นั้นยังมิได้รับโทษก็ดี ได้รับโทษแต่ยังไม่ครบถ้วนโดยหลบหนีก็ดี ถ้ายังมิได้ตัวผู้นั้นมาเพื่อรับโทษนับแต่วันที่มีคํา พิพากษาถึงที่สุด หรือนับแต่วันที่ผู้กระทําความผิดหลบหนี แล้วแต่กรณี เกินกําหนดเวลาดังต่อ ไปนี้ เป็นอันล่วงเลยการลงโทษ จะลงโทษผู้นั้นมิได้ (๑) ยี่สิบปี สําหรับโทษประหารชีวิต จําคุกตลอดชีวิตหรือจําคุกยี่สิบปี (๒) สิบห้าปี สําหรับโทษจําคุกกว่าเจ็ดปีแต่ยังไม่ถึงยี่สิบปี (๓) สิบปี สําหรับโทษจําคุกกว่าหนึ่งปีถึงเจ็ดปี ห้าปี สําหรับโทษจําคุกตั้งแต่หนึ่งปีลงมาหรือโทษอย่างอื่น"},{"section":"มาตรา ๙๙","num":"99","text":"การยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องในทรัพย์สินเพื่อใช้ค่า ปรับหรือการกักขังแทนค่าปรับ ถ้ามิได้ทําภายในกําหนดห้าปีนับแต่วันที่ได้มีคําพิพากษาถึงที่ สุด จะยึดทรัพย์สิน อายัดสิทธิเรียกร้องในทรัพย์สิน หรือกักขังไม่ได้ ความในวรรคหนึ่งมิให้ใช้บังคับในกรณีการกักขังแทนค่าปรับซึ่งทําต่อเนื่องกับ การลงโทษจําคุก"},{"section":"มาตรา ๑๐๐","num":"100","text":"เมื่อได้มีคําพิพากษาถึงที่สุดให้กักกันผู้ใด ถ้าผู้นั้นยังมิได้รับการ กักกันก็ดี ได้รับการกักกันแต่ยังไม่ครบถ้วนโดยหลบหนีก็ดี ถ้าพ้นกําหนดสามปีนับแต่วันที่ พ้นโทษโดยได้รับโทษตามคําพิพากษาแล้วโดยล่วงเลยการลงโทษหรือนับแต่วันที่ผู้นั้นหลบหนี ระหว่างเวลาที่ต้องกักกัน เป็นอันล่วงเลยการกักกัน จะกักกันผู้นั้นไม่ได้"},{"section":"มาตรา ๑๐๑","num":"101","text":"การบังคับตามคําสั่งของศาลตามความในมาตรา ๔๖ หรือการ ร้องขอให้ศาลสั่งให้ใช้เงินเมื่อผู้ทําทัณฑ์บนประพฤติผิดทัณฑ์บนตามความในมาตรา ๔๗ นั้น ถ้า มิได้บังคับหรือร้องขอภายในกําหนดสองปีนับแต่วันที่ศาลมีคําสั่งหรือนับแต่วันที่ผู้ทําทัณฑ์บน ประพฤติผิดทัณฑ์บน จะบังคับหรือร้องขอมิได้ ลักษณะ ๒ บทบัญญัติที่ใช้แก่ความผิดลหุโทษ"},{"section":"มาตรา ๑๐๒","num":"102","text":"ความผิดลหุโทษ คือ ความผิดซึ่งต้องระวางโทษจําคุกไม่เกิน หนึ่งเดือน หรือปรับไม่เกินหนึ่งหมื่นบาท หรือทั้งจําทั้งปรับ"},{"section":"มาตรา ๑๐๓","num":"103","text":"บทบัญญัติในลักษณะ ๑ ให้ใช้ในกรณีแห่งความผิดลหุโทษด้วย เว้นแต่ที่บัญญัติไว้ในสามมาตราต่อไปนี้"},{"section":"มาตรา ๑๐๔","num":"104","text":"การกระทําความผิดลหุโทษตามประมวลกฎหมายนี้ แม้กระทํา โดยไม่มีเจตนาก็เป็นความผิด เว้นแต่ตามบทบัญญัติความผิดนั้นจะมีความบัญญัติให้เห็นเป็น ้ อย่างอื่น"},{"section":"มาตรา ๑๐๕","num":"105","text":"ผู้ใดพยายามกระทําความผิดลหุโทษ ผู้นั้นไม่ต้องรับโทษ"},{"section":"มาตรา ๑๐๖","num":"106","text":"ผู้สนับสนุนในความผิดลหุโทษไม่ต้องรับโทษ ภาค ๒ ความผิด ลักษณะ ๑ ความผิดเกี่ยวกับความมั่นคงแห่งราชอาณาจักร หมวด ๑ ความผิดต่อองค์พระมหากษัตริย์ พระราชินี รัชทายาท และผู้สําเร็จราชการแทนพระองค์"},{"section":"มาตรา ๑๐๗","num":"107","text":"ผู้ใดปลงพระชนม์พระมหากษัตริย์ ต้องระวางโทษประหารชีวิต ผู้ใดพยายามกระทําการเช่นว่านั้น ต้องระวางโทษเช่นเดียวกัน ผู้ใดกระทําการใดอันเป็นการตระเตรียมเพื่อปลงพระชนม์พระมหากษัตริย์ หรือรู้ว่ามีผู้จะปลงพระชนม์พระมหากษัตริย์ กระทําการใดอันเป็นการช่วยปกปิดไว้ ต้องระวาง โทษจําคุกตลอดชีวิต"},{"section":"มาตรา ๑๐๘","num":"108","text":"ผู้ใดกระทําการประทุษร้ายต่อพระองค์หรือเสรีภาพของ พระมหากษัตริย์ ต้องระวางโทษประหารชีวิต หรือจําคุกตลอดชีวิต ผู้ใดพยายามกระทําการเช่นว่านั้น ต้องระวางโทษเช่นเดียวกัน ถ้าการกระทํานั้นมีลักษณะอันน่าจะเป็นอันตรายแก่พระชนม์ ผู้กระทําต้อง ระวางโทษประหารชีวิต ผู้ใดกระทําการใดอันเป็นการตระเตรียมเพื่อประทุษร้ายต่อพระองค์ หรือ เสรีภาพของพระมหากษัตริย์ หรือรู้ว่ามีผู้จะกระทําการประทุษร้ายต่อพระองค์ หรือเสรีภาพ ของพระมหากษัตริย์ กระทําการใดอันเป็นการช่วยปกปิดไว้ ต้องระวางโทษจําคุกตั้งแต่สิบหกปี ถึงยี่สิบปี"},{"section":"มาตรา ๑๐๙","num":"109","text":"ผู้ใดปลงพระชนม์พระราชินีหรือรัชทายาทหรือฆ่าผู้สําเร็จ ราชการแทนพระองค์ ต้องระวางโทษประหารชีวิต ผู้ใดพยายามกระทําการเช่นว่านั้น ต้องระวางโทษเช่นเดียวกัน ผู้ใดกระทําการใดอันเป็นการตระเตรียมเพื่อปลงพระชนม์พระราชินีหรือ ้ รัชทายาท หรือเพื่อฆ่าผู้สําเร็จราชการแทนพระองค์ หรือรู้ว่ามีผู้จะปลงพระชนม์พระราชินีหรือ รัชทายาท หรือจะฆ่าผู้สําเร็จราชการแทนพระองค์ กระทําการใดอันเป็นการช่วยปกปิดไว้ ต้อง ระวางโทษจําคุกตั้งแต่สิบสองปีถึงยี่สิบปี"},{"section":"มาตรา ๑๑๐","num":"110","text":"ผู้ใดกระทําการประทุษร้ายต่อพระองค์ หรือเสรีภาพของ พระราชินีหรือรัชทายาท หรือต่อร่างกายหรือเสรีภาพของผู้สําเร็จราชการแทนพระองค์ ต้อง ระวางโทษจําคุกตลอดชีวิต หรือจําคุกตั้งแต่สิบหกปีถึงยี่สิบปี ผู้ใดพยายามกระทําการเช่นว่านั้น ต้องระวางโทษเช่นเดียวกัน ถ้าการกระทํานั้นมีลักษณะอันน่าจะเป็นอันตรายแก่พระชนม์หรือชีวิตผู้ กระทําต้องระวางโทษประหารชีวิต หรือจําคุกตลอดชีวิต ผู้ใดกระทําการใดอันเป็นการตระเตรียมเพื่อประทุษร้ายต่อพระองค์ หรือ เสรีภาพของพระราชินีหรือรัชทายาท หรือต่อร่างกายหรือเสรีภาพของผู้สําเร็จราชการ แทนพระองค์ หรือรู้ว่ามีผู้จะประทุษร้ายต่อพระองค์หรือเสรีภาพของพระราชินีหรือรัชทายาท หรือประทุษร้ายต่อร้างกายหรือเสรีภาพของผู้สําเร็จราชการแทนพระองค์ กระทําการใดอันเป็น การช่วยปกปิดไว้ ต้องระวางโทษจําคุกตั้งแต่สิบสองปีถึงยี่สิบปี"},{"section":"มาตรา ๑๑๑","num":"111","text":"ผู้ใดเป็นผู้สนับสนุนในการกระทําความผิดตามมาตรา ๑๐๗ถึง"},{"section":"มาตรา ๑๑๒","num":"112","text":"ผู้ใดหมิ่นประมาท ดูหมิ่น หรือแสดงความอาฆาตมาดร้าย พระมหากษัตริย์ พระราชินี รัชทายาท หรือผู้สําเร็จราชการแทนพระองค์ ต้องระวางโทษ จําคุกตั้งแต่สามปีถึงสิบห้าปี หมวด ๒ ความผิดต่อความมั่นคงของรัฐภายในราชอาณาจักร"},{"section":"มาตรา ๑๑๓","num":"113","text":"ผู้ใดใช้กําลังประทุษร้ายหรือขู่เข็ญว่าจะใช้กําลังประทุษร้าย เพื่อ ล้มล้างหรือเปลี่ยนแปลงรัฐธรรมนูญ ล้มล้างอํานาจนิติบัญญัติ อํานาจบริหาร หรืออํานาจตุลาการแห่ง รัฐธรรมนูญ หรือให้ใช้อํานาจดังกล่าวแล้วไม่ได้ หรือ แบ่งแยกราชอาณาจักรหรือยึดอํานาจปกครองในส่วนหนึ่งส่วนใดแห่ง ราชอาณาจักร ผู้นั้นกระทําความผิดฐานเป็นกบฏ ต้องระวางโทษประหารชีวิต หรือจําคุก ตลอดชีวิต"},{"section":"มาตรา ๑๑๔","num":"114","text":"ผู้ใดสะสมกําลังพลหรืออาวุธ ตระเตรียมการอื่นใด หรือสมคบ กันเพื่อเป็นกบฏ หรือกระทําความผิดใด ๆ อันเป็นส่วนของแผนการ เพื่อเป็นกบฏ หรือ ้ จาก 128 ยุยงราษฎรให้เป็นกบฏ หรือรู้ว่ามีผู้จะเป็นกบฏ แล้วกระทําการใดอันเป็นการช่วยปกปิดไว้ ต้อง ระวางโทษจําคุกตั้งแต่สามปีถึงสิบห้าปี"},{"section":"มาตรา ๑๑๕","num":"115","text":"ผู้ใดยุยงทหารหรือตํารวจให้หนีราชการ ให้ละเลยไม่กระทําการ ตามหน้าที่ หรือให้ก่อการกําเริบ ต้องระวางโทษจําคุกไม่เกินห้าปี ถ้าความผิดนั้นได้กระทําลงโดยมุ่งหมายจะบ่อนให้วินัยและสมรรถภาพของ กรมกองทหารหรือตํารวจเสื่อมทรามลง ผู้กระทําต้องระวางโทษจําคุกไม่เกินสิบปี"},{"section":"มาตรา ๑๑๖","num":"116","text":"ผู้ใดกระทําให้ปรากฏแก่ประชาชนด้วยวาจา หนังสือหรือวิธีอื่น ใดอันมิใช่เป็นการกระทําภายในความมุ่งหมายแห่งรัฐธรรมนูญ หรือมิใช่เพื่อแสดงความคิดเห็น หรือติชมโดยสุจริต เพื่อให้เกิดการเปลี่ยนแปลงในกฎหมายแผ่นดินหรือรัฐบาล โดยใช้กําลัง ข่มขืนใจหรือใช้กําลังประทุษร้าย เพื่อให้เกิดความปั่ นป่วนหรือกระด้างกระเดื่องในหมู่ประชาชนถึงขนาดที่ จะก่อความไม่สงบขึ้นในราชอาณาจักร หรือ เพื่อให้ประชาชนล่วงละเมิดกฎหมายแผ่นดิน ต้องระวางโทษจําคุกไม่เกิน เจ็ดปี"},{"section":"มาตรา ๑๑๗","num":"117","text":"ผู้ใดยุยงหรือจัดให้เกิดการร่วมกันหยุดงาน การร่วมกันปิด งานงดจ้าง หรือการร่วมกันไม่ยอมค้าขายหรือติดต่อทางธุรกิจกับบุคคลใด ๆ เพื่อให้เกิดการ เปลี่ยนแปลงในกฎหมายแผ่นดิน เพื่อบังคับรัฐบาลหรือเพื่อข่มขู่ประชาชน ต้องระวางโทษจําคุก ไม่เกินเจ็ดปี หรือปรับไม่เกินหนึ่งแสนสี่หมื่นบาท หรือทั้งจําทั้งปรับ ผู้ใดทราบความมุ่งหมายดังกล่าวและเข้ามีส่วนหรือเข้าช่วยในการร่วมกันหยุด งาน การร่วมกันปิดงานงดจ้างหรือการร่วมกันไม่ยอมค้าขายหรือติดต่อทางธุรกิจกับบุคคลใด ๆ นั้น ต้องระวางโทษจําคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจําทั้งปรับ ผู้ใดทราบความมุ่งหมายดังกล่าว และใช้กําลังประทุษร้าย ขู่เข็ญว่าจะใช้กําลัง ประทุษร้ายหรือทําให้หวาดกลัวด้วยประการใด ๆ เพื่อให้บุคคลเข้ามีส่วนหรือเข้าช่วยในการร่วม กันหยุดงาน การร่วมกันปิดงานงดจ้างหรือการร่วมกันไม่ยอมค้าขายหรือติดต่อทางธุรกิจกับ บุคคลใด ๆ นั้น ต้องระวางโทษจําคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจําทั้ง ปรับ"},{"section":"มาตรา ๑๑๘","num":"118","text":"ผู้ใดกระทําการใด ๆ ต่อธงหรือเครื่องหมายอื่นใดอันมีความ หมายถึงรัฐ เพื่อเหยียดหยามประเทศชาติ ต้องระวางโทษ จําคุกไม่เกินสองปี หรือปรับไม่เกิน สี่หมื่นบาท หรือทั้งจําทั้งปรับ หมวด ๓ ความผิดต่อความมั่นคงของรัฐภายนอกราชอาณาจักร ้"},{"section":"มาตรา ๑๑๙","num":"119","text":"ผู้ใดกระทําการใด ๆ เพื่อให้ราชอาณาจักรหรือส่วนหนึ่งส่วนใด ของราชอาณาจักรตกไปอยู่ใต้อํานาจอธิปไตยของรัฐต่างประเทศ หรือเพื่อให้เอกราชของรัฐ เสื่อมเสียไป ต้องระวางโทษประหารชีวิต หรือจําคุกตลอดชีวิต"},{"section":"มาตรา ๑๒๐","num":"120","text":"ผู้ใดคบคิดกับบุคคลซึ่งกระทําการเพื่อประโยชน์ของรัฐต่าง ประเทศ ด้วยความประสงค์ที่จะก่อให้เกิดการดําเนินการรบต่อรัฐหรือในทางอื่นที่เป็นปรปักษ์ ต่อรัฐ ต้องระวางโทษจําคุกตลอดชีวิต หรือจําคุกตั้งแต่สิบปีถึงยี่สิบปี"},{"section":"มาตรา ๑๒๑","num":"121","text":"คนไทยคนใดกระทําการรบต่อประเทศหรือเข้าร่วมเป็นข้าศึก ของประเทศ ต้องระวางโทษประหารชีวิต หรือจําคุกตลอดชีวิต"},{"section":"มาตรา ๑๒๒","num":"122","text":"ผู้ใดกระทําการใด ๆ เพื่ออุปการะแก่การดําเนินการรบหรือการ ตระเตรียมการรบของข้าศึก ต้องระวางโทษจําคุกตั้งแต่ห้าปีถึงสิบห้าปี ถ้าการอุปการะนั้นเป็นการ ทําให้ป้อม ค่าย สนามบิน ยานรบ ยานพาหนะ ทางคมนาคม สิ่งที่ใช้ในการ สื่อสาร ยุทธภัณฑ์ เสบียงอาหาร อู่เรือ อาคาร หรือสิ่งอื่นใดสําหรับใช้เพื่อการสงครามใช้การไม่ ได้หรือตกไปอยู่ในเงื้อมมือของข้าศึก ยุยงทหารให้ละเลยไม่กระทําการตามหน้าที่ ก่อการกําเริบ หนีราชการ หรือละเมิดวินัย กระทําจารกรรม นําหรือแนะทางให้ข้าศึก หรือ (๔) กระทําโดยประการอื่นใดให้ข้าศึกได้เปรียบในการรบ ผู้กระทําต้องระวางโทษประหารชีวิต หรือจําคุกตลอดชีวิต"},{"section":"มาตรา ๑๒๓","num":"123","text":"ผู้ใดกระทําการใด ๆ เพื่อให้ได้มาซึ่งข้อความ เอกสารหรือสิ่งใด ๆ อันปกปิดไว้เป็นความลับสําหรับความปลอดภัยของประเทศ ต้องระวางโทษจําคุกไม่เกินสิบปี"},{"section":"มาตรา ๑๒๔","num":"124","text":"ผู้ใดกระทําการใด ๆ เพื่อให้ผู้อื่นล่วงรู้หรือได้ไปซึ่งข้อความ เอกสารหรือสิ่งใด ๆ อันปกปิดไว้เป็นความลับสําหรับความปลอดภัยของประเทศ ต้องระวาง โทษจําคุกไม่เกินสิบปี ถ้าความผิดนั้นได้กระทําในระหว่างประเทศอยู่ในการรบหรือการสงคราม ผู้ กระทําต้องระวางโทษจําคุกตั้งแต่ห้าปีถึงสิบห้าปี ถ้าความผิดดังกล่าวมาในสองวรรคก่อน ได้กระทําเพื่อให้รัฐต่างประเทศได้ ประโยชน์ ผู้กระทําต้องระวางโทษประหารชีวิต หรือจําคุกตลอดชีวิต"},{"section":"มาตรา ๑๒๕","num":"125","text":"ผู้ใดปลอม ทําเทียมขึ้น กักไว้ ซ่อนเร้น ปิดบัง ยักย้าย ทําให้เสีย หาย ทําลาย หรือทําให้สูญหายหรือไร้ประโยชน์ซึ่งเอกสารหรือแบบใด ๆ อันเกี่ยวกับส่วนได้เสีย ของรัฐในการระหว่างประเทศ ต้องระวางโทษจําคุกไม่เกินสิบปี ้"},{"section":"มาตรา ๑๒๖","num":"126","text":"ผู้ใดได้รับมอบหมายจากรัฐบาลให้กระทํากิจการของรัฐกับ รัฐบาลต่างประเทศ ถ้าและโดยทุจริตไม่ปฏิบัติการตามที่ได้รับมอบหมาย ต้องระวางโทษ จําคุกตั้งแต่หนึ่งปีถึงสิบปี"},{"section":"มาตรา ๑๒๗","num":"127","text":"ผู้ใดกระทําการใด ๆ เพื่อให้เกิดเหตุร้ายแก่ประเทศจากภายนอก ต้องระวางโทษจําคุกไม่เกินสิบปี ถ้าเหตุร้ายเกิดขึ้น ผู้กระทําต้องระวางโทษประหารชีวิต หรือจําคุกตลอดชีวิต หรือจําคุกตั้งแต่สองปีถึงยี่สิบปี"},{"section":"มาตรา ๑๒๘","num":"128","text":"ผู้ใดตระเตรียมการ หรือพยายามกระทําความผิดใด ๆ ในหมวด นี้ ต้องระวางโทษตามที่บัญญัติไว้สําหรับความผิดนั้น"},{"section":"มาตรา ๑๒๙","num":"129","text":"ผู้ใดเป็นผู้สนับสนุนในการกระทําความผิดใด ๆ ในหมวดนี้ ต้อง ระวางโทษเช่นเดียวกับตัวการในความผิดนั้น หมวด ๔ ความผิดต่อสัมพันธไมตรีกับต่างประเทศ"},{"section":"มาตรา ๑๓๐","num":"130","text":"ผู้ใดทําร้ายร่างกายหรือประทุษร้ายต่อเสรีภาพของราชาธิบดี ราชินี ราชสามี รัชทายาทหรือประมุขแห่งรัฐต่างประเทศ ซึ่งมีสัมพันธไมตรี ต้องระวางโทษ จําคุกตั้งแต่หนึ่งปีถึงสิบห้าปี ผู้ใดพยายามกระทําการเช่นว่านั้น ต้องระวางโทษเช่นเดียวกัน"},{"section":"มาตรา ๑๓๑","num":"131","text":"ผู้ใดทําร้ายร่างกาย หรือประทุษร้ายต่อเสรีภาพของผู้แทนรัฐ ต่างประเทศ ซึ่งได้รับแต่งตั้งให้มาสู่พระราชสํานัก ต้องระวางโทษจําคุกไม่เกินสิบปี ผู้ใดพยายามกระทําการเช่นว่านั้น ต้องระวางโทษเช่นเดียวกัน"},{"section":"มาตรา ๑๓๒","num":"132","text":"ผู้ใดฆ่าหรือพยา
