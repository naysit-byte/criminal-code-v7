            },
            {
                chapter: "หมวด ๗ ความผิดฐานทำให้เสียทรัพย์",
                section: "358",
                title: "ทำให้เสียทรัพย์",
                law: "ผู้ใดทำให้เสียหาย ทำลาย ทำให้เสื่อมค่าหรือทำให้ไร้ประโยชน์ ซึ่งทรัพย์ของผู้อื่นหรือผู้อื่นเป็นเจ้าของรวมอยู่ด้วย ผู้นั้นกระทำความผิดฐานทำให้เสียทรัพย์ ต้องระวางโทษจำคุกไม่เกินสามปี หรือปรับไม่เกินหกหมื่นบาท หรือทั้งจำทั้งปรับ"
            },
            {
                chapter: "หมวด ๗ ความผิดฐานทำให้เสียทรัพย์",
                section: "360",
                title: "ทำให้เสียทรัพย์สินสาธารณะ",
                law: "ผู้ใดทำให้เสียหาย ทำลาย ทำให้เสื่อมค่าหรือทำให้ไร้ประโยชน์ ซึ่งทรัพย์สินที่มีไว้เพื่อสาธารณประโยชน์หรือทรัพย์สินของแผ่นดิน ต้องระวางโทษจำคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจำทั้งปรับ"
            },
            {
                chapter: "หมวด ๘ ความผิดฐานบุกรุก",
                section: "362",
                title: "บุกรุก",
                law: "ผู้ใดเข้าไปในอสังหาริมทรัพย์ของผู้อื่น เพื่อถือการครอบครองอสังหาริมทรัพย์นั้นทั้งหมดหรือแต่บางส่วน หรือเข้าไปกระทำการใด ๆ อันเป็นการรบกวนการครอบครองอสังหาริมทรัพย์ของเขาโดยปกติสุข ต้องระวางโทษจำคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่นบาท หรือทั้งจำทั้งปรับ"
            },
            {
                chapter: "หมวด ๘ ความผิดฐานบุกรุก",
                section: "364",

                law: "ผู้ใดโดยไม่มีเหตุอันสมควร เข้าไปหรือซ่อนตัวอยู่ในเคหสถาน อาคารเก็บรักษาทรัพย์หรือสำนักงานในความครอบครองของผู้อื่น หรือไม่ยอมออกไปจากสถานที่เช่นว่านั้นเมื่อผู้มีสิทธิที่จะห้ามมิให้เข้าไปได้ไล่ให้ออก ต้องระวางโทษจำคุกไม่เกินหนึ่งปี หรือปรับไม่เกินสองหมื่นบาท หรือทั้งจำทั้งปรับ"
            },
            {
                chapter: "หมวด ๘ ความผิดฐานบุกรุก",
                section: "365",
                title: "บุกรุกฉกรรจ์ (มีเหตุเพิ่มโทษ)",
                law: "ถ้าการกระทำความผิดตามมาตรา ๓๖๒ มาตรา ๓๖๓ หรือมาตรา ๓๖๔ ได้กระทำ\n(๑) โดยใช้กำลังประทุษร้ายหรือขู่เข็ญว่าจะใช้กำลังประทุษร้าย\n(๒) โดยมีอาวุธหรือโดยร่วมกระทำความผิดด้วยกันตั้งแต่สองคนขึ้นไป หรือ\n(๓) ในเวลากลางคืน\n\nผู้กระทำต้องระวางโทษจำคุกไม่เกินห้าปี หรือปรับไม่เกินหนึ่งแสนบาท หรือทั้งจำทั้งปรับ"
            }
        ];

        function CriminalCodeSearchApp() {
            const [query, setQuery] = React.useState("");
            const [activeTab, setActiveTab] = React.useState("search");

            const filteredResults = React.useMemo(() => {
                const trimmedQuery = query.trim();
                if (!trimmedQuery) return CRIMINAL_ASSET_DATA;
                
                const searchWords = trimmedQuery.toLowerCase().split(/\s+/);

                return CRIMINAL_ASSET_DATA.filter((item) => {
                    const searchableContent = `${item.section} ${item.title} ${item.law} ${item.chapter}`.toLowerCase();
                    return searchWords.every((word) => searchableContent.includes(word));
                });
            }, [query]);

            return (
                <div className="min-h-screen pb-12">
                    {/* Top Navigation Header matching user layout */}
                    <div className="bg-[#121824] px-4 py-5 shadow-lg border-b border-slate-800 sticky top-0 z-50">
                        <div className="max-w-md mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-amber-500/10 p-2 rounded-xl border border-amber-500/30">
                                    <span className="text-amber-500 text-lg">⚖️</span>
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold text-slate-100 tracking-tight">ประมวลกฎหมายอาญา</h1>
                                    <div className="flex gap-2 items-center text-[11px] text-slate-400 mt-0.5">
                                        <span>ลักษณะ ๑๒</span>
                                        <span class="w-1 h-1 bg-slate-600 rounded-full"></span>
                                        <span className="text-amber-400 font-semibold">PROFESSIONAL</span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex gap-1.5">
                                <button className="bg-slate-800 text-slate-300 text-xs px-2.5 py-1.5 rounded-lg border border-slate-700/60 font-medium">🧮 คำนวณ</button>
                                <button className="bg-slate-800 text-slate-300 text-xs px-2.5 py-1.5 rounded-lg border border-slate-700/60 font-medium">⇄ เปรียบเทียบ</button>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-md mx-auto px-4 mt-5">
                        {/* Search Input field */}
                        <div className="relative mb-5">
                            <input
                                type="text"
                                placeholder="ค้นหา เช่น 334, ลักทรัพย์, เคหสถาน, กลางคืน..."
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                                className="w-full bg-[#161f30] text-slate-100 placeholder:text-slate-500 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all shadow-inner"
                            />
                            <span className="absolute left-3.5 top-3.5 text-slate-500 text-sm">🔍</span>
                        </div>

                        {/* Interactive Stats and Tabs Bar */}
                        <div className="flex items-center justify-between border-b border-slate-800 pb-3 mb-5 text-xs font-semibold">
                            <div className="flex gap-4">
                                <button onClick={() => setActiveTab("search")} className={`pb-2 ${activeTab === 'search' ? 'text-amber-400 border-b-2 border-amber-400' : 'text-slate-400'}`}>🔍 ค้นหา</button>
                                <button onClick={() => setActiveTab("calc")} className={`pb-2 ${activeTab === 'calc' ? 'text-amber-400 border-b-2 border-amber-400' : 'text-slate-400'}`}>🧮 คำนวณ</button>
                                <button onClick={() => setActiveTab("compare")} className={`pb-2 ${activeTab === 'compare' ? 'text-amber-400 border-b-2 border-amber-400' : 'text-slate-400'}`}>⇄ เปรียบมาตรา</button>
                            </div>
                            <span className="text-slate-500 bg-slate-900 px-2 py-0.5 rounded border border-slate-800 text-[11px]">พบ {filteredResults.length} มาตรา</span>
                        </div>

                        {/* Law card list rendered perfectly on mobile devices */}
                        <div className="space-y-4">
                            {filteredResults.map((item) => (
                                <div key={item.section} className="bg-[#121824] border border-slate-800/80 rounded-2xl overflow-hidden shadow-xl">
                                    <div className="bg-[#161f30] px-4 py-3 flex justify-between items-center border-b border-slate-800/60">
                                        <div>
                                            <span className="text-[9px] text-indigo-400 uppercase font-black tracking-wider block">มาตรา</span>
                                            <span className="text-xl font-black text-amber-400">{item.section}</span>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-[10px] text-slate-400 block font-light truncate max-w-[200px]">{item.chapter}</span>
                                            <h2 className="text-sm font-bold text-slate-200">{item.title}</h2>
                                        </div>
                                    </div>
                                    <div className="p-4">
                                        <div className="bg-[#0b0f19]/60 border border-slate-800/40 rounded-xl p-3.5 text-[13px] md:text-sm text-slate-300 leading-relaxed whitespace-pre-line font-normal">
                                            {item.law}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Blank state screen if search query is not found */}
                        {filteredResults.length === 0 && (
                            <div className="bg-[#121824] rounded-2xl border border-slate-800 p-12 text-center text-slate-500 text-sm mt-6 shadow-xl">
                                🔒 ไม่พบข้อมูลมาตราที่คุณระบุในหมวดความผิดเกี่ยวกับทรัพย์
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CriminalCodeSearchApp />);
    </script>
</body>
</html>
